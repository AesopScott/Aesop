  moduleId: null,   // "m1" - "m10"

// DERIVED HELPERS
// ═══════════════════════════════════════════════════════════════════════════

function groupModules(group) {
  return MODULES.slice(0, group.modulesUnlocked);
}

function groupLessons(group, mod) {
  return mod.lessons.slice(0, group.lessonsPerModule);
}

function lessonDone(groupId, lessonId) {
  return state.completed[groupId] ? state.completed[groupId].has(lessonId) : false;
}

function moduleDone(group, mod) {
  if (!group.id) return false;
  return groupLessons(group, mod).every(l => state.completed[group.id].has(l.id));
}

function progressCounts(group) {
  const mods = groupModules(group);
  const modsDone = mods.filter(m => moduleDone(group, m)).length;
  const totalLessons = mods.length * group.lessonsPerModule;
  const doneLessons = mods.reduce((sum, m) =>
    sum + groupLessons(group, m).filter(l => state.completed[group.id].has(l.id)).length, 0
  );
  return { modsDone, modsTotal: mods.length, doneLessons, totalLessons };
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function setAccent(hex) {
  document.documentElement.style.setProperty('--current-accent', hex);
}

  const groupId = state.groupId;

  const group = AGE_GROUPS[groupId];
  const { modsDone, modsTotal, doneLessons, totalLessons } = progressCounts(group);
  const modPct = modsTotal ? Math.round((modsDone / modsTotal) * 100) : 0;
  const lessonPct = totalLessons ? Math.round((doneLessons / totalLessons) * 100) : 0;
  const mods = groupModules(group);

  let html = `
    <div class="sidebar-group-label">${group.emoji} ${group.label}</div>

// Returns the URL for the currently selected lesson file, or null
function getLessonUrl() {
  if (!state.moduleId || !state.lessonId) return null;
  const mod = MODULES.find(m => m.id === state.moduleId);
  if (!mod || !mod.urls) return null;
  const base = mod.urls[state.groupId] || null;
  if (!base) return null;
  return base + '?lesson=' + encodeURIComponent(state.lessonId);
}

// Called when a lesson iframe finishes loading
// ── COMPLETION HOOK (stub) ───────────────────────────────────────────────
// When Firebase auth is live, replace this stub with:
//   1. Listen for a postMessage from the lesson file signaling completion
//   2. Write completion to the user's Firebase account
//   3. Call markLessonComplete(lessonId) to update local state + sidebar
// ────────────────────────────────────────────────────────────────────────
function onLessonFrameLoad(iframe) {
  // Stub: wire up postMessage listener for lesson → nav completion signal
  // Lesson files will call: window.parent.postMessage({ type:'lessonComplete', lessonId:'m1-l1' }, '*')
  window.addEventListener('message', function onMsg(e) {
    if (e.data && e.data.type === 'lessonComplete' && e.data.lessonId) {
      markLessonComplete(e.data.lessonId);
      window.removeEventListener('message', onMsg);
    }
  }, { once: false });
}

function markLessonComplete(lessonId) {
  if (!state.groupId || state.groupId === 0) return;
  state.completed[state.groupId].add(lessonId);
  // ── PERSISTENCE HOOK (stub) ──────────────────────────────────────────
  // Replace with Firebase write when auth is live:
  //   db.collection('users').doc(userId).update({ [`completed.${state.groupId}`]: [...state.completed[state.groupId]] })
  // ────────────────────────────────────────────────────────────────────
  renderSidebar();       // refresh progress bars + checkmarks
  renderModuleDetail();  // refresh lesson list checkmarks
}

function selectModuleTest(modId) {
  state.lessonId = modId + '-test';
  const url = getLessonUrl();
  if (url) {
    window.location.href = url;
  }
}

function renderOrientation() {
  const nav = document.getElementById('sidebarContent');
  let navHtml = `<div class="sidebar-group-label">📘 Orientation</div>`;
  ORIENTATION_MODULES.forEach(mod => {
    const isActive = state.moduleId === mod.id;
    navHtml += `
      <div class="mod-row${isActive ? ' active' : ''}" onclick="selectOrientModule('${mod.id}')">
        <div class="mod-row-icon">${mod.icon}</div>
        <div class="mod-row-info">
          <div class="mod-row-label">${mod.label}</div>
        </div>
      </div>
    `;
  });
  nav.innerHTML = navHtml;

  // Show first module by default if nothing selected
  if (!state.moduleId || !ORIENTATION_MODULES.find(m => m.id === state.moduleId)) {
    state.moduleId = ORIENTATION_MODULES[0].id;
    nav.querySelector('.mod-row').classList.add('active');
  }
  renderOrientContent();
}

function selectOrientModule(id) {
  state.moduleId = id;
  renderOrientation();
}

function renderOrientContent() {
  const mod = ORIENTATION_MODULES.find(m => m.id === state.moduleId);
  if (!mod) return;
  const ca = document.getElementById('contentArea');

  let html = `<div class="group-overview"><div class="group-header" style="text-align:left;padding:0 0 1rem;">
    <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem;">
      <span style="font-size:1.5rem;">${mod.icon}</span>
      <div>
        <div style="font-family:'Cinzel',serif;font-size:0.55rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);margin-bottom:2px;">Parent & Teacher Orientation</div>
        <div style="font-family:'Cinzel',serif;font-size:0.9rem;font-weight:700;color:#fff;">${mod.title}</div>
      </div>
    </div>
    <div style="font-size:0.75rem;color:var(--muted);line-height:1.6;">${mod.intro}</div>
  </div><div style="border-top:1px solid var(--border);padding-top:1rem;">`;

  mod.sections.forEach((s, si) => {
    if (s.heading) {
      html += `<div class="orient-section"><h3>${s.heading}</h3><p>${s.body}</p></div>`;
    } else if (s.callout) {
      html += `<div class="orient-callout"><div class="orient-callout-label">${s.callout.label}</div><p>${s.callout.text}</p></div>`;
    } else if (s.activity) {
      html += `<div class="orient-activity"><div class="orient-activity-label">🌟 ${s.activity.label}</div><p>${s.activity.text}</p></div>`;
    } else if (s.quiz) {
      const q = s.quiz;
      const qid = `q-${mod.id}-${si}`;
      html += `
        <div class="quiz-box">
          <div class="quiz-q">🧪 Quick Check: ${q.q}</div>
          <div class="quiz-opts">
            ${q.opts.map((o, i) => `<button class="quiz-opt" onclick="answerQuiz('${qid}',${i},${q.correct},this)">${o}</button>`).join('')}
          </div>
          <div class="quiz-feedback" id="${qid}-fb"></div>
        </div>`;
    }
  });

  html += `</div></div>`;
  ca.innerHTML = html;
}

function answerQuiz(qid, chosen, correct, btn) {
  const box = btn.closest('.quiz-box');
  box.querySelectorAll('.quiz-opt').forEach((b, i) => {
    b.disabled = true;
    if (i === correct) b.classList.add('correct');
    else if (i === chosen) b.classList.add('wrong');
  });
  const fb = document.getElementById(qid + '-fb');
  // Find feedback from the quiz data
  const mod = ORIENTATION_MODULES.find(m => m.id === state.moduleId);
  const section = mod.sections.find(s => s.quiz && s.quiz.opts[correct]);
  if (section && fb) {
    fb.className = 'quiz-feedback show ' + (chosen === correct ? 'good' : 'bad');
    fb.textContent = chosen === correct
      ? '✅ ' + section.quiz.feedback.right
      : '❌ ' + section.quiz.feedback.wrong;
  }
}

// NAV: GROUP SELECTION

function selectGroup(groupId) {
  state.groupId = groupId;
  state.moduleId = null;
  state.lessonId = null;

  const grp = AGE_GROUPS[groupId];
  setAccent(grp.accent || '#f0c040');

  // Update age selector buttons
  document.querySelectorAll('.age-btn').forEach(b => {
    b.classList.toggle('active', +b.dataset.group === groupId);
  });
  document.getElementById('mod0Btn').classList.toggle('active', groupId === 0);

  // Show 3-col layout
  const sidebar = document.getElementById('sidebar');
  const rewardPane = document.getElementById('rewardPane');
  const mainLayout = document.getElementById('mainLayout');

  sidebar.classList.add('visible');
  rewardPane.classList.add('visible');
  mainLayout.style.gridTemplateColumns = '480px 1fr 300px';

  if (groupId === 0) {
    renderOrientation();
  } else {
    renderSidebar();
    renderGroupOverview();
  }
}

// NAV: MODULE & LESSON SELECTION
// ═══════════════════════════════════════════════════════════════════════════

function selectModule(moduleId) {
  state.moduleId = moduleId;
  state.lessonId = null;
  renderSidebar();
  renderModuleDetail();
  document.getElementById('contentArea').scrollTop = 0;
}

function selectLesson(lessonId) {
  state.lessonId = lessonId;
  const url = getLessonUrl();
  if (url) {
    window.location.href = url;
  }
}

function backToGroup() {
  state.moduleId = null;
  state.lessonId = null;
  renderSidebar();
  renderGroupOverview();
}
