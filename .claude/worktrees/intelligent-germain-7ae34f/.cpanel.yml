---
deployment:
  tasks:
    - export DEPLOYPATH=/dev/
    - /bin/mkdir -p $DEPLOYPATH
    - >
      /usr/bin/rsync -a --delete
      --exclude='.git/'
      --exclude='.github/'
      --exclude='.claude/'
      --exclude='.cpanel.yml'
      --exclude='TEMP/'
      --exclude='archive/'
      --exclude='Board Meetings/'
      --exclude='*.bat'
      --exclude='*.ps1'
      --exclude='audit_*.txt'
      --exclude='audit_modules.py'
      --exclude='fix_*.py'
      --exclude='secrets.php'
 