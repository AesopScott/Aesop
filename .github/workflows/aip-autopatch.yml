name: AIP Auto-Patch courses.html

on:
  push:
    paths:
      - 'aip/drafts/*.json'
  workflow_dispatch:

jobs:
  autopatch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AIP_COMMIT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run AIP auto-patch
        run: python .github/scripts/aip_autopatch.py

      - name: Commit patched courses.html
        run: |
          git config user.name "AIP Auto-Patch"
          git config user.email "aip-agent@aesopacademy.org"
          git add ai-academy/courses.html
          git diff --staged --quiet || git commit -m "AIP: auto-patch courses.html with approved drafts"
          git push
