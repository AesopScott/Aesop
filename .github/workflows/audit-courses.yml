name: Course Audit

on:
  schedule:
    - cron: '0 8 * * *'    # Every day at 8am UTC
  workflow_dispatch:        # Manual trigger anytime

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AIP_COMMIT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run course audit
        id: audit
        run: |
          python .github/scripts/audit_courses.py
          echo "exit_code=0" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Commit audit report
        run: |
          git config user.name "AESOP Audit Bot"
          git config user.email "audit@aesopacademy.org"
          git add aip/audit-report.md
          git diff --staged --quiet || git commit -m "Audit: $(date '+%Y-%m-%d') course audit report [skip ci]"
          git push

      - name: Fail if audit found errors
        if: steps.audit.outcome == 'failure'
        run: |
          echo "Audit script exited with errors — see aip/audit-report.md"
          exit 1
