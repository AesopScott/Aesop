name: Auto-Activate Courses

on:
  schedule:
    - cron: '15 * * * *'   # Every hour at :15 (offset from stats rebuild at :00)
  push:
    branches: [main]
    paths:
      - 'ai-academy/modules/**/*.html'   # New module files committed
      - 'ai-academy/modules/courses-data.json'
  workflow_dispatch:

concurrency:
  group: auto-activate
  cancel-in-progress: true

jobs:
  activate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AIP_COMMIT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run auto-activation
        run: python .github/scripts/auto_activate_courses.py --apply

      - name: Commit changes (if any)
        run: |
          git config user.name "Auto-Activate Bot"
          git config user.email "bot@aesopacademy.org"
          git add ai-academy/modules/course-registry.json \
                  ai-academy/modules/courses-data.json \
                  stats.json
          git diff --staged --quiet && echo "Nothing to commit." || (
            git commit -m "Auto-activate: add newly written courses to registry + stats"
            git pull --rebase origin main
            git push
          )
