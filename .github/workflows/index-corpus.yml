name: Index Academy Corpus

on:
  push:
    branches:
      - main
    paths:
      - 'ai-academy/modules/**'

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pinecone-client anthropic beautifulsoup4

      - name: Run indexer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
        run: python .github/scripts/index_aesop.py
