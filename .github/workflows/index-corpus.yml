name: Index Academy Corpus

on:
  push:
    branches:
      - main
    paths:
      - 'ai-academy/modules/**'
  workflow_dispatch:

concurrency:
  group: index-corpus
  cancel-in-progress: true

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pinecone anthropic beautifulsoup4 requests

      - name: Run indexer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE }}
          PINECONE_HOST: https://aesop-academy-sqe0vz2.svc.aped-4627-b74a.pinecone.io
        run: python .github/scripts/index_aesop.py
