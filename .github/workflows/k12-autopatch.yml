name: K-12 Auto-Patch courses.html

on:
  push:
    paths:
      - 'aip/k12-drafts/*.json'
  workflow_dispatch:

concurrency:
  group: courses-html-write
  cancel-in-progress: false

jobs:
  autopatch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AIP_COMMIT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run K-12 auto-patch
        run: python .github/scripts/aip_autopatch.py --drafts-dir aip/k12-drafts --category Youth

      - name: Rebuild K-12 draft index
        run: |
          python3 -c "
          import os, json
          d = 'aip/k12-drafts'
          files = sorted(f for f in os.listdir(d) if f.endswith('.json') and f != 'index.json')
          with open(os.path.join(d, 'index.json'), 'w') as fp:
              json.dump(files, fp, indent=2)
          "

      - name: Commit patched files
        run: |
          git config user.name "K-12 Auto-Patch"
          git config user.email "k12-agent@aesopacademy.org"
          git add ai-academy/courses.html ai-academy/modules/courses-data.json aip/k12-drafts/index.json
          git diff --staged --quiet || git commit -m "K-12: auto-patch courses.html + courses-data.json with approved youth drafts"
          git pull --no-rebase origin main
          git push
