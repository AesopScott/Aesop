name: K-12 AI Education Research Agent

on:
  schedule:
    - cron: '0 10 * * 2'   # Every Tuesday at 10am UTC (day after general AIP run)
  workflow_dispatch:         # Manual trigger anytime

jobs:
  k12-research:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AIP_COMMIT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic pinecone requests pytrends

      - name: Run K-12 Research Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.anthropic }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.pinecone }}
          PINECONE_HOST: https://aesop-academy-sqe0vz2.svc.aped-4627-b74a.pinecone.io
        run: python .github/scripts/k12_research_agent.py

      - name: Rebuild K-12 draft index
        run: |
          python3 -c "
          import os, json
          d = 'aip/k12-drafts'
          os.makedirs(d, exist_ok=True)
          files = sorted(f for f in os.listdir(d) if f.endswith('.json') and f != 'index.json')
          with open(os.path.join(d, 'index.json'), 'w') as fp:
              json.dump(files, fp, indent=2)
          "

      - name: Commit K-12 draft proposals
        run: |
          git config user.name "K-12 Research Agent"
          git config user.email "k12-agent@aesopacademy.org"
          git add aip/k12-drafts/
          git diff --staged --quiet || git commit -m "K-12 AIP: $(date '+%Y-%m-%d') youth course draft proposals"
          git push
