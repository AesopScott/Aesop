name: Product Catalog Daily Check

on:
  schedule:
    - cron: '15 10 * * *' # 10:15 UTC daily
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of products to check. Use 0 for all products.'
        required: false
        default: '500'
        type: string
      dry_run:
        description: 'Write reports without updating persistent state.'
        required: false
        default: false
        type: boolean

concurrency:
  group: product-catalog-daily-check
  cancel-in-progress: false

jobs:
  check-products:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AESOP_PAT || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run product update watcher
        run: |
          LIMIT="${{ inputs.limit }}"
          if [ -z "$LIMIT" ]; then
            LIMIT="500"
          fi
          args=(--limit "$LIMIT")
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args+=(--dry-run)
          fi
          python .github/scripts/check_product_updates.py "${args[@]}"

      - name: Commit product update reports
        env:
          GIT_AUTHOR_NAME: aesop-product-bot
          GIT_AUTHOR_EMAIL: bot@aesopacademy.org
          GIT_COMMITTER_NAME: aesop-product-bot
          GIT_COMMITTER_EMAIL: bot@aesopacademy.org
        run: |
          git add docs/product-update-report.json docs/product-update-report.md docs/product-update-state.json
          if git diff --cached --quiet; then
            echo "No product update report changes to commit."
            exit 0
          fi
          git commit -m "Products: daily update signal check $(date '+%Y-%m-%d')"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Notify on failure
        if: failure() || cancelled()
        env:
          BREVO_SMTP_KEY: ${{ secrets.BREVO_SMTP_KEY }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python .github/scripts/notify_failure.py
