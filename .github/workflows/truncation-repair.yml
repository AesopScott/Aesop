name: Truncation Repair (push-triggered)

on:
  push:
    branches:
      - main

jobs:
  repair:
    # Skip if the push itself was a repair commit — prevents infinite loop
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AIP_COMMIT_TOKEN || secrets.AESOP_PAT || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scan for truncation and repair
        run: python .github/scripts/repair_truncation.py

      - name: Commit repairs
        run: |
          git config user.name "AESOP Repair Bot"
          git config user.email "repair@aesopacademy.org"
          git add -A
          if git diff --staged --quiet; then
            echo "No truncation repairs needed."
          else
            git commit -m "Repair: $(date -u '+%Y-%m-%d %H:%MZ') truncation sweep [skip ci]"
            git push
          fi
