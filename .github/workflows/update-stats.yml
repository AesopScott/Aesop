name: Update Homepage Stats

on:
  schedule:
    # Top of every hour from 08:00 through 23:00 Mountain Daylight Time
    # (UTC-6). 08:00 MDT = 14:00 UTC, 23:00 MDT = 05:00 UTC next day.
    # NOTE: GitHub Actions cron runs in UTC year-round; when MST is in
    # effect (Nov-Mar, UTC-7), these runs will appear one hour later in
    # local time. Adjust to '0 1-6,15-23 * * *' for MST if needed.
    - cron: '0 0-5,14-23 * * *'
  workflow_dispatch:  # Manual trigger anytime

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AIP_COMMIT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install GA4 client
        run: |
          python -m pip install --upgrade pip
          pip install google-analytics-data==0.18.14 google-auth==2.35.0

      - name: Build stats.json
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
        run: python .github/scripts/build_stats.py || true

      - name: Commit updated stats
        run: |
          git config user.name "AESOP Stats Bot"
          git config user.email "stats@aesopacademy.org"
          git add stats.json
          git diff --staged --quiet || git commit -m "Stats: refresh homepage ticker ($(date -u '+%Y-%m-%d %H:%M UTC')) [skip ci]"
          git push
