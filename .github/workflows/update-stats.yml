name: Update Homepage Stats

on:
  schedule:
    # Top of every hour. GA4 API returns near-real-time data; hourly is plenty.
    - cron: '0 * * * *'
  workflow_dispatch:      # Manual trigger anytime
  push:
    # Rebuild when the registry changes so course count updates without waiting.
    branches: [main]
    paths:
      - 'ai-academy/modules/course-registry.json'
      - '.github/scripts/build_stats.py'

jobs:
  refresh-stats:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AIP_COMMIT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install GA4 client
        run: |
          python -m pip install --upgrade pip
          pip install google-analytics-data==0.18.14 google-auth==2.35.0

      - name: Build stats.json
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
        run: python .github/scripts/build_stats.py

      - name: Commit if changed
        run: |
          git config user.name "AESOP Stats Bot"
          git config user.email "stats@aesopacademy.org"
          git add stats.json
          if git diff --staged --quiet; then
            echo "No stat changes — skipping commit."
          else
            git commit -m "Stats: refresh homepage ticker ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
