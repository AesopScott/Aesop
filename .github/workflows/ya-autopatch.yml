name: Young Adult Auto-Patch courses.html

on:
  push:
    paths:
      - 'aip/ya-drafts/*.json'
  workflow_dispatch:

concurrency:
  group: courses-html-write
  cancel-in-progress: false

jobs:
  autopatch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AIP_COMMIT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Young Adult auto-patch
        run: python .github/scripts/aip_autopatch.py --drafts-dir aip/ya-drafts --category "Young Adult"

      - name: Rebuild YA draft index
        run: |
          python3 -c "
          import os, json
          d = 'aip/ya-drafts'
          files = sorted(f for f in os.listdir(d) if f.endswith('.json') and f != 'index.json')
          with open(os.path.join(d, 'index.json'), 'w') as fp:
              json.dump(files, fp, indent=2)
          "

      - name: Commit patched files
        run: |
          git config user.name "YA Auto-Patch"
          git config user.email "ya-agent@aesopacademy.org"
          git add ai-academy/courses.html ai-academy/modules/courses-data.json aip/ya-drafts/index.json
          git diff --staged --quiet || git commit -m "YA: auto-patch courses.html + courses-data.json with approved young adult drafts"
          git pull --rebase origin main
          git push
