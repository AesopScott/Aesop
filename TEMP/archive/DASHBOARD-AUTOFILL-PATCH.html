<!-- ── AUTOFILL PATCH v1.0 — paste before </body> in AESOP-Safety-Scoring-Dashboard.html ── -->
<!-- Reads scores saved by AESOP-Safety-AutoReview when redirected with ?autofill=1 -->
<script>
(function() {
  if (!window.location.search.includes('autofill=1')) return;
  const raw = localStorage.getItem('aesop_safety_autofill');
  if (!raw) return;

  let payload;
  try { payload = JSON.parse(raw); } catch(e) { return; }
  if (!payload.scores) return;

  // Wait for DOM then fill
  function doFill() {
    let filled = 0;
    // Fill score inputs
    for (const [fieldId, val] of Object.entries(payload.scores)) {
      const el = document.getElementById(fieldId);
      if (el) {
        el.value = val;
        el.dispatchEvent(new Event('input', { bubbles: true }));
        el.dispatchEvent(new Event('change', { bubbles: true }));
        filled++;
      }
    }
    // Fill notes
    if (payload.notes) {
      for (const [noteId, text] of Object.entries(payload.notes)) {
        const el = document.getElementById(noteId);
        if (el) el.value = text;
      }
    }
    // Trigger recalc
    if (typeof updateDashboard === 'function') updateDashboard();
    else if (typeof recalc === 'function') recalc();
    else if (typeof calcGrandTotal === 'function') calcGrandTotal();

    // Show banner
    if (filled > 0) {
      const banner = document.createElement('div');
      banner.style.cssText = [
        'position:fixed','top:0','left:0','right:0','z-index:9999',
        'background:#2a5c3f','color:white','text-align:center',
        'padding:10px 16px','font-family:IBM Plex Mono,monospace',
        'font-size:14px','letter-spacing:0.08em'
      ].join(';');
      const ts = payload.timestamp ? new Date(payload.timestamp).toLocaleString() : 'unknown time';
      banner.textContent = '✓ Auto-filled ' + filled + ' scores from Claude review (' + ts + ') — R2, R3, R4 available for manual entry';
      document.body.prepend(banner);
      setTimeout(() => banner.style.transition='opacity 1s', 3000);
      setTimeout(() => banner.style.opacity='0', 4000);
      setTimeout(() => banner.remove(), 5000);
    }

    // Clean up URL without reload
    history.replaceState({}, '', window.location.pathname);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', doFill);
  } else {
    setTimeout(doFill, 100); // slight delay ensures page JS has run first
  }
})();
</script>
<!-- ── END AUTOFILL PATCH ── -->
