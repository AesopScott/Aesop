<style>
:root{

}
*{margin:0;padding:0;box-sizing:border-box;}
html{font-size:200%;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;}
.topbar{background:rgba(5,10,6,0.97);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-brand{font-family:'Cinzel',serif;font-size:0.9rem;color:var(--gold);letter-spacing:0.1em;}
.back-btn{background:rgba(240,192,64,0.1);border:1px solid var(--gold);color:var(--gold);padding:6px 14px;border-radius:20px;font-family:'Nunito',sans-serif;font-size:0.8rem;font-weight:700;text-decoration:none;transition:all 0.2s;cursor:pointer;}
.back-btn:hover{background:rgba(240,192,64,0.2);}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--dur) ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:0.1}50%{opacity:var(--max-op)}}
.page-wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:32px 24px 60px;}

/* ── Module 0 Block ── */
.m0-block{background:var(--panel);border:2px solid rgba(232,121,249,0.35);border-radius:16px;overflow:hidden;margin-bottom:14px;position:relative;}
.m0-top-bar{height:3px;background:linear-gradient(90deg,#e879f9,#c026d3,transparent);}
.m0-header{display:flex;align-items:flex-start;gap:14px;padding:16px 20px 14px;flex-wrap:wrap;}
.mod-icon{font-size:1.5rem;line-height:1;flex-shrink:0;}
.mod-meta{flex:1;}
.mod-num{font-family:'Cinzel',serif;font-size:0.62rem;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;margin-bottom:2px;}
.mod-title{font-family:'Cinzel',serif;font-size:0.95rem;font-weight:700;color:#fff;line-height:1.25;}
.mod-sub{font-size:0.72rem;color:rgba(255,255,255,0.45);margin-top:2px;}
.m0-progress-pills{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;}
.m0-pill-dot{width:22px;height:5px;border-radius:3px;transition:all 0.3s;}
.pill{padding:2px 9px;border-radius:12px;font-size:0.64rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;}
.pill.m0live{background:rgba(232,121,249,0.16);border:1px solid rgba(232,121,249,0.35);color:#e879f9;}
.m0-lesson-rows{border-top:1px solid rgba(232,121,249,0.15);padding:10px 0 12px;}
.m0-lesson-row{display:flex;align-items:center;gap:14px;padding:14px 20px;transition:background 0.15s;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;flex-wrap:wrap;}
.m0-lesson-row:last-child{border-bottom:none;}
.m0-lesson-row:hover{background:rgba(232,121,249,0.05);}
.m0-lesson-num{font-family:'Cinzel',serif;font-size:0.88rem;letter-spacing:0.1em;white-space:nowrap;flex-shrink:0;min-width:70px;color:#e879f9;}
.m0-lesson-title{font-size:0.9rem;font-weight:600;color:rgba(255,255,255,0.8);line-height:1.4;flex:1;min-width:200px;}
.m0-open-btn{font-size:0.75rem;font-weight:700;padding:4px 12px;border-radius:10px;border:1px solid rgba(232,121,249,0.4);background:rgba(232,121,249,0.08);color:#e879f9;white-space:nowrap;transition:all 0.15s;}
.m0-lesson-row:hover .m0-open-btn{background:rgba(232,121,249,0.18);border-color:rgba(232,121,249,0.7);}

/* ── Module 0 Lesson Modal ── */
.m0-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
.m0-modal-overlay.open{display:flex;}
.m0-modal{background:#0d1a0f;border:2px solid rgba(232,121,249,0.4);border-radius:20px;max-width:780px;width:100%;margin:auto;position:relative;animation:modalIn 0.25s ease;}
@keyframes modalIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.m0-modal-top{height:4px;background:linear-gradient(90deg,#e879f9,#c026d3,transparent);border-radius:20px 20px 0 0;}
.m0-modal-header{display:flex;align-items:flex-start;justify-content:space-between;padding:24px 28px 0;}
.m0-modal-eyebrow{font-family:'Cinzel',serif;font-size:0.72rem;letter-spacing:0.22em;text-transform:uppercase;color:#e879f9;margin-bottom:6px;}
.m0-modal-title{font-family:'Cinzel',serif;font-size:1.3rem;font-weight:900;color:#fff;line-height:1.3;}
.m0-modal-close{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);width:32px;height:32px;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;margin-left:16px;}

.m0-modal-body{padding:20px 28px 28px;}
.m0-section{margin-bottom:24px;}

.m0-section p{font-size:0.9rem;line-height:1.75;color:rgba(255,255,255,0.78);margin-bottom:12px;}
.m0-section p:last-child{margin-bottom:0;}
.m0-callout{background:rgba(232,121,249,0.07);border-left:3px solid #e879f9;border-radius:0 8px 8px 0;padding:14px 18px;margin:14px 0;font-size:0.88rem;line-height:1.7;color:rgba(255,255,255,0.8);}
.m0-callout strong{color:#e879f9;}
.m0-list{list-style:none;padding:0;margin:10px 0 14px;}
.m0-list li{padding:6px 0 6px 20px;position:relative;font-size:0.88rem;line-height:1.65;color:rgba(255,255,255,0.78);}
.m0-list li::before{content:'◆';position:absolute;left:0;color:rgba(232,121,249,0.5);font-size:0.65rem;top:10px;}
.m0-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-top:1px solid rgba(232,121,249,0.15);background:rgba(232,121,249,0.03);border-radius:0 0 18px 18px;}
.m0-nav-btn{background:rgba(232,121,249,0.1);border:1px solid rgba(232,121,249,0.35);color:#e879f9;padding:8px 20px;border-radius:20px;font-family:'Nunito',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
.m0-nav-btn:hover:not(:disabled){background:rgba(232,121,249,0.22);}
.m0-nav-btn:disabled{opacity:0.3;cursor:not-allowed;}
.m0-nav-counter{font-family:'Cinzel',serif;font-size:0.75rem;color:rgba(255,255,255,0.35);letter-spacing:0.1em;}

/* ── Acceptance gate inside modal ── */
.m0-accept-gate{background:rgba(232,121,249,0.05);border:1px solid rgba(232,121,249,0.3);border-radius:12px;padding:20px 22px;margin-top:20px;}
.m0-accept-gate p{font-size:0.88rem;line-height:1.65;color:rgba(255,255,255,0.7);margin-bottom:14px;}

.m0-accept-label input[type=checkbox]{width:18px;height:18px;margin-top:2px;flex-shrink:0;accent-color:#e879f9;cursor:pointer;}
.m0-accept-btn{margin-top:16px;width:100%;padding:12px;background:linear-gradient(135deg,rgba(232,121,249,0.18),rgba(192,38,211,0.18));border:1.5px solid #e879f9;color:#e879f9;font-family:'Cinzel',serif;font-size:0.9rem;font-weight:700;letter-spacing:0.1em;border-radius:10px;cursor:pointer;transition:all 0.2s;opacity:0.4;pointer-events:none;}
.m0-accept-btn.ready{opacity:1;pointer-events:auto;}
.m0-accept-btn.ready:hover{background:linear-gradient(135deg,rgba(232,121,249,0.3),rgba(192,38,211,0.3));box-shadow:0 0 20px rgba(232,121,249,0.25);}

/* ── Accepted banner ── */
.accepted-banner{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.3);border-radius:12px;padding:14px 20px;margin-top:16px;display:none;align-items:center;gap:12px;}
.accepted-banner.show{display:flex;}
.accepted-banner span{color:#86efac;font-weight:700;font-size:0.9rem;}

(function(){const c=document.getElementById('stars');for(let i=0;i<100;i++){const s=document.createElement('div');s.className='star';const z=Math.random()*2+0.5;s.style.cssText='width:'+z+'px;height:'+z+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;--dur:'+(2+Math.random()*4)+'s;--max-op:'+(0.15+Math.random()*0.4)+';animation-delay:'+Math.random()*4+'s;';c.appendChild(s);}})();

/* ── MODULE 0 DATA ── */
const M0_LESSONS = [
  {
    letter: 'A',
    title: 'The Mission of AESOP Academy',
    body: `
      <div class="m0-section">
        <div class="m0-section-head">Why This Academy Exists</div>
        <p>AESOP AI Academy was built on a single belief: that the children who will shape the future of artificial intelligence deserve to understand it before it fully shapes them. This is not a technical training program. It is a literacy program — the same way we teach children to read not to make them authors, but to make them citizens.</p>
        <p>The name AESOP carries its own intent. Just as Aesop's fables used story to teach moral truth, AESOP Academy uses story to teach technological truth. Every lesson is built around a narrative, a character, a problem to solve. The learning happens in the living of the story.</p>
        <div class="m0-callout"><strong>Our mission:</strong> To give every child, from age five to eighteen, the understanding, vocabulary, and critical thinking skills to engage with artificial intelligence as informed, empowered participants — not passive consumers.</div>
        <p>AESOP Academy is organized around six age tracks (Ages 5–6, 7–8, 9–10, 11–12, 13–15, and 16+) and eight thematic modules. Each age group receives content calibrated to their developmental stage, their vocabulary, and their world. The same concept — say, the idea that AI can be wrong — is introduced with a simple story about a talking toy at age five and explored through algorithmic bias and epistemic risk at age sixteen.</p>
        <p>Across all of it, one thread runs constant: <mark style="background:rgba(232,121,249,0.28);color:#f0d0ff;padding:1px 4px;border-radius:3px;font-style:italic;">you are in charge.</mark> AI is a tool. Stories are how humans have always made sense of tools, of power, of the world. That is what we are teaching here.</p>
      </div>
      <div class="m0-section">
        <div class="m0-section-head">What You, as a Parent or Educator, Are Being Asked to Do</div>
        <p>This Module 0 orientation is written for you — not your student. You are the first reader. You are the context-setter, the conversation-starter, the permission-giver. These seven short lessons ask you to consider some important questions before your student begins, and to confirm — for yourself — that you understand what this curriculum is and what it is not.</p>
        <p>It is not indoctrination in favor of AI. It is not fear-mongering against it. It is education, carefully constructed, in an age that demands it.</p>
      </div>
    `
  },
  {
    letter: 'B',
    title: 'Is It Safe for Children to Learn About AI?',
    body: `
      <div class="m0-section">
        <div class="m0-section-head">The Question Worth Asking</div>
        <p>It is a reasonable question. Some parents and educators worry that exposing children to AI topics too early might make them overly reliant on technology, desensitized to its risks, or confused about what is real and what is generated. These concerns deserve a direct answer.</p>
        <p>Learning about a thing is not the same as being harmed by it. Children learn about fire, germs, traffic, and strangers — not because we want them to engage recklessly with danger, but because knowledge is how we prepare them to navigate the world safely. The same principle applies to AI.</p>
        <div class="m0-callout"><strong>AESOP Academy teaches children what AI is, what it can do, and — crucially — what it cannot do.</strong> This is protective, not exposing.</div>
      </div>
      <div class="m0-section">
        <div class="m0-section-head">What This Curriculum Does Not Do</div>
        <ul class="m0-list">
          <li>It does not give students access to live AI tools or open-ended AI interactions as part of the curriculum.</li>
          <li>It does not collect personally identifiable information from students.</li>
          <li>It does not encourage students to share personal information with AI systems.</li>
          <li>It does not suggest that AI is always correct, always trustworthy, or always good.</li>
          <li>It does not avoid the difficult questions — it approaches them at the appropriate developmental level.</li>
        </ul>
      </div>
      <div class="m0-section">
        <div class="m0-section-head">What This Curriculum Does Do</div>
        <ul class="m0-list">
          <li>It builds critical thinking skills specifically applied to AI and automated systems.</li>
          <li>It teaches children to question AI outputs and understand their limitations.</li>
          <li>It emphasizes human judgment, human creativity, and human responsibility at every level.</li>
          <li>It gives students vocabulary to have real conversations with parents and teachers about AI experiences in their daily lives.</li>
        </ul>
        <p>AESOP Academy meets COPPA compliance standards for student data protection. Parents and guardians have full visibility into lesson content — which is precisely why this orientation module exists.</p>
      </div>
    `
  },
  {
    letter: 'C',
    title: 'Is It Important for Children to Learn About AI?',
    body: `
      <div class="m0-section">
        <div class="m0-section-head">Not Someday. Now.</div>
        <p>AI is not a topic on the horizon. It is already present in the daily lives of most children — in the recommendations they receive, the content their feeds prioritize, the tools their schools are beginning to adopt, and the conversations happening at family dinner tables. The question is not <em>whether</em> children will encounter AI. <mark style="background:rgba(232,121,249,0.28);color:#f0d0ff;padding:1px 4px;border-radius:3px;font-style:italic;">The question is whether they will encounter it prepared.</mark></p>
        <div class="m0-callout">A child who does not understand how AI works is not protected from it. They are simply more susceptible to its influence — and less equipped to push back when it matters.</div>
      </div>
      <div class="m0-section">
        <div class="m0-section-head">A Literacy Parallel</div>
        <p>A generation ago, digital literacy — knowing how to use a computer, evaluate websites, understand email safety — was considered an "extra." Now it is considered foundational. AI literacy is following exactly the same curve, at exactly the same speed. The schools and families that invest in it now are giving their children a lead that compounds over time.</p>
        <p>This is not about producing AI engineers. Most children who learn to read do not become authors. But reading makes them better thinkers, better communicators, and more capable participants in every domain of life. AI literacy does the same thing for the technological landscape they are inheriting.</p>
      </div>
      <div class="m0-section">
        <div class="m0-section-head">What Informed Children Can Do That Uninformed Children Cannot</div>
        <ul class="m0-list">
          <li>Recognize when they are interacting with an AI system and make deliberate choices about that interaction.</li>
          <li>Evaluate AI-generated content critically, rather than accepting it at face value.</li>
          <li>Understand the relationship between data, training, and output — and what that means for bias and accuracy.</li>
          <li>Articulate their own values in relation to technology, rather than having values imposed by technology they don't understand.</li>
          <li>Participate meaningfully in societal conversations about AI policy, rights, and responsibility as they grow into adulthood.</li>
        </ul>
      </div>
    `

  {
    letter: 'D',
    title: 'How Are Children Already Impacted by AI?',
    body: `
      <div class="m0-section">
        <div class="m0-section-head">It Is Already Happening</div>
        <p>AI is not waiting for children to grow up before it affects them. Every age group in this curriculum is already living inside AI-influenced systems. Here is a brief, honest look at what that means across developmental stages.</p>
      </div>
      <div class="m0-section">
        <div class="m0-section-head">Ages 5–8</div>
        <p>Young children interact with AI most often through voice assistants (Alexa, Siri, Google), recommendation engines on streaming platforms (YouTube Kids, Netflix, Disney+), and smart toys. These systems are learning from their interactions and shaping what content they see next. At this age, children have no framework for understanding this — they experience AI outputs as "what the TV shows me" or "what Alexa says."</p>
        <div class="m0-callout">The risk at this age is passive acceptance: trusting AI as an authority without any vocabulary for questioning it.</div>
      </div>
      <div class="m0-section">
        <div class="m0-section-head">Ages 9–12</div>
        <p>As children gain more independent device time, AI-driven social platforms, gaming environments, and search engines become primary information sources. Algorithmic content feeds are optimized for engagement — not accuracy, not age-appropriateness, not balance. Children in this range are frequent targets of AI-powered advertising systems, many of which are specifically designed to influence purchasing behavior.</p>
        <div class="m0-callout">The risk at this age is algorithmic manipulation without awareness: being influenced by systems they don't know exist.</div>
      </div>
      <div class="m0-section">
        <div class="m0-section-head">Ages 13–15</div>

        <div class="m0-callout">The risk at this age is identity and belief formation shaped by systems optimized for something other than their wellbeing.</div>
      </div>
      <div class="m0-section">
        <div class="m0-section-head">Ages 16+</div>
        <p>Older students are approaching the job market, college applications, and civic participation — all of which are increasingly mediated by AI. Hiring algorithms screen resumes. College admissions tools analyze applicant profiles. Financial systems use AI to make credit decisions. Students who don't understand these systems are navigating them blind.</p>
        <div class="m0-callout">The risk at this age is consequential invisibility: major life decisions being shaped by AI systems they have no tools to understand, challenge, or appeal.</div>
      </div>
    `

  {
    letter: 'E',
    title: 'Developmental Learning and Training Certification',
    body: `
      <div class="m0-section">
        <div class="m0-section-head">Why Age-Specific Tracks Matter</div>
        <p>Children are not small adults. Their cognitive structures, emotional regulation, abstract reasoning capacity, and relationship to authority all evolve significantly between ages five and eighteen. A curriculum that ignores this will either bore older students with oversimplification or overwhelm younger ones with abstraction.</p>
        <p>AESOP Academy's six age tracks are built around established developmental learning principles — the same principles that guide literacy and mathematics education. Concepts are introduced concretely at the earliest ages and become progressively more abstract, complex, and self-referential as students mature.</p>
      </div>
      <div class="m0-section">

/* ── MODULE 0 STATE ── */
const M0_KEY = 'aesop_m0_accepted';
let m0Read = new Set();
let m0CurrentLesson = 0;
let m0Accepted = localStorage.getItem(M0_KEY) === '1';

function saveRead(idx){
  m0Read.add(idx);
  renderM0ProgressPills();
  renderM0LessonRows();
}

function renderM0ProgressPills(){
  const wrap = document.getElementById('m0ProgressPills');
  if(!wrap) return;
  wrap.innerHTML = M0_LESSONS.map((l,i)=>{
    const read = m0Read.has(i);
    const bg = read ? '#e879f9' : 'rgba(232,121,249,0.18)';
    return `<div class="m0-pill-dot" style="background:${bg}" title="Lesson ${l.letter}: ${l.title}"></div>`;
  }).join('');
}

function renderM0LessonRows(){
  const wrap = document.getElementById('m0LessonRows');
  if(!wrap) return;
  wrap.innerHTML = M0_LESSONS.map((l,i)=>{
    const read = m0Read.has(i);
    const label = read ? '✓ Read' : 'Open →';
    const btnStyle = read ? 'border-color:rgba(34,197,94,0.5);background:rgba(34,197,94,0.1);color:#86efac;' : '';
    return `<div class="m0-lesson-row" onclick="openLesson(${i})">
      <span class="m0-lesson-num">M0.${l.letter}</span>
      <span class="m0-lesson-title">${l.title}</span>
      <span class="m0-open-btn" style="${btnStyle}">${label}</span>
    </div>`;
  }).join('');
}

function openLesson(idx){
  m0CurrentLesson = idx;
  renderModalContent(idx);
  document.getElementById('m0Modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(){
  document.getElementById('m0Modal').classList.remove('open');
  document.body.style.overflow = '';
  renderM0LessonRows();
  if(m0Accepted) document.getElementById('acceptedBanner').classList.add('show');
}

function handleModalClick(e){
  if(e.target === document.getElementById('m0Modal')) closeModal();
}

function renderModalContent(idx){
  const l = M0_LESSONS[idx];
  saveRead(idx);
  document.getElementById('modalEyebrow').textContent = `Module 0 · Lesson ${l.letter}`;
  document.getElementById('modalTitle').textContent = l.title;
  document.getElementById('modalCounter').textContent = `${idx+1} / ${M0_LESSONS.length}`;
  document.getElementById('prevBtn').disabled = idx === 0;

  const isLast = idx === M0_LESSONS.length - 1;

  let body = l.body;

  if(isLast && !m0Accepted){
    body += `
      <div class="m0-accept-gate" id="acceptGate">
        <p>You have reached the end of the Module 0 orientation. By confirming below, you acknowledge that you are a parent, guardian, or educator, that you have read all seven lessons, and that you authorize the student in your care to begin the AESOP AI Academy curriculum.</p>
        <label class="m0-accept-label">
          <input type="checkbox" id="acceptCheck" onchange="toggleAcceptBtn()">
          I confirm I am a parent, guardian, or educator and I have read the Module 0 orientation. I authorize the student in my care to access the AESOP AI Academy curriculum.
        </label>
        <button class="m0-accept-btn" id="acceptBtn" onclick="completeAcceptance()">✓ Confirm &amp; Unlock Curriculum</button>
      </div>`;
  } else if(isLast && m0Accepted){
    body += `<div class="m0-accept-gate"><p style="color:#86efac;font-weight:700;">✓ Orientation accepted. The curriculum is unlocked.</p></div>`;
  }

  document.getElementById('modalBody').innerHTML = body;

  const nextBtn = document.getElementById('nextBtn');
  if(isLast){
    nextBtn.textContent = m0Accepted ? 'Close' : 'Review & Accept →';
    nextBtn.onclick = (isLast && m0Accepted) ? closeModal : ()=>navLesson(1);
  } else {
    nextBtn.textContent = 'Next →';
    nextBtn.onclick = ()=>navLesson(1);
  }
  nextBtn.disabled = false;
}

function toggleAcceptBtn(){
  const cb = document.getElementById('acceptCheck');
  const btn = document.getElementById('acceptBtn');
  if(!cb||!btn) return;
  btn.classList.toggle('ready', cb.checked);
}

function completeAcceptance(){
  const cb = document.getElementById('acceptCheck');
  if(!cb||!cb.checked) return;
  m0Accepted = true;
  localStorage.setItem(M0_KEY,'1');
  renderModalContent(m0CurrentLesson);
  renderM0LessonRows();
}

function navLesson(dir){
  const next = m0CurrentLesson + dir;
  if(next < 0 || next >= M0_LESSONS.length) return;
  m0CurrentLesson = next;
  renderModalContent(next);
  const inner = document.getElementById('m0ModalInner');
  if(inner) inner.scrollTop = 0;
}

/* ── INIT ── */
renderM0ProgressPills();
renderM0LessonRows();
if(m0Accepted) document.getElementById('acceptedBanner').classList.add('show');
</script>
</body>
</html>
