<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advisory Board Admin &mdash; AESOP</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon_32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:       #0e1c36;
  --teal:       #3dd6c0;
  --teal-dark:  #1a9e8a;
  --gold:       #c9a05a;
  --gold-light: #dfc07a;
  --ink:        #1a1a2e;
  --ink-light:  #4a4a6a;
  --ink-muted:  #8888aa;
  --white:      #ffffff;
  --cream:      #f9f7f2;
  --border:     #e0ddd6;
  --border-light: #ece9e2;
  --red:        #d9534f;
  --red-bg:     rgba(217,83,79,0.08);
  --green:      #2e8b6e;
  --radius-sm:  6px;
  --radius-md:  12px;
  --radius-lg:  18px;
  --shadow-sm:  0 1px 4px rgba(0,0,0,0.08);
  --shadow-md:  0 4px 20px rgba(0,0,0,0.12);
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body:    'DM Sans', system-ui, sans-serif;
  --max-w: 1000px;
}

body {
  font-family: var(--font-body);
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  padding-bottom: 6rem;
}

/* ── HEADER ── */
.adm-header {
  background: var(--navy);
  color: #fff;
  padding: 1.75rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.25);
}
.adm-header-left {
  display: flex;
  align-items: center;
  gap: 1rem;
}
.adm-logo {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--gold-light);
  text-decoration: none;
  white-space: nowrap;
}
.adm-title {
  font-size: 0.9rem;
  font-weight: 600;
  color: rgba(255,255,255,0.7);
  border-left: 1px solid rgba(255,255,255,0.2);
  padding-left: 1rem;
}
.adm-pat-status {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  font-size: 0.78rem;
  color: rgba(255,255,255,0.6);
}
.adm-pat-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #888;
  flex-shrink: 0;
}
.adm-pat-dot.ok  { background: #3dd6c0; }
.adm-pat-dot.bad { background: var(--red); }
.btn-pat-change {
  padding: 0.3rem 0.75rem;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.8);
  font-family: var(--font-body);
  font-size: 0.76rem;
  font-weight: 600;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.15s;
}
.btn-pat-change:hover { background: rgba(255,255,255,0.2); }

/* ── PAT GATE ── */
.pat-gate {
  max-width: 480px;
  margin: 5rem auto;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 2.5rem 2rem;
  text-align: center;
  box-shadow: var(--shadow-md);
}
.pat-gate-icon { font-size: 2.5rem; margin-bottom: 1rem; }
.pat-gate h2 {
  font-family: var(--font-display);
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 0.6rem;
}
.pat-gate p {
  font-size: 0.875rem;
  color: var(--ink-light);
  line-height: 1.65;
  margin-bottom: 1.5rem;
}
.pat-input {
  width: 100%;
  font-family: var(--font-body);
  font-size: 0.88rem;
  color: var(--ink);
  background: var(--cream);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.65rem 0.9rem;
  outline: none;
  transition: border-color 0.18s, box-shadow 0.18s;
  margin-bottom: 0.75rem;
}
.pat-input:focus {
  border-color: var(--teal-dark);
  box-shadow: 0 0 0 3px rgba(61,214,192,0.15);
  background: #fff;
}
.pat-input.error { border-color: var(--red); }
.btn-pat-submit {
  width: 100%;
  padding: 0.75rem;
  background: var(--navy);
  color: #fff;
  font-family: var(--font-body);
  font-size: 0.9rem;
  font-weight: 600;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.15s;
}
.btn-pat-submit:hover { background: #1a2d52; }
.pat-error {
  font-size: 0.8rem;
  color: var(--red);
  margin-top: 0.5rem;
  display: none;
}
.pat-error.show { display: block; }

/* ── MAIN CONTENT ── */
.adm-main {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 2rem 1.5rem;
  display: none;
}
.adm-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.75rem;
  gap: 1rem;
  flex-wrap: wrap;
}
.adm-count {
  font-size: 0.82rem;
  color: var(--ink-muted);
  font-weight: 500;
}
.adm-count strong { color: var(--ink); font-size: 1rem; }
.btn-refresh {
  padding: 0.45rem 1rem;
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--ink-light);
  font-family: var(--font-body);
  font-size: 0.82rem;
  font-weight: 600;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.btn-refresh:hover { border-color: var(--teal-dark); color: var(--teal-dark); }

/* ── MEMBER ROWS ── */
.member-list { display: flex; flex-direction: column; gap: 1rem; }
.member-row {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 1.25rem 1.5rem;
  display: grid;
  grid-template-columns: 56px 1fr auto;
  align-items: center;
  gap: 1.25rem;
  transition: box-shadow 0.18s, border-color 0.18s;
}
.member-row:hover { box-shadow: var(--shadow-sm); }
.member-row.deleting { border-color: var(--red); background: var(--red-bg); }
.member-avatar {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--cream);
  border: 2px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  flex-shrink: 0;
}
.member-info { min-width: 0; }
.member-name {
  font-family: var(--font-display);
  font-size: 1rem;
  font-weight: 700;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.member-sub {
  font-size: 0.80rem;
  color: var(--teal-dark);
  font-weight: 600;
  margin-top: 0.15rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.member-meta {
  font-size: 0.76rem;
  color: var(--ink-muted);
  margin-top: 0.2rem;
}
.member-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem;
  margin-top: 0.45rem;
}
.member-tag {
  font-size: 0.68rem;
  font-weight: 600;
  color: var(--teal-dark);
  background: rgba(26,158,138,0.08);
  border: 1px solid rgba(26,158,138,0.2);
  padding: 0.1rem 0.45rem;
  border-radius: 100px;
}
.member-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 0.5rem; flex-shrink: 0; }
.btn-delete {
  padding: 0.45rem 1rem;
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--ink-muted);
  font-family: var(--font-body);
  font-size: 0.80rem;
  font-weight: 600;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-delete:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); }
.delete-confirm {
  display: none;
  align-items: center;
  gap: 0.5rem;
  flex-direction: column;
  text-align: right;
}
.delete-confirm.show { display: flex; }
.delete-confirm-text {
  font-size: 0.78rem;
  color: var(--red);
  font-weight: 600;
}
.delete-confirm-btns { display: flex; gap: 0.4rem; }
.btn-confirm-yes {
  padding: 0.4rem 0.85rem;
  background: var(--red);
  color: #fff;
  border: none;
  font-family: var(--font-body);
  font-size: 0.78rem;
  font-weight: 600;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-confirm-yes:hover { opacity: 0.88; }
.btn-confirm-yes:disabled { opacity: 0.5; cursor: default; }
.btn-confirm-no {
  padding: 0.4rem 0.85rem;
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--ink-light);
  font-family: var(--font-body);
  font-size: 0.78rem;
  font-weight: 600;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.15s;
}
.btn-confirm-no:hover { background: var(--border-light); }
.li-link {
  font-size: 0.74rem;
  color: var(--teal-dark);
  text-decoration: none;
  font-weight: 500;
}
.li-link:hover { text-decoration: underline; }

/* ── EMPTY / LOADING ── */
.adm-empty {
  text-align: center;
  padding: 4rem 1rem;
  color: var(--ink-muted);
  font-size: 0.9rem;
  line-height: 1.7;
}
.adm-empty strong { display: block; font-size: 1rem; color: var(--ink); margin-bottom: 0.4rem; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--navy);
  color: #fff;
  padding: 0.75rem 1.5rem;
  border-radius: var(--radius-md);
  font-size: 0.875rem;
  font-weight: 500;
  opacity: 0;
  transition: opacity 0.25s, transform 0.25s;
  pointer-events: none;
  z-index: 9999;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { background: var(--red); }

@media (max-width: 600px) {
  .member-row { grid-template-columns: 48px 1fr; }
  .member-actions { grid-column: 1/-1; flex-direction: row; justify-content: flex-end; }
  .delete-confirm { flex-direction: row; align-items: center; }
}
</style>

<body>

<!-- HEADER -->
<header class="adm-header">
  <div class="adm-header-left">
    <a class="adm-logo" href="/about/advisory-board.html">AESOP</a>
    <span class="adm-title">Advisory Board Admin</span>
  </div>
  <div class="adm-pat-status">
    <div class="adm-pat-dot" id="patDot"></div>
    <span id="patLabel">Not authenticated</span>
    <button class="btn-pat-change" id="btnChangePat">Sign out</button>
  </div>
</header>

<!-- PASSWORD GATE -->
<div class="pat-gate" id="patGate">
  <div class="pat-gate-icon">🔐</div>
  <h2>Admin Access</h2>
  <p>Enter the admin password to manage advisory board members.</p>
  <input type="password" class="pat-input" id="patInput" placeholder="Password" autocomplete="current-password" spellcheck="false">
  <div class="pat-error" id="patError">Incorrect password — try again.</div>
  <button class="btn-pat-submit" id="btnPatSubmit">Sign In</button>
</div>

<!-- MAIN -->
<main class="adm-main" id="admMain">
  <div class="adm-topbar">
    <div class="adm-count">
      <strong id="memberCount">0</strong> board members
    </div>
    <button class="btn-refresh" id="btnRefresh">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      Refresh
    </button>
  </div>
  <div class="member-list" id="memberList"></div>
</main>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──
// Set to your deployed Cloudflare Worker URL after running: npx wrangler deploy
const WORKER_URL = 'https://aesop-advisory-board.aesopacademy.workers.dev';
const PW_KEY     = 'ab-admin-pw';

// ── STATE ──
let adminPassword  = sessionStorage.getItem(PW_KEY) || '';
let currentMembers = [];

// ── TOAST ──
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}

// ── AUTH ──
function setAuthStatus(ok) {
  document.getElementById('patDot').className     = 'adm-pat-dot ' + (ok ? 'ok' : 'bad');
  document.getElementById('patLabel').textContent = ok ? 'Signed in' : 'Not signed in';
}

function showGate(focus) {
  document.getElementById('patGate').style.display = '';
  document.getElementById('admMain').style.display = 'none';
  if (focus) setTimeout(() => document.getElementById('patInput').focus(), 50);
}

document.getElementById('btnChangePat').addEventListener('click', () => {
  sessionStorage.removeItem(PW_KEY);
  adminPassword = '';
  setAuthStatus(false);
  document.getElementById('patInput').value = '';
  document.getElementById('patError').classList.remove('show');
  showGate(true);
});

document.getElementById('btnPatSubmit').addEventListener('click', tryAuth);
document.getElementById('patInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryAuth();
});

async function tryAuth() {
  const input = document.getElementById('patInput');
  const val   = input.value.trim();
  if (!val) { input.classList.add('error'); return; }
  input.classList.remove('error');

  const btn = document.getElementById('btnPatSubmit');
  btn.textContent = 'Checking…';
  btn.disabled    = true;

  // Test the password by calling /list (worker validates nothing for list,
  // but /remove will fail with 401 if wrong — test by doing a dummy remove)
  // Actually just try to load members; password check happens on delete.
  // We do a lightweight validation: try to list first.
  try {
    const r = await fetch(`${WORKER_URL}/list`);
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();
    adminPassword = val;
    sessionStorage.setItem(PW_KEY, val);
    document.getElementById('patError').classList.remove('show');
    document.getElementById('patGate').style.display = 'none';
    document.getElementById('admMain').style.display = 'block';
    setAuthStatus(true);
    renderFromData(d.members || []);
  } catch {
    document.getElementById('patError').textContent = 'Could not connect to worker — check URL config.';
    document.getElementById('patError').classList.add('show');
    setAuthStatus(false);
  } finally {
    btn.textContent = 'Sign In';
    btn.disabled    = false;
  }
}

// ── LOAD + RENDER ──
async function renderMembers() {
  const list = document.getElementById('memberList');
  list.innerHTML = '<div class="adm-empty">Loading…</div>';
  try {
    const r = await fetch(`${WORKER_URL}/list`);
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();
    renderFromData(d.members || []);
  } catch (err) {
    list.innerHTML = `<div class="adm-empty"><strong>Failed to load</strong>Check worker URL or try refreshing.</div>`;
  }
}

function renderFromData(members) {
  currentMembers = members;
  document.getElementById('memberCount').textContent = members.length;
  const list = document.getElementById('memberList');
  if (!members.length) {
    list.innerHTML = '<div class="adm-empty"><strong>No members yet</strong>Share the intake form to start building the board.</div>';
    return;
  }
  list.innerHTML = '';
  members.forEach((m, idx) => list.appendChild(buildRow(m, idx)));
}

document.getElementById('btnRefresh').addEventListener('click', renderMembers);

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildRow(m, idx) {
  const row = document.createElement('div');
  row.className = 'member-row';

  const addedDate = m.addedAt
    ? new Date(m.addedAt).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' })
    : '';
  const location = [m.city, m.country].filter(Boolean).join(', ');
  const tagsHtml = (m.tags && m.tags.length)
    ? `<div class="member-tags">${m.tags.map(t => `<span class="member-tag">${esc(t)}</span>`).join('')}</div>`
    : '';

  row.innerHTML = `
    <div class="member-avatar">${esc(m.emoji||'🎓')}</div>
    <div class="member-info">
      <div class="member-name">${esc(m.name)}${m.pronouns ? ` <span style="font-weight:400;font-size:0.78rem;color:var(--ink-muted)">(${esc(m.pronouns)})</span>` : ''}</div>
      <div class="member-sub">${esc(m.title)} · ${esc(m.organization)}</div>
      <div class="member-meta">📍 ${esc(location)}${addedDate ? ` &nbsp;·&nbsp; Added ${addedDate}` : ''}</div>
      ${tagsHtml}
    </div>
    <div class="member-actions">
      <a class="li-link" href="${esc(m.linkedin)}" target="_blank" rel="noopener">LinkedIn ↗</a>
      <button class="btn-delete">Remove</button>
      <div class="delete-confirm" id="confirm-${idx}">
        <div class="delete-confirm-text">Remove ${esc(m.name)}?</div>
        <div class="delete-confirm-btns">
          <button class="btn-confirm-yes">Yes, remove</button>
          <button class="btn-confirm-no">Cancel</button>
        </div>
      </div>
    </div>`;

  row.querySelector('.btn-delete').addEventListener('click', () => {
    row.classList.add('deleting');
    document.getElementById(`confirm-${idx}`).classList.add('show');
    row.querySelector('.btn-delete').style.display = 'none';
  });

  row.querySelector('.btn-confirm-no').addEventListener('click', () => {
    row.classList.remove('deleting');
    document.getElementById(`confirm-${idx}`).classList.remove('show');
    row.querySelector('.btn-delete').style.display = '';
  });

  row.querySelector('.btn-confirm-yes').addEventListener('click', async () => {
    const yesBtn = row.querySelector('.btn-confirm-yes');
    yesBtn.disabled    = true;
    yesBtn.textContent = 'Removing…';
    try {
      const r = await fetch(`${WORKER_URL}/remove`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ id: m.id, password: adminPassword }),
      });
      if (r.status === 401) {
        showToast('Incorrect password', true);
        yesBtn.disabled = false;
        yesBtn.textContent = 'Yes, remove';
        row.classList.remove('deleting');
        document.getElementById(`confirm-${idx}`).classList.remove('show');
        row.querySelector('.btn-delete').style.display = '';
        return;
      }
      if (!r.ok) throw new Error(r.status);

      row.style.transition = 'opacity 0.3s';
      row.style.opacity    = '0';
      setTimeout(() => { row.remove(); }, 320);
      currentMembers = currentMembers.filter((_, i) => i !== idx);
      document.getElementById('memberCount').textContent = currentMembers.length;
      showToast(`${m.name} removed from advisory board`);
      setTimeout(renderMembers, 500);
    } catch (err) {
      yesBtn.disabled    = false;
      yesBtn.textContent = 'Yes, remove';
      row.classList.remove('deleting');
      document.getElementById(`confirm-${idx}`).classList.remove('show');
      row.querySelector('.btn-delete').style.display = '';
      showToast(`Remove failed — try again`, true);
    }
  });

  return row;
}

// ── INIT ──
if (adminPassword) {
  fetch(`${WORKER_URL}/list`)
    .then(r => r.ok ? r.json() : Promise.reject(r.status))
    .then(d => {
      document.getElementById('patGate').style.display = 'none';
      document.getElementById('admMain').style.display = 'block';
      setAuthStatus(true);
      renderFromData(d.members || []);
    })
    .catch(() => showGate(false));
} else {
  showGate(false);
}
</script>
</body>
