<style>
body {
  overflow-x: hidden;
  padding-top: 118px;
}

.apply-hero {
  background: var(--navy);
  color: var(--white);
  padding: 4rem 2rem 3.5rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.apply-hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 600px 300px at 20% 80%, rgba(201,160,90,0.10) 0%, transparent 70%),
    radial-gradient(ellipse 400px 400px at 80% 20%, rgba(61,214,192,0.07) 0%, transparent 70%);
  pointer-events: none;
}
.apply-hero-inner {
  position: relative;
  z-index: 1;
  max-width: 640px;
  margin: 0 auto;
}
.apply-hero-label {
  display: inline-block;
  font-family: var(--font-body);
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gold-light);
  border: 1px solid rgba(201,160,90,0.35);
  background: rgba(201,160,90,0.10);
  padding: 0.3rem 1rem;
  border-radius: 100px;
  margin-bottom: 1.25rem;
}
.apply-hero h1 {
  font-family: var(--font-display);
  font-size: 2.4rem;
  font-weight: 700;
  color: #fff;
  line-height: 1.15;
  margin-bottom: 1rem;
}
.apply-hero p {
  font-size: 1rem;
  color: rgba(255,255,255,0.70);
  line-height: 1.65;
}

.apply-card {
  margin: 3.5rem 0 5rem;
  padding: 0 12.5%;
}

.apply-field {
  margin-bottom: 1.5rem;
}
.apply-label {
  display: block;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 0.6rem;
}

/* Board selector — checkbox cards */
.board-options {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
}
.board-option input[type="checkbox"] {
  position: absolute;
  opacity: 0;
  width: 0;
  height: 0;
}
.board-option label {
  display: flex;
  align-items: center;
  gap: 0.9rem;
  padding: 0.9rem 1.1rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  background: var(--white);
}
.board-option label:hover {
  border-color: var(--gold);
  background: rgba(201,160,90,0.04);
}
.board-option input[type="checkbox"]:checked + label {
  border-color: var(--gold);
  background: rgba(201,160,90,0.08);
}
.board-option-dot {
  width: 16px;
  height: 16px;
  border-radius: 3px;
  border: 2px solid var(--border);
  flex-shrink: 0;
  transition: border-color 0.15s, background 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.board-option input[type="checkbox"]:checked + label .board-option-dot {
  border-color: var(--gold);
  background: var(--gold);
}
.board-option input[type="checkbox"]:checked + label .board-option-dot::after {
  content: '';
  width: 9px;
  height: 5px;
  border-left: 2px solid var(--navy);
  border-bottom: 2px solid var(--navy);
  transform: rotate(-45deg) translateY(-1px);
  display: block;
}
.board-option-text {
  flex: 1;
}
.board-option-name {
  font-size: 0.92rem;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.3;
}
.board-option-desc {
  font-size: 0.78rem;
  color: var(--ink-muted);
  margin-top: 0.15rem;
  line-height: 1.4;
}

/* Founders board — locked state */
.board-option.founders-locked label {
  opacity: 0.45;
  cursor: not-allowed;
  border-style: dashed;
}
.board-option.founders-locked label:hover {
  border-color: var(--border);
  background: var(--white);
}
.founders-hint {
  font-size: 0.75rem;
  color: var(--ink-muted);
  margin-top: 0.35rem;
  padding-left: 1.1rem;
  line-height: 1.5;
}
.founders-hint strong {
  color: var(--gold);
}

.apply-btn {
  display: block;
  width: 100%;
  padding: 0.85rem 1.5rem;
  background: var(--gold);
  color: var(--navy);
  border: none;
  border-radius: var(--radius-md);
  font-family: var(--font-body);
  font-size: 0.92rem;
  font-weight: 700;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  margin-top: 2rem;
  text-align: center;
}
.apply-btn:hover { background: var(--gold-light); transform: translateY(-1px); }
.apply-btn:active { transform: translateY(0); }
.apply-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

.apply-back {
  display: block;
  text-align: center;
  margin-top: 1.25rem;
  font-size: 0.82rem;
  color: var(--ink-muted);
}
.apply-back a { color: var(--teal-dark); font-weight: 500; }
</style>

<meta property="og:title" content="Join an Advisory Board — AESOP AI Academy">
<meta property="og:description" content="Apply to join one of AESOP AI Academy">
<meta property="og:url" content="https://aesopacademy.org/about/advisory-board-apply.html">
<meta property="og:site_name" content="AESOP AI Academy">
<meta property="og:type" content="website">
<meta property="og:image" content="https://aesopacademy.org/og-image2.jpg">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@aesopacademy">
<meta name="twitter:title" content="Join an Advisory Board — AESOP AI Academy">
<meta name="twitter:description" content="Apply to join one of AESOP AI Academy">
<meta name="twitter:image" content="https://aesopacademy.org/og-image2.jpg">
</head>
<body>

<section class="apply-hero">
  <div class="apply-hero-inner">
    <div class="apply-hero-label">Advisory Boards</div>
    <h1>Join an Advisory Board</h1>
    <p>Select the board that best matches your background and expertise. We'll connect you with the right team.</p>
  </div>
</section>

<div class="apply-card">
  <div class="apply-field">
    <span class="apply-label">Which board(s) are you applying for? Select all that apply.</span>
    <div class="board-options">

      <div class="board-option">
        <input type="checkbox" name="board" id="board-brand" value="Brand Advisory Board">
        <label for="board-brand">
          <div class="board-option-dot"></div>
          <div class="board-option-text">
            <div class="board-option-name">Brand Advisory Board</div>
            <div class="board-option-desc">Strategic guidance on brand, partnerships, and growth</div>
          </div>
        </label>
      </div>

      <div class="board-option">
        <input type="checkbox" name="board" id="board-education" value="Education Advisory Board">
        <label for="board-education">
          <div class="board-option-dot"></div>
          <div class="board-option-text">
            <div class="board-option-name">Education Advisory Board</div>
            <div class="board-option-desc">Curriculum design, learning science, and academic partnerships</div>
          </div>
        </label>
      </div>

      <div class="board-option">
        <input type="checkbox" name="board" id="board-technical" value="Technical Advisory Board">
        <label for="board-technical">
          <div class="board-option-dot"></div>
          <div class="board-option-text">
            <div class="board-option-name">Technical Advisory Board</div>
            <div class="board-option-desc">Engineering, AI research, and platform architecture</div>
          </div>
        </label>
      </div>

      <div class="board-option">
        <input type="checkbox" name="board" id="board-military" value="Military Outreach Board">
        <label for="board-military">
          <div class="board-option-dot"></div>
          <div class="board-option-text">
            <div class="board-option-name">Military Outreach Board</div>
            <div class="board-option-desc">AI literacy for active service members and transitioning veterans</div>
          </div>
        </label>
      </div>

      <div class="board-option">
        <input type="checkbox" name="board" id="board-international" value="International Board">
        <label for="board-international">
          <div class="board-option-dot"></div>
          <div class="board-option-text">
            <div class="board-option-name">International Board</div>
            <div class="board-option-desc">Course development and outreach for international learners across 12 languages</div>
          </div>
        </label>
      </div>

      <div class="board-option founders-locked" id="founders-option">
        <input type="checkbox" name="board" id="board-founders" value="Founders Board" disabled>
        <label for="board-founders">
          <div class="board-option-dot"></div>
          <div class="board-option-text">
            <div class="board-option-name">Founders Board</div>
            <div class="board-option-desc">Cross-functional leadership across all advisory domains — the deepest level of engagement</div>
          </div>
        </label>
      </div>
      <p class="founders-hint" id="founders-hint">Select at least <strong>3 boards above</strong> to unlock the Founders Board.</p>

    </div>
  </div>

  <button class="apply-btn" id="applyBtn" disabled onclick="sendApplication()">Continue to Application &rarr;</button>

  <p class="apply-back">
    <a href="/about/advisory-board.html">&larr; View Advisory Boards</a>
  </p>
</div>

<script src="/assets/top-banner-v2.js?v=2"></script>
<script>
var regularBoards = document.querySelectorAll('input[name="board"]:not(#board-founders)');
var foundersCheckbox = document.getElementById('board-founders');
var foundersOption = document.getElementById('founders-option');
var foundersHint = document.getElementById('founders-hint');
var applyBtn = document.getElementById('applyBtn');

function updateState() {
  var checkedCount = document.querySelectorAll('input[name="board"]:not(#board-founders):checked').length;
  var foundersUnlocked = checkedCount >= 3;

  foundersCheckbox.disabled = !foundersUnlocked;
  foundersOption.classList.toggle('founders-locked', !foundersUnlocked);

  if (foundersUnlocked) {
    foundersHint.innerHTML = 'Founders Board unlocked. You may add it to your application.';
    foundersHint.style.color = 'var(--gold)';
  } else {
    var remaining = 3 - checkedCount;
    foundersHint.innerHTML = 'Select at least <strong>3 boards above</strong> to unlock the Founders Board'
      + (checkedCount > 0 ? ' (' + remaining + ' more needed).' : '.');
    foundersHint.style.color = '';
  }

  if (!foundersUnlocked && foundersCheckbox.checked) {
    foundersCheckbox.checked = false;
  }

  var anyChecked = document.querySelectorAll('input[name="board"]:checked').length > 0;
  applyBtn.disabled = !anyChecked;
}

regularBoards.forEach(function(cb) {
  cb.addEventListener('change', updateState);
});
foundersCheckbox.addEventListener('change', updateState);

function sendApplication() {
  var selected = Array.from(document.querySelectorAll('input[name="board"]:checked'))
    .map(function(cb) { return cb.value; });
  if (!selected.length) return;
  window.location.href = '/about/advisoryboard-form.html';
}
</script>
</body>
</html>
