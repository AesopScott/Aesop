<!doctype html>
<!-- v1.0.1 | 2026-04-28 -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Board Update Requests &mdash; AESOP Admin</title>
<meta name="robots" content="noindex,nofollow">
<style>
:root {
  --bg:     #0f172a;
  --fg:     #e2e8f0;
  --muted:  #94a3b8;
  --card:   #1e293b;
  --card2:  #162032;
  --border: #334155;
  --accent: #c9a05a;
  --ok:     #22c55e;
  --warn:   #f59e0b;
  --err:    #ef4444;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font: 14px/1.5 system-ui,-apple-system,Segoe UI,sans-serif; background: var(--bg); color: var(--fg); min-height: 100vh; }

.auth-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.97); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.auth-box { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 28px; width: 360px; max-width: 92vw; text-align: center; }
.auth-logo { font-size: 32px; margin-bottom: 8px; }
.auth-box h2 { margin: 4px 0 6px; font-size: 18px; }
.auth-box p { color: var(--muted); font-size: 13px; margin: 0 0 16px; }
.auth-input { width: 100%; padding: 9px 11px; margin: 6px 0; background: #0f172a; color: var(--fg); border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
.auth-input:focus { outline: none; border-color: var(--accent); }
.auth-btn { width: 100%; padding: 9px; margin-top: 8px; background: var(--accent); color: #0b1220; border: 0; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 14px; }
.auth-btn:hover { filter: brightness(1.1); }
.auth-error { color: var(--err); font-size: 12px; min-height: 16px; margin-top: 8px; }

header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; background: #0b1220; }
header h1 { font-size: 17px; font-weight: 700; }
.header-right { display: flex; align-items: center; gap: 12px; }
.user-label { color: var(--muted); font-size: 12px; }
.signout-btn { background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 12px; }
.signout-btn:hover { color: var(--fg); border-color: var(--fg); }

.toolbar { display: flex; gap: 8px; align-items: center; padding: 12px 24px; border-bottom: 1px solid var(--border); background: #0b1220; flex-wrap: wrap; }
.filter-btn { padding: 5px 14px; border-radius: 100px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.15s; }
.filter-btn.active { background: var(--accent); color: #0b1220; border-color: var(--accent); font-weight: 700; }
.filter-btn:hover:not(.active) { border-color: var(--fg); color: var(--fg); }
.count-badge { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 100px; background: var(--err); color: #fff; font-size: 10px; font-weight: 700; margin-left: 5px; vertical-align: middle; }

main { padding: 24px; }
.empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); }
.empty-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.4; }
.loading { text-align: center; padding: 3rem; color: var(--muted); }

.request-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
.request-card.status-pending  { border-left: 3px solid var(--warn); }
.request-card.status-approved { border-left: 3px solid var(--ok);  opacity: 0.85; }
.request-card.status-rejected { border-left: 3px solid var(--err); opacity: 0.6; }
.request-card.status-applied  { border-left: 3px solid #38bdf8;   opacity: 0.7; }

.card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 14px 16px 10px; }
.card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
.board-pill { display: inline-block; padding: 2px 10px; border-radius: 100px; font-size: 11px; font-weight: 700; background: rgba(201,160,90,0.15); color: var(--accent); border: 1px solid rgba(201,160,90,0.3); }
.change-type { font-size: 11px; color: var(--muted); background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 100px; padding: 2px 9px; }
.member-name { font-weight: 700; font-size: 15px; }
.submitted-time { font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }

.card-body { padding: 0 16px 14px; }
.field-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; margin-top: 10px; }
.proposed-value { background: var(--card2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.context-value { font-size: 12px; color: var(--muted); line-height: 1.6; margin-top: 4px; }

.card-actions { display: flex; align-items: center; gap: 8px; padding: 10px 16px 14px; border-top: 1px solid var(--border); flex-wrap: wrap; }
.note-input { flex: 1; min-width: 160px; padding: 6px 10px; background: #0f172a; color: var(--fg); border: 1px solid var(--border); border-radius: 6px; font-size: 12px; }
.note-input:focus { outline: none; border-color: var(--accent); }
.btn-approve { padding: 6px 16px; background: var(--ok);  color: #052e16; border: 0; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; }
.btn-reject  { padding: 6px 16px; background: var(--err); color: #fff;    border: 0; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; }
.btn-applied { padding: 6px 16px; background: #38bdf8;    color: #0c2231; border: 0; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; }
.btn-approve:hover, .btn-reject:hover, .btn-applied:hover { filter: brightness(1.1); }
.btn-approve:disabled, .btn-reject:disabled, .btn-applied:disabled { opacity: 0.5; cursor: not-allowed; }

.status-badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 100px; }
.status-badge.pending  { background: rgba(245,158,11,0.15); color: var(--warn); }
.status-badge.approved { background: rgba(34,197,94,0.15);  color: var(--ok); }
.status-badge.rejected { background: rgba(239,68,68,0.15);  color: var(--err); }
.status-badge.applied  { background: rgba(56,189,248,0.12); color: #38bdf8; }
.review-note { font-size: 11px; color: var(--muted); font-style: italic; margin-left: 4px; }
</style>
</head>
<body>

<div class="auth-overlay" id="auth-overlay" style="display:none">
  <div class="auth-box">
    <div class="auth-logo">🔐</div>
    <h2>AESOP Admin Access</h2>
    <p>Sign in to manage board update requests.</p>
    <input class="auth-input" id="auth-email" type="email" placeholder="Admin email" autocomplete="email">
    <input class="auth-input" id="auth-pass"  type="password" placeholder="Password" autocomplete="current-password">
    <button class="auth-btn" id="auth-btn">Sign In</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<div id="app" style="display:none">
  <header>
    <h1>&#128203; Board Update Requests</h1>
    <div class="header-right">
      <span class="user-label" id="userLabel"></span>
      <button class="signout-btn" id="signOutBtn">Sign out</button>
    </div>
  </header>

  <div class="toolbar">
    <button class="filter-btn active" data-filter="pending">Pending <span class="count-badge" id="pendingCount" style="display:none">0</span></button>
    <button class="filter-btn" data-filter="approved">Approved</button>
    <button class="filter-btn" data-filter="applied">Applied</button>
    <button class="filter-btn" data-filter="rejected">Rejected</button>
    <button class="filter-btn" data-filter="all">All</button>
  </div>

  <main>
    <div class="loading" id="loadingMsg">Loading requests…</div>
    <div id="requestList"></div>
  </main>
</div>

<script type="module">
import { initializeApp }   from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut }
                           from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, serverTimestamp }
                           from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey:            'AIzaSyAPLGIn4wqgTL92VZFXuu8-ZgxMBBT2eKY',
  authDomain:        'playagame-f733d.firebaseapp.com',
  projectId:         'playagame-f733d',
  storageBucket:     'playagame-f733d.firebasestorage.app',
  messagingSenderId: '610508714644',
  appId:             '1:610508714644:web:b7df8f61ce21cf1281ba81'
};

const ADMIN_EMAILS = ['scott@aesopacademy.org'];
const isAdmin = u => u && ADMIN_EMAILS.includes(u.email);

const fireApp = initializeApp(firebaseConfig);
const auth    = getAuth(fireApp);
const db      = getFirestore(fireApp);

const overlay = document.getElementById('auth-overlay');
const appEl   = document.getElementById('app');
const errEl   = document.getElementById('auth-error');

document.getElementById('auth-btn').addEventListener('click', doSignIn);
['auth-pass','auth-email'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doSignIn(); });
});
document.getElementById('signOutBtn').addEventListener('click', () => signOut(auth));

async function doSignIn() {
  errEl.textContent = '';
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-pass').value;
  if (!email || !pass) { errEl.textContent = 'Email and password required.'; return; }
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) {
    errEl.textContent = (['auth/invalid-credential','auth/wrong-password','auth/user-not-found'].includes(e.code))
      ? 'Invalid email or password.' : (e.message || 'Sign in failed.');
  }
}

let allRequests   = [];
let currentFilter = 'pending';
let unsubscribe   = null;

onAuthStateChanged(auth, user => {
  if (user && isAdmin(user)) {
    overlay.style.display = 'none';
    appEl.style.display   = 'block';
    document.getElementById('userLabel').textContent = user.email;
    if (!unsubscribe) startListening();
  } else if (user && !isAdmin(user)) {
    overlay.style.display = 'flex';
    appEl.style.display   = 'none';
    errEl.textContent = 'This account does not have admin access.';
    signOut(auth);
  } else {
    overlay.style.display = 'flex';
    appEl.style.display   = 'none';
    if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  }
});

function startListening() {
  const q = query(collection(db, 'boardUpdateRequests'), orderBy('submittedAt', 'desc'));
  unsubscribe = onSnapshot(q, snap => {
    allRequests = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

function render() {
  const pending = allRequests.filter(r => r.status === 'pending');
  const badge   = document.getElementById('pendingCount');
  badge.textContent    = pending.length;
  badge.style.display  = pending.length ? 'inline-flex' : 'none';

  const filtered = currentFilter === 'all'
    ? allRequests
    : allRequests.filter(r => r.status === currentFilter);

  document.getElementById('loadingMsg').style.display = 'none';
  const list = document.getElementById('requestList');

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">&#128203;</div><p>No ${currentFilter === 'all' ? '' : currentFilter + ' '}requests.</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(cardHTML).join('');

  list.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const noteEl = list.querySelector('#note-' + btn.dataset.id);
      handleAction(btn.dataset.id, btn.dataset.action, noteEl ? noteEl.value.trim() : '', btn);
    });
  });
}

function cardHTML(r) {
  const time = r.submittedAt ? fmtTime(r.submittedAt.toDate()) : '—';
  const badges = { pending:'pending', approved:'approved', rejected:'rejected', applied:'applied' };
  const statusBadge = `<span class="status-badge ${badges[r.status] || ''}">${
    {pending:'● Pending', approved:'✓ Approved', rejected:'✕ Rejected', applied:'▶ Applied'}[r.status] || r.status
  }</span>`;
  const reviewNote = (r.status !== 'pending' && r.reviewNote)
    ? `<span class="review-note">"${esc(r.reviewNote)}"</span>` : '';

  let actions = '';
  if (r.status === 'pending') {
    actions = `<div class="card-actions">
      <input class="note-input" id="note-${r.id}" placeholder="Optional note…">
      <button class="btn-approve" data-action="approved" data-id="${r.id}">✓ Approve</button>
      <button class="btn-reject"  data-action="rejected" data-id="${r.id}">✕ Reject</button>
    </div>`;
  } else if (r.status === 'approved') {
    actions = `<div class="card-actions">
      <button class="btn-applied" data-action="applied" data-id="${r.id}">▶ Mark as Applied to Site</button>
    </div>`;
  }

  return `<div class="request-card status-${r.status}" id="card-${r.id}">
  <div class="card-header">
    <div>
      <div class="card-meta">
        <span class="board-pill">${esc(r.board)}</span>
        <span class="change-type">${esc(r.changeType)}</span>
        ${statusBadge}${reviewNote}
      </div>
      <div class="member-name">${esc(r.memberName)}</div>
    </div>
    <div class="submitted-time">${time}</div>
  </div>
  <div class="card-body">
    <div class="field-label">Proposed update</div>
    <div class="proposed-value">${esc(r.proposedValue)}</div>
    ${r.context ? `<div class="field-label">Context</div><div class="context-value">${esc(r.context)}</div>` : ''}
  </div>
  ${actions}
</div>`;
}

async function handleAction(id, action, note, btn) {
  btn.disabled = true;
  const update = action === 'applied'
    ? { status: 'applied', appliedAt: serverTimestamp() }
    : { status: action, reviewedAt: serverTimestamp(), ...(note ? { reviewNote: note } : {}) };
  try {
    await updateDoc(doc(db, 'boardUpdateRequests', id), update);
  } catch (e) {
    alert('Update failed: ' + e.message);
    btn.disabled = false;
  }
}

function fmtTime(d) {
  const diff  = Date.now() - d.getTime();
  const mins  = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days  = Math.floor(diff / 86400000);
  if (mins < 2)   return 'just now';
  if (mins < 60)  return mins + 'm ago';
  if (hours < 24) return hours + 'h ago';
  if (days < 7)   return days + 'd ago';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
