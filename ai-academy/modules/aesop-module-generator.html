<!DOCTYPE html>
<html lang="en">
<head>
<!-- aesop-module-generator-v1.0.1 | AESOP AI Academy Module Builder | April 2026 -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AESOP Module Generator</title>
<style>
:root { --navy:#0d1b2a; --gold:#c9a05a; --gold-light:#dbb87a; --teal:#1D9E75; --cream:#faf8f4; --border:#e2d9cc; --red:#e05c5c; }
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--navy);color:var(--cream);min-height:100vh;}
.header{background:#060e18;border-bottom:1px solid rgba(201,160,90,0.2);padding:1rem 2rem;display:flex;align-items:center;gap:1rem;}
.header-brand{font-family:Georgia,serif;font-size:1.2rem;font-weight:700;color:var(--gold);}
.header-sub{font-size:0.8rem;color:rgba(255,255,255,0.4);}
.main{max-width:900px;margin:0 auto;padding:2rem;}
.card{background:#0e1a26;border:1px solid rgba(201,160,90,0.15);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;}
.card-title{font-family:Georgia,serif;font-size:1rem;font-weight:700;color:var(--gold);margin-bottom:1rem;letter-spacing:0.05em;text-transform:uppercase;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
.form-group{display:flex;flex-direction:column;gap:0.4rem;}
label{font-size:0.78rem;font-weight:600;color:rgba(255,255,255,0.5);letter-spacing:0.06em;text-transform:uppercase;}
select,input,textarea{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:0.6rem 0.9rem;font-size:0.9rem;color:var(--cream);font-family:inherit;width:100%;transition:border-color 0.15s;}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--gold);}
textarea{resize:vertical;min-height:80px;}
.btn-generate{width:100%;background:var(--gold);color:var(--navy);border:none;border-radius:10px;padding:1rem 2rem;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.15s;font-family:inherit;}
.btn-generate:hover{background:var(--gold-light);}
.btn-generate:disabled{opacity:0.5;cursor:not-allowed;}
.status{border-radius:8px;padding:0.75rem 1rem;font-size:0.88rem;margin-bottom:1rem;display:none;}
.status.info{background:rgba(29,158,117,0.1);border:1px solid rgba(29,158,117,0.3);color:#5dd6a8;display:block;}
.status.error{background:rgba(224,92,92,0.1);border:1px solid rgba(224,92,92,0.3);color:#f08080;display:block;}
.progress-log{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:1rem;font-size:0.8rem;font-family:monospace;color:rgba(255,255,255,0.6);max-height:200px;overflow-y:auto;display:none;white-space:pre-wrap;line-height:1.6;}
.progress-log.visible{display:block;}
.output-area{display:none;}
.output-area.visible{display:block;margin-top:1.5rem;}
.output-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;}
.output-filename{font-size:0.85rem;color:var(--gold);font-family:monospace;}
.btn-download{background:var(--teal);color:white;border:none;border-radius:8px;padding:0.6rem 1.25rem;font-size:0.85rem;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-download:hover{opacity:0.85;}
.output-preview{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:1rem;font-size:0.75rem;font-family:monospace;color:rgba(255,255,255,0.5);max-height:300px;overflow-y:auto;white-space:pre-wrap;line-height:1.5;}
.api-key-note{font-size:0.75rem;color:rgba(255,255,255,0.3);margin-top:0.4rem;}
.tier-chips{display:flex;gap:0.5rem;}
.tier-chip{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:0.6rem;text-align:center;cursor:pointer;transition:all 0.15s;font-size:0.82rem;}
.tier-chip:hover{border-color:var(--gold);}
.tier-chip.selected{border-color:var(--gold);background:rgba(201,160,90,0.12);color:var(--gold);}
.mod-info{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:0.75rem 1rem;font-size:0.82rem;color:rgba(255,255,255,0.5);margin-top:0.5rem;display:none;}
.mod-info.visible{display:block;}
.mod-info strong{color:var(--gold-light);}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-brand">AESOP AI Academy</div>
    <div class="header-sub">Module Generator v1.0.1</div>
  </div>
</div>

<div class="main">

  <div class="card">
    <div class="card-title">API Key</div>
    <div class="form-group">
      <label>Anthropic API Key</label>
      <input type="password" id="apiKey" placeholder="sk-ant-..." />
      <div class="api-key-note">Stored in memory only — never sent anywhere except api.anthropic.com</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Module Selection</div>
    <div class="form-row">
      <div class="form-group">
        <label>Course</label>
        <select id="courseSelect" onchange="onCourseChange()">
          <option value="">— Select course —</option>
        </select>
      </div>
      <div class="form-group">
        <label>Module</label>
        <select id="moduleSelect" onchange="onModuleChange()" disabled>
          <option value="">— Select module —</option>
        </select>
      </div>
    </div>
    <div class="mod-info" id="modInfo"></div>
  </div>

  <div class="card">
    <div class="card-title">Tier</div>
    <div class="tier-chips">
      <div class="tier-chip" data-tier="intro" onclick="selectTier(this)">\u2B50 Introduction</div>
      <div class="tier-chip" data-tier="basic" onclick="selectTier(this)">\u{1F52C} Basic</div>
      <div class="tier-chip" data-tier="advanced" onclick="selectTier(this)">\u{1F3AF} Advanced</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Content Guidance (Optional)</div>
    <div class="form-row">
      <div class="form-group">
        <label>Protagonist / Character Name (Intro/Basic)</label>
        <input type="text" id="protagonist" placeholder="e.g. Jordan, Maya, Alex..." />
      </div>
      <div class="form-group">
        <label>AI Character / Tool Name</label>
        <input type="text" id="aiChar" placeholder="e.g. LIBREX, ARIA, SAGE..." />
      </div>
    </div>
    <div class="form-group">
      <label>Additional Notes for Claude</label>
      <textarea id="notes" placeholder="Any specific angles, examples, real-world cases, or constraints..."></textarea>
    </div>
  </div>

  <div id="statusMsg" class="status"></div>
  <div id="progressLog" class="progress-log"></div>

  <button class="btn-generate" id="generateBtn" onclick="generate()">Generate Module</button>

  <div class="output-area" id="outputArea">
    <div class="card">
      <div class="output-header">
        <span class="output-filename" id="outputFilename"></span>
        <button class="btn-download" onclick="downloadFile()">Download File</button>
      </div>
      <div class="output-preview" id="outputPreview"></div>
    </div>
  </div>

</div>

<script>
const COURSES = [
  { id:'governance', name:'AI Governance', modules:[
    {n:1,title:'Defining AI Governance',sub:'What it is, what it isnt, and why the question matters more than the answer'},
    {n:2,title:'The Worlds First AI Law',sub:'How Europe decided to regulate AI and what that means for everyone'},
    {n:3,title:'The US Approach',sub:'Voluntary frameworks, principles-based guidance, and the theory behind American AI policy'},
    {n:4,title:'Chinas AI Governance Framework',sub:'State-centric regulation, targeted rules, and a different theory of what AI governance means'},
    {n:5,title:'Corporate AI Governance Structures',sub:'How organizations govern AI internally and the gap between policy and practice'},
    {n:6,title:'How AI Auditing Works',sub:'Technical audits, process audits, and outcome audits and why each alone is insufficient'},
    {n:7,title:'What Corporate AI Policies Contain',sub:'The anatomy of a corporate AI policy and why structure matters for reading critically'},
    {n:8,title:'Policy Drafting Fundamentals',sub:'How to write AI governance policy that creates real obligations not just intentions'}
  ]},
  { id:'society', name:'AI in Society', modules:[
    {n:1,title:'AI Is Already Everywhere',sub:'Mapping the systems shaping your day before you notice them'},
    {n:2,title:'What AI Actually Does to Jobs',sub:'Task automation, labor market power, and what the evidence says'},
    {n:3,title:'Disinformation at Scale',sub:'How AI changes the production, spread, and detection of false information'},
    {n:4,title:'Facial Recognition and Biometric Surveillance',sub:'How AI identifies people at scale and what that changes about being in public'},
    {n:5,title:'The Digital Divide and AI Access',sub:'Who gets AIs benefits and who gets left out'},
    {n:6,title:'AI and Community',sub:'How AI shapes local communities, services, and civic life'},
    {n:7,title:'The Energy Cost of AI',sub:'What training and running AI actually costs the planet'},
    {n:8,title:'Forecasting AI',sub:'How to think about AIs future without falling for hype or dismissal'}
  ]},
  { id:'creativity', name:'AI and Creativity', modules:[
    {n:1,title:'How Generative AI Works',sub:'The mechanics behind text, image, and audio generation'},
    {n:2,title:'AI and Writing',sub:'How AI transforms the writing process for better and for worse'},
    {n:3,title:'AI and Visual Art',sub:'What generative image tools actually do and what that means for artists'},
    {n:4,title:'AI and Music',sub:'Generation, remixing, and the future of sonic creativity'},
    {n:5,title:'The Consent and Copyright Problem',sub:'Training data, ownership, and the legal battles reshaping creative AI'},
    {n:6,title:'Protecting Your Creative Voice',sub:'How to use AI without losing what makes your work yours'},
    {n:7,title:'AI as a Creative Partner',sub:'Collaboration models, workflows, and where AI fits in your process'},
    {n:8,title:'The Future of Creative Work',sub:'What changes, what doesnt, and how to stay relevant'}
  ]},
  { id:'ethics', name:'AI Ethics and Decision-Making', modules:[
    {n:1,title:'When Machines Decide',sub:'Algorithmic decision-making and what it means for fairness and accountability'},
    {n:2,title:'Surveillance at Scale',sub:'How AI-powered monitoring changes the relationship between institutions and people'},
    {n:3,title:'The Consent You Never Gave',sub:'Data collection, inference, and the limits of privacy in an AI world'},
    {n:4,title:'The Professionals Dilemma',sub:'AI in medicine, law, and journalism and what happens when it is wrong'},
    {n:5,title:'AI and Democracy',sub:'Manipulation, microtargeting, and the integrity of information in democratic systems'},
    {n:6,title:'AI in Healthcare',sub:'Diagnostic AI, clinical decision support, and the ethics of algorithmic medicine'},
    {n:7,title:'Autonomous Systems and Moral Agency',sub:'Who is responsible when AI causes harm'},
    {n:8,title:'AI and Human Identity',sub:'What AI reveals about consciousness, agency, and what it means to be human'}
  ]},
  { id:'building', name:'Building with AI', modules:[
    {n:1,title:'Thinking Like a Builder',sub:'Problem framing, tool selection, and the mindset behind AI product development'},
    {n:2,title:'Prompt Engineering',sub:'How to communicate with AI systems effectively and reliably'},
    {n:3,title:'Working with APIs',sub:'Connecting AI capabilities to real applications'},
    {n:4,title:'AI Tool Integration',sub:'Embedding AI into workflows, products, and systems'},
    {n:5,title:'Designing AI Products',sub:'UX, trust, and the design principles unique to AI-powered interfaces'},
    {n:6,title:'Evaluating AI Output',sub:'Testing, validation, and knowing when AI output is good enough'},
    {n:7,title:'Responsible Building',sub:'Safety, fairness, and accountability in AI product development'},
    {n:8,title:'Your First AI Project',sub:'End-to-end build: from idea to deployed AI-powered application'}
  ]},
  { id:'careers', name:'AI Careers and Research', modules:[
    {n:1,title:'The AI Career Landscape',sub:'Who works in AI, what they do, and how the field is evolving'},
    {n:2,title:'Technical Roles',sub:'Engineering, research, and data science careers in AI'},
    {n:3,title:'Policy and Governance Roles',sub:'The emerging field of AI policy and how to enter it'},
    {n:4,title:'Creative and Design Roles',sub:'How creative professionals work with and alongside AI systems'},
    {n:5,title:'Reading AI Research',sub:'How to understand, evaluate, and stay current with AI literature'},
    {n:6,title:'Your Skill Roadmap',sub:'Building the capabilities that matter most for your AI career path'}
  ]}
];

const TIER_CONFIG = {
  intro:    {label:'Introduction', emoji:'\u2B50', groupId:1, accent:'#fbbf24', accentRgb:'251,191,36',  lessons:4},
  basic:    {label:'Basic',        emoji:'\U0001F52C', groupId:2, accent:'#c084fc', accentRgb:'192,132,252', lessons:6},
  advanced: {label:'Advanced',     emoji:'\U0001F3AF', groupId:3, accent:'#f43f5e', accentRgb:'244,63,94',   lessons:8}
};

let selectedTier = null, generatedContent = '', generatedFilename = '';

function init() {
  const sel = document.getElementById('courseSelect');
  COURSES.forEach(c => {
    const o = document.createElement('option');
    o.value = c.id; o.textContent = c.name;
    sel.appendChild(o);
  });
}

function onCourseChange() {
  const cid = document.getElementById('courseSelect').value;
  const ms = document.getElementById('moduleSelect');
  ms.innerHTML = '<option value="">— Select module —</option>';
  ms.disabled = !cid;
  document.getElementById('modInfo').classList.remove('visible');
  if (!cid) return;
  const course = COURSES.find(c => c.id === cid);
  course.modules.forEach(m => {
    const o = document.createElement('option');
    o.value = m.n; o.textContent = 'M' + m.n + ': ' + m.title;
    ms.appendChild(o);
  });
}

function onModuleChange() {
  const cid = document.getElementById('courseSelect').value;
  const mn = parseInt(document.getElementById('moduleSelect').value);
  const el = document.getElementById('modInfo');
  if (!cid || !mn) { el.classList.remove('visible'); return; }
  const mod = COURSES.find(c => c.id === cid).modules.find(m => m.n === mn);
  el.innerHTML = '<strong>' + mod.title + '</strong><br>' + mod.sub;
  el.classList.add('visible');
}

function selectTier(el) {
  document.querySelectorAll('.tier-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedTier = el.dataset.tier;
}

function buildSystemPrompt(course, mod, tier, tc) {
  const narrativeRule = tier === 'intro'
    ? '~80% narrative. Named characters. Story creates the problem before any concept is named. Protagonist figures things out. Story closes each lesson.'
    : tier === 'basic'
    ? '~50% narrative. Story frames each concept as a question the protagonist wrestles with. Technical sections tied back to story. Story closes each lesson.'
    : '~20% narrative. Real documented cases only. No fictional protagonists. Specific real events with details. No hypotheticals.';

  const css = ':root{--bg:#080810;--panel:#0e0e1a;--border:#1e1e2e;--accent:' + tc.accent + ';--gold:#f0c040;--text:#f0eef5;--muted:#6a6a80;} *{margin:0;padding:0;box-sizing:border-box;} body{background:var(--bg);color:var(--text);font-family:Nunito,sans-serif;min-height:100vh;} .site-layout{display:flex;flex-direction:row;min-height:100vh;} .sidebar{background:#0a0a14;border-right:1px solid var(--border);position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;width:260px;flex-shrink:0;} .sb-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);} .sb-back{display:flex;align-items:center;gap:6px;color:var(--accent);font-size:1.2rem;font-weight:700;text-decoration:none;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;} .sb-mod-num{font-family:Cinzel,serif;font-size:1.05rem;color:var(--muted);letter-spacing:0.12em;margin-bottom:2px;} .sb-mod-title{font-family:Cinzel,serif;font-size:1.35rem;font-weight:700;color:var(--gold);margin-bottom:6px;} .sb-tier-chip{display:inline-flex;align-items:center;gap:5px;font-size:1.05rem;font-weight:700;color:var(--accent);background:rgba(' + tc.accentRgb + ',0.1);border:1px solid rgba(' + tc.accentRgb + ',0.25);border-radius:20px;padding:3px 10px;} .sb-lessons{flex:1;padding:10px 8px;} .sb-btn{display:flex;align-items:center;gap:8px;width:100%;background:transparent;border:none;padding:8px 10px;border-radius:8px;cursor:pointer;text-align:left;font-family:Nunito,sans-serif;font-size:1.2rem;font-weight:700;color:var(--muted);transition:all 0.15s;margin-bottom:2px;} .sb-btn:hover{background:rgba(' + tc.accentRgb + ',0.07);color:var(--text);} .sb-btn.active{background:rgba(' + tc.accentRgb + ',0.13);color:var(--accent);} .sb-icon{font-size:1.2rem;flex-shrink:0;} .sb-sub{padding-left:28px;font-size:1.08rem;font-weight:600;} .sb-div{height:1px;background:var(--border);margin:6px 8px;} .sb-test{margin:8px;padding:10px 14px;background:rgba(240,192,64,0.07);border:1px solid rgba(240,1 async function generate() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const cid = document.getElementById('courseSelect').value;
  const mn = parseInt(document.getElementById('moduleSelect').value);
  const protagonist = document.getElementById('protagonist').value.trim();
  const aiChar = document.getElementById('aiChar').value.trim();
  const notes = document.getElementById('notes').value.trim();

  if (!apiKey) { showStatus('error', 'Enter your Anthropic API key.'); return; }
  if (!cid) { showStatus('error', 'Select a course.'); return; }
  if (!mn) { showStatus('error', 'Select a module.'); return; }
  if (!selectedTier) { showStatus('error', 'Select a tier.'); return; }

  const course = COURSES.find(c => c.id === cid);
  const mod = course.modules.find(m => m.n === mn);
  const tc = TIER_CONFIG[selectedTier];

  const btn = document.getElementById('generateBtn');
  btn.disabled = true; btn.textContent = 'Generating...';

  showStatus('info', 'Building ' + course.name + ' M' + mod.n + ' — ' + tc.label + '...');
  showLog('');
  log('Course: ' + course.name);
  log('Module ' + mod.n + ': ' + mod.title);
  log('Tier: ' + tc.label + ' (' + tc.lessons + ' lessons)');
  log('Calling Claude API...');

  let userMsg = 'Build this module now.';
  if (protagonist) userMsg += ' Protagonist: ' + protagonist + '.';
  if (aiChar) userMsg += ' AI character: ' + aiChar + '.';
  if (notes) userMsg += ' Notes: ' + notes;
  userMsg += ' Output complete HTML only starting with <!DOCTYPE html>.';

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 16000,
        system: buildSystemPrompt(course, mod, selectedTier, tc),
        messages: [{ role: 'user', content: userMsg }]
      })
    });

    if (!resp.ok) { const e = await resp.json(); throw new Error(e.error?.message || 'API error ' + resp.status); }
    const data = await resp.json();
    const content = data.content[0]?.text || '';
    if (!content.includes('<!DOCTYPE')) throw new Error('No valid HTML in response. Try again.');

    log('Generated ' + content.length.toLocaleString() + ' characters');
    log('Tokens: ' + (data.usage?.input_tokens||'?') + ' in / ' + (data.usage?.output_tokens||'?') + ' out');

    generatedContent = content;
    generatedFilename = selectedTier + '-m' + mn + '-v1.0.0.html';
    document.getElementById('outputFilename').textContent = generatedFilename;
    document.getElementById('outputPreview').textContent = content.substring(0, 2000) + '\n\n... [' + content.length.toLocaleString() + ' chars — download for full file]';
    document.getElementById('outputArea').classList.add('visible');
    showStatus('info', 'Done — ' + generatedFilename + ' ready to download');

  } catch(err) {
    log('Error: ' + err.message);
    showStatus('error', 'Error: ' + err.message);
  }

  btn.disabled = false; btn.textContent = 'Generate Module';
}

function downloadFile() {
  if (!generatedContent) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([generatedContent], {type:'text/html'}));
  a.download = generatedFilename;
  a.click();
}

function showStatus(type, msg) {
  const el = document.getElementById('statusMsg');
  el.className = 'status ' + type;
  el.textContent = msg;
}

function showLog(t) { const el = document.getElementById('progressLog'); el.classList.add('visible'); el.textContent = t; }
function log(line) { const el = document.getElementById('progressLog'); el.textContent += line + '\n'; el.scrollTop = el.scrollHeight; }

init();
</script>
