/* ── LESSON DATA ── */
const M0_LESSONS = [
  {
    letter:'A', title:'What Is AESOP AI Academy?',
    body:`
      <div class="m0-section">
        <div class="m0-section-head">Overview</div>
        <p>AESOP AI Academy is a structured AI literacy curriculum for learners of all ages. It uses story-driven lessons, hands-on labs, and guided conversations to build genuine understanding — not just familiarity — with how artificial intelligence works, where it comes from, and what it means for the world.</p>
        <p>The name AESOP stands for <strong>Any and Every Story, Online &amp; Playable</strong>. Stories are not decoration here. They are the primary delivery vehicle. Every module begins with a narrative that creates the problem the lesson solves.</p>
        <div class="m0-callout">This curriculum is not about teaching children to use AI tools. It is about teaching them to <strong>understand AI systems</strong> — their mechanics, their limitations, their social consequences, and their ethical dimensions.</div>
      </div>
      <div class="m0-section">
        <div class="m0-section-head">Three Levels</div>
        <p>The curriculum is offered at three levels:</p>
        <ul class="m0-list">
          <li><strong>Intro</strong> — Foundational concepts, story-first, minimal abstraction. Ideal for younger or newer learners.</li>
          <li><strong>Basic</strong> — Deeper conceptual engagement, more nuance, some technical vocabulary introduced with care.</li>
          <li><strong>Advanced</strong> — Full technical and ethical complexity. Designed for older teens and adults seeking genuine depth.</li>
        </ul>
        <p>Each level covers the same ten modules but at different depths. You do not need to complete all three — choose the level appropriate for your learner.</p>
      </div>`
  },
  {
    letter:'B', title:'How the Curriculum Is Structured',
    body:`
      <div class="m0-section">
        <div class="m0-section-head">Ten Modules</div>
        <p>The curriculum covers ten modules, each addressing a distinct domain of AI literacy:</p>
        <ul class="m0-list">
          <li>M1: What Is AI? — Pattern learning, specialization, hallucination, training data</li>
          <li>M2: AI in Our World — Applications, invisibility, high-stakes decisions</li>
          <li>M3: When AI Gets It Wrong — Hallucination, confidence without accuracy, checking</li>
          <li>M4: Stories &amp; Creativity — Generative AI, authorship, originality, collaboration</li>
          <li>M5: Staying Safe with AI — Privacy, data collection, consent, digital identity</li>
          <li>M6: How AI Learns — Training data, RLHF, bias origins, data governance</li>
          <li>M7: How AI Thinks — Transformers, attention, tokens, emergent capabilities</li>
          <li>M8: Ethics &amp; Real Decisions — Fairness, accountability, algorithmic harm</li>
          <li>M9: AI in Society — Governance, law, labor, geopolitics</li>
          <li>M10: Careers &amp; Building — Research paths, building responsibly, the future</li>
        </ul>
      </div>
      <div class="m0-section">
        <div class="m0-section-head">Each Module Contains</div>
        <ul class="m0-list">
          <li>Story-driven lessons (3–8 depending on level)</li>
          <li>Comprehension quizzes after each lesson</li>
          <li>Hands-on AI labs with a guardrailed assistant</li>
          <li>A module test upon completion</li>
        </ul>
        <div class="m0-callout">The labs use a real AI assistant that is <strong>scoped to the lesson topic</strong>. It will redirect off-topic questions. This is by design — the labs are guided explorations, not open chatting.</div>
      </div>`
  },
  {
    letter:'C', title:'What Your Child Will Learn',
    body:`
      <div class="m0-section">
        <div class="m0-section-head">Core Competencies</div>
        <p>By the end of the curriculum, a student should be able to:</p>
        <ul class="m0-list">
          <li>Explain how AI systems learn from data and why that matters</li>
          <li>Identify AI hallucination and understand why it occurs structurally</li>
          <li>Recognize the difference between AI confidence and AI accuracy</li>
          <li>Understand how training data shapes AI behavior and creates bias</li>
          <li>Evaluate AI-generated content critically and check it appropriately</li>
          <li>Make informed decisions about their own data and digital privacy</li>
          <li>Engage with AI ethics questions — fairness, accountability, harm — with genuine understanding</li>
        </ul>
      </div>
      <div class="m0-section">
        <div class="m0-section-head">What This Is Not</div>
        <p>This curriculum does not teach students to use specific AI products. It does not endorse any particular AI company or tool. It does not treat AI as inherently good or bad.</p>
        <p>It treats AI as what it is: a set of powerful technologies built by people, shaped by choices, capable of enormous good and real harm, and best navigated with genuine understanding.</p>
        <div class="m0-callout">The goal is students who are <strong>thoughtful, capable, and unafraid</strong> — not students who are enthusiastic adopters or reflexive skeptics.</div>
      </div>`
  },
  {
    letter:'D', title:'Your Role as a Parent or Educator',
    body:`
      <div class="m0-section">
        <div class="m0-section-head">You Are Not Required to Know AI</div>
        <p>You do not need technical knowledge to support a student through this curriculum. The lessons are designed to be self-contained. The vocabulary is introduced carefully. The concepts build on each other.</p>
        <p>What you can offer is something the curriculum cannot: conversation. Ask your child what they learned. Let them explain it to you. Being explained to by a child who has just learned something is one of the most effective reinforcement mechanisms that exists.</p>
      </div>
      <div class="m0-section">
        <div class="m0-section-head">Suggested Engagement</div>
        <ul class="m0-list">
          <li>Ask "what did you learn today?" after each lesson</li>
          <li>Read the lesson kicker (the tagline under each lesson title) to understand the day's focus</li>
          <li>Use the module tests as conversation starters, not just assessments</li>
          <li>If a concept surprises you, explore it together — that models intellectual curiosity</li>
        </ul>
        <div class="m0-callout">The most important thing you can do is take it seriously. Children learn what they see valued. If you treat this as meaningful, they will too.</div>
      </div>`
  },
  {
    letter:'E', title:'Content Guidance &amp; Age Appropriateness',
    body:`
      <div class="m0-section">
        <div class="m0-section-head">Content by Level</div>
        <p>All three levels address the same topics, but with different depth and framing:</p>
        <ul class="m0-list">
          <li><strong>Intro:</strong> Concepts explained through story and analogy. Minimal abstraction. Characters solve relatable problems. No disturbing content.</li>
          <li><strong>Basic:</strong> More nuance introduced. Some real-world examples of AI consequences (bias, privacy). Framed constructively. Appropriate for middle-school-age learners.</li>
          <li><strong>Advanced:</strong> Full engagement with complex ethical scenarios, real documented cases (lawsuits, policy failures, research controversies), and genuine technical depth. Designed for high-school-age and adult learners.</li>
        </ul>
      </div>
      <div class="m0-section">
        <div class="m0-section-head">The AI Labs</div>
        <p>Each lesson includes a hands-on lab with a real AI assistant. The assistant is guardrailed — it is instructed to stay on the lesson topic and redirect off-topic requests. It will not engage with content outside its scope.</p>
        <p>However, you should be aware that:</p>
        <ul class="m0-list">
          <li>The labs use live AI inference — responses are generated, not pre-written</li>
          <li>AI responses can be unexpected. The guardrails significantly reduce but do not eliminate this</li>
          <li>For younger learners, supervised lab sessions are recommended</li>
        </ul>
        <div class="m0-callout">If a lab response surprises or concerns you, it is worth discussing with your learner — that conversation is itself an AI literacy lesson.</div>
      </div>`
  },
  {
    letter:'F', title:'Assessment, Certificates &amp; Pacing',
    body:`
      <div class="m0-section">
        <div class="m0-section-head">Assessments</div>
        <p>The curriculum includes three tiers of assessment:</p>
        <ul class="m0-list">
          <li><strong>Lesson quizzes</strong> — 5 questions after each lesson. Untracked. Retakeable. For reinforcement only.</li>
          <li><strong>Module tests</strong> — 8–15 questions upon module completion. Untracked. For comprehension check.</li>
          <li><strong>Curriculum test</strong> — A comprehensive assessment upon completing all ten modules. Scored and tracked. Completion generates a certificate of AI literacy.</li>
        </ul>
        <div class="m0-callout">The curriculum certificate is <strong>not a credential</strong> in any formal sense. It is a recognition of completion and a record of demonstrated understanding. It is meaningful because the learning behind it is meaningful.</div>
      </div>
      <div class="m0-section">
        <div class="m0-section-head">Suggested Pacing</div>
        <ul class="m0-list">
          <li><strong>Classroom:</strong> One lesson per class session (45–60 min). One module per week. Full curriculum in approximately one semester.</li>
          <li><strong>Homeschool:</strong> One module per week. Flexible daily pacing. 20–30 min per session for younger learners.</li>
          <li><strong>Self-directed:</strong> Move at whatever pace maintains engagement. Rushing past understanding defeats the purpose.</li>
        </ul>
      </div>`
  },
  {
    letter:'G', title:'Our Approach to AI &amp; Your Authorization',
    body:`
      <div class="m0-section">
        <div class="m0-section-head">How We Think About AI</div>
        <p>AESOP AI Academy does not take a position on whether AI is good or bad. We do not advocate for accelerationism or for restriction. We believe the most useful thing we can give children is genuine understanding — and that genuine understanding requires engaging with both the remarkable capabilities and the real risks of these systems.</p>
        <p>We use AI in the curriculum itself — in the labs — because we believe hands-on experience is essential to real learning. We use it carefully, with guardrails, in structured contexts, with explicit pedagogical goals.</p>
      </div>
      <div class="m0-section">
        <div class="m0-section-head">The Posture We Model</div>
        <p>Throughout AESOP Academy, AI is treated the way we hope children will eventually treat it: as a powerful tool built by people, shaped by choices, capable of enormous good and real harm, and best navigated with curiosity, skepticism, and a strong sense of your own values.</p>
        <p>That is what we are building here. We are glad you have taken the time to read this. Your presence in this orientation is itself evidence that you are the kind of parent or educator these children are lucky to have.</p>
        <div class="m0-callout">Thank you for reading. Please complete the acceptance below to confirm you have reviewed the Module 0 orientation. This will unlock the numbered modules for the student in your care.</div>
      </div>
    `
  }
];

/* ── MODULE 0 STATE ── */
const M0_KEY = 'aesop_m0_accepted';
let m0Read = new Set();
let m0CurrentLesson = 0;
let m0Accepted = localStorage.getItem(M0_KEY) === '1';

function saveRead(idx){
  m0Read.add(idx);
  renderM0ProgressPills();
  renderM0LessonRows();
}

function renderM0ProgressPills(){
  const wrap = document.getElementById('m0ProgressPills');
  if(!wrap) return;
  wrap.innerHTML = M0_LESSONS.map((l,i)=>{
    const read = m0Read.has(i);
    const bg = read ? 'var(--teal-dark)' : 'rgba(61,214,192,0.18)';
    return `<div class="m0-pill-dot" style="background:${bg}" title="Lesson ${l.letter}: ${l.title}"></div>`;
  }).join('');
}

function renderM0LessonRows(){
  const wrap = document.getElementById('m0LessonRows');
  if(!wrap) return;
  wrap.innerHTML = M0_LESSONS.map((l,i)=>{
    const read = m0Read.has(i);
    const label = read ? '✓ Read' : 'Open →';
    const btnStyle = read ? 'border-color:rgba(76,175,130,0.5);background:rgba(76,175,130,0.1);color:var(--green);' : '';
    return `<div class="m0-lesson-row" onclick="openLesson(${i})">
      <span class="m0-lesson-num">M0.${l.letter}</span>
      <span class="m0-lesson-title">${l.title}</span>
      <span class="m0-open-btn" style="${btnStyle}">${label}</span>
    </div>`;
  }).join('');
}

function openLesson(idx){
  m0CurrentLesson = idx;
  renderModalContent(idx);
  document.getElementById('m0Modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(){
  document.getElementById('m0Modal').classList.remove('open');
  document.body.style.overflow = '';
  renderM0LessonRows();
  if(m0Accepted) document.getElementById('acceptedBanner').classList.add('show');
}

function handleModalClick(e){
  if(e.target === document.getElementById('m0Modal')) closeModal();
}

function renderModalContent(idx){
  const l = M0_LESSONS[idx];
  saveRead(idx);
  document.getElementById('modalEyebrow').textContent = `Module 0 · Lesson ${l.letter}`;
  document.getElementById('modalTitle').textContent = l.title;
  document.getElementById('modalCounter').textContent = `${idx+1} / ${M0_LESSONS.length}`;
  document.getElementById('prevBtn').disabled = idx === 0;

  const isLast = idx === M0_LESSONS.length - 1;

  let body = l.body;

  if(isLast && !m0Accepted){
    body += `
      <div class="m0-accept-gate" id="acceptGate">
        <p>You have reached the end of the Module 0 orientation. By confirming below, you acknowledge that you are a parent, guardian, or educator, that you have read all seven lessons, and that you authorize the student in your care to begin the AESOP AI Academy curriculum.</p>
        <label class="m0-accept-label">
          <input type="checkbox" id="acceptCheck" onchange="toggleAcceptBtn()">
          I confirm I am a parent, guardian, or educator and I have read the Module 0 orientation. I authorize the student in my care to access the AESOP AI Academy curriculum.
        </label>
        <button class="m0-accept-btn" id="acceptBtn" onclick="completeAcceptance()">✓ Confirm &amp; Unlock Curriculum</button>
      </div>`;
  } else if(isLast && m0Accepted){
    body += `<div class="m0-accept-gate"><p style="color:var(--green);font-weight:700;">✓ Orientation accepted. The curriculum is unlocked.</p></div>`;
  }

  document.getElementById('modalBody').innerHTML = body;

  const nextBtn = document.getElementById('nextBtn');
  if(isLast){
    nextBtn.textContent = m0Accepted ? 'Close' : 'Review & Accept →';
    nextBtn.onclick = (isLast && m0Accepted) ? closeModal : ()=>navLesson(1);
  } else {
    nextBtn.textContent = 'Next →';
    nextBtn.onclick = ()=>navLesson(1);
  }
  nextBtn.disabled = false;
}

function toggleAcceptBtn(){
  const cb = document.getElementById('acceptCheck');
  const btn = document.getElementById('acceptBtn');
  if(!cb||!btn) return;
  btn.classList.toggle('ready', cb.checked);
}

function completeAcceptance(){
  const cb = document.getElementById('acceptCheck');
  if(!cb||!cb.checked) return;
  m0Accepted = true;
  localStorage.setItem(M0_KEY,'1');
  renderModalContent(m0CurrentLesson);
  renderM0LessonRows();
}

function navLesson(dir){
  const next = m0CurrentLesson + dir;
  if(next < 0 || next >= M0_LESSONS.length) return;
  m0CurrentLesson = next;
  renderModalContent(next);
  const inner = document.getElementById('m0ModalInner');
  if(inner) inner.scrollTop = 0;
}


function toggleDark(){
  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  if(isDark){
    document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('aesop-theme','light');
  } else {
    document.documentElement.setAttribute('data-theme','dark');
    localStorage.setItem('aesop-theme','dark');
  }
}
/* ── STARFIELD ── */
const s = document.getElementById('stars');
for(let i=0;i<60;i++){
  const el = document.createElement('div');
  el.className='star';
  const sz = Math.random()*2+0.5;
  el.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--max-op:${0.15+Math.random()*0.3}`;
  s.appendChild(el);
}

/* ── INIT ── */
renderM0ProgressPills();
renderM0LessonRows();
if(m0Accepted) document.getElementById('acceptedBanner').classList.add('show');
</script>
<script src="/ai-academy/modules/admin-review.js"></script>
</body>
</html>
