<div class="tab-strip"><div class="tab-group"><div class="tab-lesson active" data-page="p-l1" onclick="goPage('p-l1')">L1</div><div class="tab-subs"><span class="tab-sep">·</span><div class="tab-sub" data-page="p-q1" onclick="goPage('p-q1')">Quiz</div><span class="tab-sep">·</span><div class="tab-sub" data-page="p-lab1" onclick="goPage('p-lab1')">Lab</div></div></div><div class="tab-group"><div class="tab-lesson" data-page="p-l2" onclick="goPage('p-l2')">L2</div><div class="tab-subs"><span class="tab-sep">·</span><div class="tab-sub" data-page="p-q2" onclick="goPage('p-q2')">Quiz</div><span class="tab-sep">·</span><div class="tab-sub" data-page="p-lab2" onclick="goPage('p-lab2')">Lab</div></div></div><div class="tab-group"><div class="tab-lesson" data-page="p-l3" onclick="goPage('p-l3')">L3</div><div class="tab-subs"><span class="tab-sep">·</span><div class="tab-sub" data-page="p-q3" onclick="goPage('p-q3')">Quiz</div><span class="tab-sep">·</span><div class="tab-sub" data-page="p-lab3" onclick="goPage('p-lab3')">Lab</div></div></div><div class="tab-group"><div class="tab-lesson" data-page="p-l4" onclick="goPage('p-l4')">L4</div><div class="tab-subs"><span class="tab-sep">·</span><div class="tab-sub" data-page="p-q4" onclick="goPage('p-q4')">Quiz</div><span class="tab-sep">·</span><div class="tab-sub" data-page="p-lab4" onclick="goPage('p-lab4')">Lab</div></div></div><div class="tab-test" data-page="p-mt" onclick="goPage('p-mt')">Module Test</div></div>
<div class="content-area">
<div class="page" id="p-l1"><div class="lesson-hero"><div class="lesson-kicker">Module 5 · Lesson 1</div><h1>Corporate AI Governance Structures</h1><div class="tagline">How organizations govern AI internally — and the gap between policy and practice</div></div><div class="lesson-body"><div class="story-scene" data-label="The Governance Meeting"><p class="story-text">The AI ethics board met monthly. It had representatives from legal, technical, product, and ethics teams. It reviewed new AI use cases. It produced thoughtful memos.</p><p class="story-text">It could not block a product launch. Its recommendations were advisory. The product team could — and sometimes did — proceed without endorsement. The governance structure existed. The authority didn't.</p></div></div><div class="lesson-section"><div class="section-heading">What Is Corporate AI Governance?</div><div class="section-body"><p>Corporate AI governance encompasses the internal structures, processes, policies, and accountabilities organizations use to manage AI development and deployment. It is distinct from regulatory compliance — though the two interact. An organization can be regulatory compliant and have poor internal AI governance. It can also have excellent internal governance while operating in a regulatory vacuum.</p><p>Corporate AI governance answers questions that external regulation often does not: Who inside this organization is responsible when an AI system fails? What approval is needed before a new AI application goes to production? How does the organization know whether its AI is performing as intended? Who has authority to override an AI system recommendation — and under what conditions?</p></div><div class="section-heading">Internal Governance Structures</div><div class="section-body"><p>Organizations have developed several structural approaches to AI governance:</p><p><strong>AI Ethics Boards or Committees:</strong> Cross-functional groups (technical, legal, ethics, business) with authority to review and approve (or reject) AI use cases. Vary enormously in authority — some can block product launches, others provide only advisory opinions.</p><p><strong>Responsible AI Teams:</strong> Dedicated internal units focused on AI safety, bias testing, documentation, and model risk management. Some report to the CTO, others to legal or compliance, others to a Chief AI Officer or Chief Ethics Officer.</p><p><strong>Model Risk Management:</strong> Borrowed from financial services, where model risk management is well-developed and often required by regulators. Involves model documentation, independent validation, ongoing performance monitoring, and approved model inventories.</p><p><strong>AI Incident Response:</strong> Processes for identifying, escalating, investigating, and remediating AI system failures — analogous to cybersecurity incident response but focused on AI-specific failure modes including bias, performance drift, and out-of-distribution behavior.</p></div><div class="callout"><div class="callout-label">The Gap Between Policy and Practice</div><p>Most large tech companies now have published AI ethics principles and governance commitments. Far fewer have governance structures with real authority to enforce them. The gap between stated principles and internal accountability mechanisms is where AI governance most frequently fails in practice.</p></div></div><div class="page-nav"><button class="pnav-btn primary" onclick="goPage('p-q1')">Quiz →</button></div></div><div class="page" id="p-q1"><div class="quiz-hero"><h1>Lesson 1 Quiz</h1><div class="tagline">Corporate AI governance structures</div></div><div class="quiz-area"><div class="quiz-box" id="q1-1"><div class="quiz-q">What distinguishes corporate AI governance from regulatory compliance?</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q1-1')">They are identical — corporate governance is just internal compliance</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q1-1')">Corporate governance encompasses internal structures and accountabilities that external regulation often does not specify</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q1-1')">Regulatory compliance is voluntary; corporate governance is mandatory</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q1-1')">Corporate governance applies only to AI companies; compliance applies to all companies</button>
      </div><div class="quiz-feedback right">Correct. An organization can be regulatory compliant with poor internal governance, or have excellent governance in a regulatory vacuum. They are related but distinct.</div><div class="quiz-feedback wrong">Corporate AI governance covers internal accountability structures that external regulation often doesn't specify — they are related but distinct from compliance.</div></div><div class="quiz-box" id="q1-2"><div class="quiz-q">Model risk management in AI governance refers to:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q1-2')">Managing the risk that AI models will be stolen by competitors</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q1-2')">Documentation, independent validation, ongoing performance monitoring, and approved model inventories — borrowed from financial services</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q1-2')">Limiting the number of AI models an organization deploys</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q1-2')">Ensuring AI models are insured against liability</button>
      </div><div class="quiz-feedback right">Correct. Model risk management — well-developed in financial services — involves systematic documentation, validation, monitoring, and governance of AI models throughout their lifecycle.</div><div class="quiz-feedback wrong">Model risk management involves systematic documentation, independent validation, performance monitoring, and governance of AI models — a practice borrowed from financial services.</div></div><div class="quiz-box" id="q1-3"><div class="quiz-q">The most significant gap in corporate AI ethics governance is typically:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q1-3')">Absence of published AI ethics principles</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q1-3')">The gap between stated principles and internal accountability structures with real authority to enforce them</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q1-3')">Lack of technical expertise on ethics committees</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q1-3')">Failure to communicate AI ethics policies to customers</button>
      </div><div class="quiz-feedback right">Correct. Most large tech companies have published AI ethics principles. Far fewer have governance structures with real authority to enforce them.</div><div class="quiz-feedback wrong">Most large tech companies have published AI ethics principles. The gap is between those stated principles and internal accountability mechanisms with real enforcement authority.</div></div><div class="quiz-box" id="q1-4"><div class="quiz-q">An AI incident response process is designed to:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q1-4')">Prevent all AI system failures through pre-deployment testing</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q1-4')">Identify, escalate, investigate, and remediate AI system failures — including bias, performance drift, and out-of-distribution behavior</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q1-4')">Replace human oversight with automated monitoring</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q1-4')">Handle public relations responses to AI controversies</button>
      </div><div class="quiz-feedback right">Correct. AI incident response is analogous to cybersecurity incident response but focused on AI-specific failure modes.</div><div class="quiz-feedback wrong">AI incident response handles the full lifecycle of AI system failures — identification, escalation, investigation, and remediation — analogous to cybersecurity incident response.</div></div></div><div class="page-nav"><button class="pnav-btn" onclick="goPage('p-l1')">← Lesson</button><button class="pnav-btn primary" onclick="goPage('p-lab1')">Lab →</button></div></div><div class="page" id="p-lab1"><div class="lab-hero"><h1>Lab 1 — Corporate AI Governance Audit</h1><div class="tagline">Assess the internal AI governance of a real organization</div></div><div class="lab-area"><div class="lab-intro"><h4>Your Task</h4><p>Choose a company that uses AI consequentially — a major tech company, bank, healthcare system, or government agency.</p><p>Assess their internal AI governance: (1) What governance structures do they have in place? (2) What evidence exists about whether those structures have real authority? (3) What governance gaps are visible from public information?</p><div class="lab-prompt">Name your organization and give me your initial governance assessment. I will push you to distinguish stated governance from demonstrated authority.</div></div><div class="lab-chat" id="chat-l1"><div class="lab-chat-header"><span>AI Lab Assistant</span><span class="chat-badge">Corporate AI Governance Auditor</span></div><div class="lab-chat-msgs" id="msgs-l1"><div class="chat-msg ai">Name your organization. I will push you to assess not just what governance structures they claim to have, but what evidence suggests about whether those structures have real teeth.</div></div><div class="lab-chat-input"><textarea id="inp-l1" placeholder="Type your response…" onkeydown="chatKeydown(event,'l1')"></textarea><button class="chat-reset-btn" onclick="chatReset('l1')">Reset</button><button class="chat-send-btn" id="send-l1" onclick="chatSend('l1')">Send</button></div></div></div><div class="page-nav"><button class="pnav-btn" onclick="goPage('p-q1')">← Quiz</button><button class="pnav-btn primary" onclick="goPage('p-l2')">Lesson 2 →</button></div></div><div class="page" id="p-l2"><div class="lesson-hero"><div class="lesson-kicker">Module 5 · Lesson 2</div><h1>AI Ethics Boards — What Works</h1><div class="tagline">The record of corporate AI ethics governance structures and what distinguishes meaningful from performative</div></div><div class="lesson-body"><div class="story-scene" data-label="Case Studies"><p class="story-text">The company announced its AI Ethics Advisory Board with a press release and a list of distinguished external advisors. Three months later, the board had met once. Six months later, it had been quietly dissolved.</p><p class="story-text">This is not a hypothetical. Variations of this story have played out at multiple major technology companies. Understanding why requires looking at what governance authority actually existed.</p></div></div><div class="lesson-section"><div class="section-heading">AI Ethics Boards: The Record</div><div class="section-body"><p>The AI ethics board concept — a cross-functional body that reviews AI use cases and advises on ethical implications — has been widely adopted and widely criticized. Understanding why requires looking at specific cases.</p><p><strong>Google's Advanced Technology External Advisory Council (2019):</strong> Announced with significant fanfare. Dissolved within two weeks after member controversies and employee protests. The speed of its collapse illustrated what can happen when governance bodies are created without careful stakeholder consultation.</p><p><strong>Microsoft's AI Ethics Committee:</strong> Microsoft has maintained longer-running internal AI ethics governance, with Responsible AI teams and documented review processes. But its governance faced questions when the company dissolved its ethics and society team amid layoffs in 2023, raising concerns about the stability of governance commitments during financial pressure.</p><p><strong>Meta's Oversight Board (content moderation):</strong> Not AI-specific, but instructive. An independent board with authority to overturn content decisions — and Meta has sometimes complied, sometimes not, and sometimes changed policies in ways that circumvent board purview.</p></div><div class="section-heading">What Makes AI Ethics Governance Work</div><div class="section-body"><p>Research and practitioner experience suggest several factors distinguish ethics governance that influences decisions from governance that is primarily performative:</p><p><strong>Real authority:</strong> The body can block or require modification of AI deployments, not merely advise. <strong>Independence:</strong> Members with genuine independence from product and revenue pressure, including external members or board-level oversight. <strong>Early integration:</strong> Governance review happens during development, not as a final gate that creates pressure to approve what is already built. <strong>Transparency:</strong> Decisions, reasoning, and outcomes are documented and accessible — at least internally. <strong>Follow-through accountability:</strong> When governance bodies make recommendations, there is a mechanism to track whether recommendations were implemented.</p></div><div class="gold-callout"><div class="callout-label">The Capture Problem</div><p>Internal AI ethics governance faces a structural challenge: the people conducting governance reviews are paid by the organization whose decisions they are reviewing. This creates pressure — subtle or explicit — to approve use cases that support business goals. Independent external members can reduce but not eliminate this dynamic.</p></div></div><div class="page-nav"><button class="pnav-btn" onclick="goPage('p-lab1')">← Lab 1</button><button class="pnav-btn primary" onclick="goPage('p-q2')">Quiz →</button></div></div><div class="page" id="p-q2"><div class="quiz-hero"><h1>Lesson 2 Quiz</h1><div class="tagline">AI ethics boards and what works</div></div><div class="quiz-area"><div class="quiz-box" id="q2-1"><div class="quiz-q">Google's Advanced Technology External Advisory Council (2019) is instructive because:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q2-1')">It became the model for successful AI ethics governance</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q2-1')">It was dissolved within two weeks after member controversies and employee protests, illustrating risks of poor stakeholder consultation</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q2-1')">It successfully blocked several controversial AI deployments</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q2-1')">It was replaced by a stronger internal governance structure</button>
      </div><div class="quiz-feedback right">Correct. Google's ATEAC collapsed in two weeks — a case study in what can happen when governance bodies are created without careful stakeholder consultation or clear authority.</div><div class="quiz-feedback wrong">Google's ATEAC is instructive as a failure case — dissolved within two weeks, illustrating risks of creating governance structures without careful consultation or clear authority.</div></div><div class="quiz-box" id="q2-2"><div class="quiz-q">Which factor most distinguishes effective from performative AI ethics governance?</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q2-2')">The number of external advisors on the ethics board</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q2-2')">Real authority — the ability to block or require modification of AI deployments, not merely advise</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q2-2')">The frequency of ethics board meetings</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q2-2')">The seniority of the executive who chairs the ethics committee</button>
      </div><div class="quiz-feedback right">Correct. Real authority — not just advisory status — is the primary distinguishing factor between governance that influences decisions and governance that exists on paper.</div><div class="quiz-feedback wrong">Real authority is the most critical factor. Advisory-only governance structures — even with distinguished members — lack the enforcement power to change AI deployment decisions.</div></div><div class="quiz-box" id="q2-3"><div class="quiz-q">Early integration of governance review (during development rather than as a final gate) matters because:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q2-3')">It is less expensive to conduct ethics reviews during development</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q2-3')">Final gate reviews face pressure to approve what is already built — early integration makes governance actionable when changes are still feasible</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q2-3')">Development teams are more receptive to ethics feedback early in the process</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q2-3')">External regulators require ethics review to begin at development stage</button>
      </div><div class="quiz-feedback right">Correct. Late-stage governance review faces irresistible pressure — the system is built, launch is scheduled, resources are committed. Early integration makes governance effective.</div><div class="quiz-feedback wrong">Final gate reviews face institutional pressure to approve what is already built. Early integration makes governance actionable when modification is still feasible and costs are lower.</div></div><div class="quiz-box" id="q2-4"><div class="quiz-q">The "capture problem" in corporate AI ethics governance refers to:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q2-4')">External adversaries compromising AI ethics processes</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q2-4')">The structural pressure on internal governance reviewers who are paid by the organization whose decisions they review</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q2-4')">Competitor companies adopting similar ethics frameworks</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q2-4')">Regulatory agencies co-opting corporate governance structures</button>
      </div><div class="quiz-feedback right">Correct. Internal governance reviewers face structural pressure — subtle or explicit — to approve use cases that support business goals, because they are paid by the organization being governed.</div><div class="quiz-feedback wrong">Capture in internal governance means the governance body faces structural pressure to serve organizational interests — because its members are paid by the organization under review.</div></div></div><div class="page-nav"><button class="pnav-btn" onclick="goPage('p-l2')">← Lesson</button><button class="pnav-btn primary" onclick="goPage('p-lab2')">Lab →</button></div></div><div class="page" id="p-lab2"><div class="lab-hero"><h1>Lab 2 — Ethics Board Design</h1><div class="tagline">Design an AI ethics governance structure that would actually work</div></div><div class="lab-area"><div class="lab-intro"><h4>Your Task</h4><p>You are designing an AI ethics governance structure for a company that makes AI-powered hiring tools used by hundreds of employers.</p><p>Specify: governance structure, membership and independence, authority (advisory vs. binding), scope, review process, transparency, and accountability mechanisms. Then identify the three most likely ways your governance structure would fail in practice.</p><div class="lab-prompt">Give me your governance structure design. I will probe both the design choices and the failure modes.</div></div><div class="lab-chat" id="chat-l2"><div class="lab-chat-header"><span>AI Lab Assistant</span><span class="chat-badge">AI Governance Structure Designer</span></div><div class="lab-chat-msgs" id="msgs-l2"><div class="chat-msg ai">Describe your ethics governance structure design. I will probe your choices on authority, independence, and process — and push you to identify your own design's likely failure modes.</div></div><div class="lab-chat-input"><textarea id="inp-l2" placeholder="Type your response…" onkeydown="chatKeydown(event,'l2')"></textarea><button class="chat-reset-btn" onclick="chatReset('l2')">Reset</button><button class="chat-send-btn" id="send-l2" onclick="chatSend('l2')">Send</button></div></div></div><div class="page-nav"><button class="pnav-btn" onclick="goPage('p-q2')">← Quiz</button><button class="pnav-btn primary" onclick="goPage('p-l3')">Lesson 3 →</button></div></div><div class="page" id="p-l3"><div class="lesson-hero"><div class="lesson-kicker">Module 5 · Lesson 3</div><h1>Accountability Mechanisms</h1><div class="tagline">The specific processes that create real accountability — and why diffuse responsibility means none</div></div><div class="lesson-body"><div class="story-scene" data-label="The Accountability Gap"><p class="story-text">When the AI hiring tool ranked the candidate poorly and she lost the opportunity, she could not find out why. The employer said the algorithm was the vendor's. The vendor said configuration was the employer's. Legal said they couldn't comment on algorithmic processes.</p><p class="story-text">No one was accountable. Not because accountability was impossible — because accountability mechanisms had not been built.</p></div></div><div class="lesson-section"><div class="section-heading">Accountability Without Governance</div><div class="section-body"><p>Accountability in AI systems requires more than good intentions or stated principles. It requires mechanisms — specific processes, responsibilities, and consequences — that create actual accountability relationships between AI systems, their developers, deployers, and affected people.</p></div><div class="section-heading">Types of AI Accountability Mechanisms</div><div class="section-body"><p><strong>Documentation and auditability:</strong> Systematic recording of design decisions, training data, performance metrics, testing results, and deployment decisions — sufficient to reconstruct why a system behaves as it does. This is the foundation of accountability, but far from sufficient on its own.</p><p><strong>Performance monitoring:</strong> Ongoing measurement of AI system behavior in production, with thresholds and escalation processes for performance degradation or unexpected behavior. Without monitoring, accountability is retrospective-only.</p><p><strong>Redress mechanisms:</strong> Processes by which people affected by AI decisions can understand those decisions, challenge them, and receive review or correction. The EU AI Act requires these for high-risk systems; most voluntary frameworks recommend them; many deployed AI systems lack them.</p><p><strong>Clear ownership:</strong> Designated individuals or teams with specific accountability for AI system performance and outcomes — not diffuse organizational responsibility that means no one is responsible. In practice, accountability often disappears in the gap between AI developers (who built it), AI operators (who configured it), and deployers (who use it).</p><p><strong>Consequence mechanisms:</strong> Actual consequences for AI governance failures — not just policy violations, but reputational, financial, or career consequences that create incentives for accountability-conscious behavior.</p></div><div class="callout"><div class="callout-label">The Accountability Diffusion Problem</div><p>In complex AI deployment chains — foundation model provider, application developer, system integrator, deployer — accountability tends to diffuse. Each party points to others when something goes wrong. Effective accountability requires mechanisms that resist this diffusion: explicit responsibility assignment, contractual accountability, and governance that spans organizational boundaries.</p></div></div><div class="page-nav"><button class="pnav-btn" onclick="goPage('p-lab2')">← Lab 2</button><button class="pnav-btn primary" onclick="goPage('p-q3')">Quiz →</button></div></div><div class="page" id="p-q3"><div class="quiz-hero"><h1>Lesson 3 Quiz</h1><div class="tagline">AI accountability mechanisms</div></div><div class="quiz-area"><div class="quiz-box" id="q3-1"><div class="quiz-q">Documentation and auditability as an AI accountability mechanism is:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q3-1')">The complete foundation of AI accountability on its own</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q3-1')">A necessary foundation for accountability but insufficient alone — records must be coupled with processes to use them</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q3-1')">Only necessary for high-risk AI systems under EU regulation</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q3-1')">The responsibility of the deployer rather than the provider</button>
      </div><div class="quiz-feedback right">Correct. Documentation is necessary but not sufficient — it creates the possibility of accountability but requires active processes (monitoring, redress, consequences) to realize it.</div><div class="quiz-feedback wrong">Documentation creates the foundation for accountability but isn't sufficient alone. Active monitoring, redress mechanisms, and consequence structures are also required.</div></div><div class="quiz-box" id="q3-2"><div class="quiz-q">The accountability diffusion problem in AI governance means:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q3-2')">AI accountability frameworks lack clear definitions</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q3-2')">In complex deployment chains, responsibility for AI harms tends to diffuse as each party points to others</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q3-2')">Accountability for AI systems cannot be established in law</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q3-2')">AI accountability metrics are too diffuse to be measured</button>
      </div><div class="quiz-feedback right">Correct. Multi-party AI deployment chains — provider, developer, integrator, deployer — create conditions where accountability disappears in the gaps between organizations.</div><div class="quiz-feedback wrong">Accountability diffusion: in complex deployment chains, responsibility tends to dissolve as each party points to others, leaving affected people with no accountable party.</div></div><div class="quiz-box" id="q3-3"><div class="quiz-q">Redress mechanisms for AI systems are:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'correct','q3-3')">Processes by which affected people can understand AI decisions, challenge them, and receive review or correction</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q3-3')">Internal review processes for AI governance team decisions</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q3-3')">Financial compensation mechanisms for AI failures</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q3-3')">Legal remedies available only through litigation</button>
      </div><div class="quiz-feedback right">Correct. Redress mechanisms give affected people access to understanding and challenging AI decisions — required by EU AI Act for high-risk systems, lacking in many deployed systems.</div><div class="quiz-feedback wrong">Redress mechanisms are processes for affected people to understand AI decisions, challenge them, and get review or correction — not just financial remedies or internal reviews.</div></div><div class="quiz-box" id="q3-4"><div class="quiz-q">Effective AI accountability requires:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q3-4')">Primarily good intentions from AI development teams</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q3-4')">Documentation, performance monitoring, redress mechanisms, clear ownership, and consequence mechanisms that create real incentives</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q3-4')">Only regulatory compliance requirements</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q3-4')">Exclusively external third-party audit</button>
      </div><div class="quiz-feedback right">Correct. Accountability requires a combination of mechanisms — documentation, monitoring, redress, clear ownership, and actual consequences for failures.</div><div class="quiz-feedback wrong">Effective accountability requires multiple mechanisms: documentation, monitoring, redress, clear ownership, AND consequence mechanisms that create incentives for accountability-conscious behavior.</div></div></div><div class="page-nav"><button class="pnav-btn" onclick="goPage('p-l3')">← Lesson</button><button class="pnav-btn primary" onclick="goPage('p-lab3')">Lab →</button></div></div><div class="page" id="p-lab3"><div class="lab-hero"><h1>Lab 3 — Accountability Gap Analysis</h1><div class="tagline">Identify where accountability breaks down in a real AI deployment chain</div></div><div class="lab-area"><div class="lab-intro"><h4>Your Task</h4><p>Choose a real AI deployment chain: a bank using a vendor's credit scoring model, a hospital using a diagnostic AI trained by a different company, or a government agency using AI built by a contractor.</p><p>Map the accountability structure: who is responsible for what? Where does accountability diffuse? What specific mechanisms are missing that would close the accountability gaps?</p><div class="lab-prompt">Name your deployment chain and give me your initial accountability map. I will probe the gaps and push for specific mechanism recommendations.</div></div><div class="lab-chat" id="chat-l3"><div class="lab-chat-header"><span>AI Lab Assistant</span><span class="chat-badge">AI Accountability Chain Analyst</span></div><div class="lab-chat-msgs" id="msgs-l3"><div class="chat-msg ai">Name your deployment chain and give me your accountability map. I will push you to identify specific gaps and specific mechanisms that would address them.</div></div><div class="lab-chat-input"><textarea id="inp-l3" placeholder="Type your response…" onkeydown="chatKeydown(event,'l3')"></textarea><button class="chat-reset-btn" onclick="chatReset('l3')">Reset</button><button class="chat-send-btn" id="send-l3" onclick="chatSend('l3')">Send</button></div></div></div><div class="page-nav"><button class="pnav-btn" onclick="goPage('p-q3')">← Quiz</button><button class="pnav-btn primary" onclick="goPage('p-l4')">Lesson 4 →</button></div></div><div class="page" id="p-l4"><div class="lesson-hero"><div class="lesson-kicker">Module 5 · Lesson 4</div><h1>Corporate AI Governance Failure Cases</h1><div class="tagline">Learning from Amazon's hiring algorithm, IBM Watson Health, and the structural patterns behind failures</div></div><div class="lesson-body"><div class="story-scene" data-label="Case Studies in Failure"><p class="story-text">The AI worked. In the sense that it made decisions quickly and at scale. It had been tested — accuracy metrics looked fine.</p><p class="story-text">What had not been tested was whether the decisions were fair, whether the training data reflected the outcomes the organization actually wanted, or whether the concerns raised internally had anywhere to go.</p></div></div><div class="lesson-section"><div class="section-heading">Corporate AI Governance Failures: Learning from Cases</div><div class="section-body"><p>Understanding where corporate AI governance fails requires examining specific cases — not to assign blame, but to identify structural patterns that recur across organizations and contexts.</p></div><div class="section-heading">Amazon's Hiring Algorithm</div><div class="section-body"><p>Amazon developed a machine learning tool to screen resumes, then discovered it was systematically downrating resumes that included the word "women's" and graduates of all-women's colleges. The system had learned that male-dominated historical hiring patterns were "good" hiring patterns. The tool was ultimately scrapped. The governance failure: the model was trained on a decade of historical hiring data without systematic bias testing, and deployed in consequential decisions before its bias was discovered in use.</p></div><div class="section-heading">IBM's Watson Health</div><div class="section-body"><p>IBM's Watson for Oncology — intended to recommend cancer treatment plans — was found by physicians to frequently produce unsafe or incorrect recommendations. Internal IBM documents revealed concerns were raised early and not addressed. The governance failure: clinical validation was insufficient, concerns raised by clinical advisors were not escalated effectively, and commercial pressure to maintain the product outweighed internal safety concerns.</p></div><div class="section-heading">Patterns in Corporate AI Governance Failure</div><div class="section-body"><p>Across cases, several patterns recur: <strong>Training data assumptions</strong> — using historical data without examining whether historical patterns reflect desired future outcomes. <strong>Validation shortcuts</strong> — inadequate testing of AI behavior before deployment, especially in edge cases and demographic subgroups. <strong>Escalation failure</strong> — internal concerns raised but not reaching decision-makers with authority to act. <strong>Commercial pressure override</strong> — safety and governance concerns deprioritized when they conflict with launch timelines or revenue goals.</p></div><div class="warn-callout"><div class="callout-label">The Governance Question</div><p>None of these failures required new technology to prevent. They required governance: processes for bias testing, escalation pathways for concerns, authority structures that could override commercial pressure, and accountability for outcomes. The missing ingredient was not capability — it was governance.</p></div></div><div class="page-nav"><button class="pnav-btn" onclick="goPage('p-lab3')">← Lab 3</button><button class="pnav-btn primary" onclick="goPage('p-q4')">Quiz →</button></div></div><div class="page" id="p-q4"><div class="quiz-hero"><h1>Lesson 4 Quiz</h1><div class="tagline">Corporate AI governance failure cases</div></div><div class="quiz-area"><div class="quiz-box" id="q4-1"><div class="quiz-q">Amazon's AI hiring tool failed primarily because:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q4-1')">The algorithm was intentionally designed to discriminate</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q4-1')">It was trained on historical hiring data without systematic bias testing, learning that male-dominated patterns were "good" patterns</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q4-1')">Amazon's engineers lacked technical skill to build unbiased tools</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q4-1')">External regulators failed to catch the bias during certification</button>
      </div><div class="quiz-feedback right">Correct. The tool learned from historical male-dominated hiring patterns, then applied those learned patterns without systematic bias testing before or during deployment.</div><div class="quiz-feedback wrong">Amazon's hiring tool failure stemmed from training on historical hiring data without bias testing — the model learned existing patterns rather than desired outcomes.</div></div><div class="quiz-box" id="q4-2"><div class="quiz-q">IBM Watson for Oncology's governance failure is notable because:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'correct','q4-2')">Clinical concerns were raised early but not effectively escalated, and commercial pressure outweighed safety concerns</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q4-2')">IBM lacked access to sufficient clinical training data</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q4-2')">Watson was trained without any physician input</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q4-2')">External certification processes failed to catch the errors</button>
      </div><div class="quiz-feedback right">Correct. Internal documents revealed early concerns that were not escalated to decision-makers — a classic escalation failure under commercial pressure.</div><div class="quiz-feedback wrong">IBM Watson for Oncology illustrates escalation failure: concerns were raised internally early but not effectively escalated, while commercial pressure to maintain the product continued.</div></div><div class="quiz-box" id="q4-3"><div class="quiz-q">Which governance failure pattern is illustrated by both the Amazon and IBM cases?</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q4-3')">External regulatory failure to catch problems during certification</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q4-3')">Deliberate corporate misconduct to hide AI failures</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q4-3')">Internal concerns raised but not reaching decision-makers with authority to act, coupled with commercial pressure override</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q4-3')">Technical inability to detect bias in training data</button>
      </div><div class="quiz-feedback right">Correct. Both cases show the escalation failure and commercial pressure override pattern — concerns existed internally but did not reach decision-makers in time, or were overridden by commercial considerations.</div><div class="quiz-feedback wrong">Both cases illustrate escalation failure and commercial pressure override — concerns existed internally but were not effectively escalated, and safety was deprioritized relative to commercial goals.</div></div><div class="quiz-box" id="q4-4"><div class="quiz-q">The lesson from corporate AI governance failure cases is that failures primarily resulted from:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q4-4')">Novel technical challenges no governance process could have anticipated</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q4-4')">Missing governance — bias testing, escalation pathways, accountability structures, and authority to override commercial pressure</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q4-4')">Malicious actors within organizations deliberately creating harmful AI</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q4-4')">Insufficient regulatory requirements at the time of deployment</button>
      </div><div class="quiz-feedback right">Correct. The missing ingredient in most AI governance failures is not technical capability but governance — processes, authority, and accountability.</div><div class="quiz-feedback wrong">Most AI governance failures could have been prevented by governance mechanisms: bias testing processes, escalation pathways, accountability structures, and authority that can override commercial pressure.</div></div></div><div class="page-nav"><button class="pnav-btn" onclick="goPage('p-l4')">← Lesson</button><button class="pnav-btn primary" onclick="goPage('p-lab4')">Lab →</button></div></div><div class="page" id="p-lab4"><div class="lab-hero"><h1>Lab 4 — Governance Failure Post-Mortem</h1><div class="tagline">Analyze what governance mechanisms would have prevented a known AI failure</div></div><div class="lab-area"><div class="lab-intro"><h4>Your Task</h4><p>Choose one of the two cases from Lesson 4 (Amazon hiring algorithm or IBM Watson Oncology), or a different AI failure you know well.</p><p>Conduct a governance post-mortem: (1) What governance mechanisms were missing? (2) What specific process, if in place, would most likely have caught the problem? (3) What would need to change organizationally for that mechanism to have real authority?</p><div class="lab-prompt">Name your case and give me your initial post-mortem analysis. I will push you to be specific about the governance mechanisms and organizational changes required.</div></div><div class="lab-chat" id="chat-l4"><div class="lab-chat-header"><span>AI Lab Assistant</span><span class="chat-badge">AI Governance Post-Mortem Analyst</span></div><div class="lab-chat-msgs" id="msgs-l4"><div class="chat-msg ai">Name your case and start your post-mortem. I will push you to go beyond "better oversight" to specific mechanisms and organizational authority structures.</div></div><div class="lab-chat-input"><textarea id="inp-l4" placeholder="Type your response…" onkeydown="chatKeydown(event,'l4')"></textarea><button class="chat-reset-btn" onclick="chatReset('l4')">Reset</button><button class="chat-send-btn" id="send-l4" onclick="chatSend('l4')">Send</button></div></div></div><div class="page-nav"><button class="pnav-btn" onclick="goPage('p-q4')">← Quiz</button><button class="pnav-btn primary" onclick="goPage('p-mt')">Module Test →</button></div></div><div class="page" id="p-mt"><div class="quiz-hero"><h1>Module Test</h1><div class="tagline">15 questions · 80% to pass</div></div><div class="mt-area"><div class="quiz-box" id="mt-q1"><div class="quiz-q">Corporate AI governance differs from regulatory compliance in that:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q1')">They are identical</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q1')">Corporate governance covers internal accountability structures that external regulation often does not specify</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q1')">Only regulatory compliance is legally required</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q1')">Corporate governance applies only to AI companies</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">Corporate AI governance and regulatory compliance are related but distinct — governance covers internal accountability structures that regulations often don't specify.</div></div><div class="quiz-box" id="mt-q2"><div class="quiz-q">Model risk management in AI refers to:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q2')">Managing the risk of model theft</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q2')">Systematic documentation, validation, monitoring, and governance of AI models — borrowed from financial services</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q2')">Limiting the number of AI models deployed</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q2')">Insuring AI models against liability</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">Model risk management involves systematic documentation, independent validation, performance monitoring, and governance of AI models throughout their lifecycle.</div></div><div class="quiz-box" id="mt-q3"><div class="quiz-q">The most significant gap in corporate AI ethics governance is typically:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q3')">Absence of published AI ethics principles</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q3')">The gap between stated principles and internal accountability structures with real enforcement authority</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q3')">Lack of technical expertise on ethics committees</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q3')">Failure to communicate policies to customers</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">Most large companies have published AI ethics principles. The gap is between those principles and internal accountability mechanisms with real authority.</div></div><div class="quiz-box" id="mt-q4"><div class="quiz-q">Google's ATEAC (2019) is instructive because:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q4')">It became the model for successful AI ethics governance</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q4')">It dissolved within two weeks, illustrating risks of creating governance without careful stakeholder consultation</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q4')">It blocked several controversial Google AI deployments</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q4')">It was replaced by a stronger internal governance structure</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">Google's ATEAC is a failure case — dissolved in two weeks, illustrating the risks of governance structures without clear authority or stakeholder consultation.</div></div><div class="quiz-box" id="mt-q5"><div class="quiz-q">Real authority in AI ethics governance means:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q5')">Ethics board members have advanced degrees in AI ethics</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q5')">The governance body can block or require modification of AI deployments, not merely advise</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q5')">Ethics reviews are conducted by senior executives</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q5')">Governance policies are published publicly</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">Real authority means the governance body can actually stop or modify AI deployments — not just provide advisory opinions that product teams can override.</div></div><div class="quiz-box" id="mt-q6"><div class="quiz-q">Early integration of governance review matters because:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q6')">Ethics reviews are cheaper during development</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q6')">Final gate reviews face pressure to approve already-built systems; early integration makes governance actionable when changes are still feasible</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q6')">Development teams are more receptive early in the process</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q6')">External regulators require it</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">Late-stage governance faces irresistible pressure to approve what is already built. Early integration makes governance effective when modification is still feasible.</div></div><div class="quiz-box" id="mt-q7"><div class="quiz-q">The capture problem in internal AI ethics governance is:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q7')">External adversaries compromising ethics processes</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q7')">Structural pressure on internal reviewers who are paid by the organization whose decisions they review</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q7')">Competitor companies adopting similar ethics frameworks</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q7')">Regulatory agencies co-opting corporate governance</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">Capture means internal governance faces structural incentives to serve organizational interests — because reviewers are paid by the organization being governed.</div></div><div class="quiz-box" id="mt-q8"><div class="quiz-q">Documentation and auditability as an AI accountability mechanism is:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q8')">Sufficient by itself for meaningful accountability</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q8')">A necessary foundation for accountability, but insufficient without monitoring, redress, and consequence mechanisms</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q8')">Only required for high-risk AI under EU regulation</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q8')">Primarily the deployer's responsibility</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">Documentation is necessary but insufficient alone — active monitoring, redress mechanisms, and consequence structures are also required for meaningful accountability.</div></div><div class="quiz-box" id="mt-q9"><div class="quiz-q">Redress mechanisms for AI systems provide:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q9')">Processes for affected people to understand AI decisions, challenge them, and receive review or correction</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q9')">Internal review processes for governance decisions</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q9')">Financial compensation for AI failures only</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q9')">Legal remedies available through litigation only</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">Redress mechanisms give affected people access to understanding and challenging AI decisions — required by the EU AI Act for high-risk systems.</div></div><div class="quiz-box" id="mt-q10"><div class="quiz-q">The accountability diffusion problem means:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q10')">AI accountability is too diffuse to measure</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q10')">In complex deployment chains, responsibility for AI harms tends to diffuse as each party points to others</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q10')">Accountability frameworks lack clear definitions</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q10')">AI accountability cannot be established in law</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">In multi-party AI deployment chains, accountability tends to dissolve as each party points to others — leaving affected people with no clearly accountable party.</div></div><div class="quiz-box" id="mt-q11"><div class="quiz-q">Amazon's AI hiring tool failed primarily because:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q11')">The algorithm was designed to discriminate</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q11')">It was trained on historical male-dominated hiring data without systematic bias testing</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q11')">Engineers lacked skill to build unbiased tools</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q11')">External regulators failed to catch the bias</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">Amazon's tool learned from historical male-dominated patterns without bias testing — the governance failure was process, not technical capability.</div></div><div class="quiz-box" id="mt-q12"><div class="quiz-q">IBM Watson for Oncology illustrates:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q12')">Technical limitations of AI in clinical settings</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q12')">Escalation failure: internal concerns raised early but not effectively escalated, with commercial pressure overriding safety concerns</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q12')">External certification failure to catch clinical errors</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q12')">Training data limitations that governance could not address</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">IBM Watson's failure illustrates escalation failure — concerns were raised internally early but not escalated to decision-makers, while commercial pressure continued.</div></div><div class="quiz-box" id="mt-q13"><div class="quiz-q">Which factors most distinguish effective from performative AI ethics governance?</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q13')">Size of the ethics committee and frequency of meetings</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q13')">Real authority, genuine independence, early integration, transparency, and follow-through accountability</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q13')">Seniority of the executive chairing the committee</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q13')">Whether the board includes external academic advisors</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">Effective governance requires real authority, independence, early integration into development, transparency, and mechanisms to track whether recommendations are implemented.</div></div><div class="quiz-box" id="mt-q14"><div class="quiz-q">Corporate AI governance failure cases most commonly result from:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q14')">Novel technical challenges beyond current governance capability</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q14')">Missing governance mechanisms — bias testing, escalation pathways, accountability structures, and authority to override commercial pressure</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q14')">Malicious actors deliberately creating harmful AI</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q14')">Insufficient regulatory requirements at deployment time</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">Most AI governance failures could have been prevented by governance mechanisms — the missing ingredient is governance, not technical capability.</div></div><div class="quiz-box" id="mt-q15"><div class="quiz-q">Consequence mechanisms in AI accountability are important because:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q15')">They punish AI developers for all AI failures</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q15')">They create incentives for accountability-conscious behavior — without consequences, accountability commitments lack enforcement</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q15')">They are required by all major AI regulations</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q15')">They transfer liability from organizations to individual engineers</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">Consequence mechanisms — reputational, financial, or career consequences for governance failures — create the incentives that make accountability commitments meaningful.</div></div><div id="mt-score" class="mt-score"></div></div><div class="page-nav"><button class="pnav-btn" onclick="goPage('p-lab4')">← Lab 4</button><button class="pnav-btn primary" onclick="window.parent.postMessage({type:'modTestPassed',courseId:'governance',moduleId:MODULE_ID},'*');this.textContent='\u2713 Reported';">Mark Complete &amp; Return to Hub</button></div></div>
</div></div>
<script>
var COURSE_ID='governance';
var MODULE_ID='gov-m5';
var PROXY_URL='/aesop-api/proxy.php';
var currentPageId='p-l1';
var lessonSignaled={},quizSignaled={},labSignaled={};
var PAGE_TO_LESSON={'p-l1':'l1','p-l2':'l2','p-l3':'l3','p-l4':'l4'};
var LAB_SYSTEM_PROMPTS={
  l1:`You are a corporate AI governance auditor for AESOP AI Academy, AI Governance Module 5. Students assess the internal AI governance of a real organization based on public information. Push them to distinguish stated governance from demonstrated authority — what evidence suggests the governance structures actually influence decisions? Challenge: what would we expect to see if these governance commitments had real teeth? Stay on topic. 2-3 paragraphs per response.`,
  l2:`You are an AI governance structure designer for AESOP AI Academy, AI Governance Module 5. Students design an AI ethics governance structure for a hiring AI company. Push for specificity on authority (advisory vs. binding), independence mechanisms, review process design, and transparency. Then push hard on failure modes: which design choice would most likely be circumvented first under commercial pressure? Stay on topic. 2-3 paragraphs per response.`,
  l3:`You are an AI accountability chain analyst for AESOP AI Academy, AI Governance Module 5. Students map accountability in a multi-party AI deployment chain. Push them to identify specific gaps — not just "accountability is diffuse" but which specific transition (provider to developer? developer to deployer?) loses accountability and why. Then push for specific mechanisms that would close each gap. Stay on topic. 2-3 paragraphs per response.`,
  l4:`You are an AI governance post-mortem analyst for AESOP AI Academy, AI Governance Module 5. Students conduct post-mortems on known AI governance failures. Push beyond "better oversight" — demand specific processes: what specific test would have caught the Amazon hiring bias? What specific escalation pathway would have changed the IBM Watson outcome? What organizational authority structure would have given that pathway real force? Stay on topic. 2-3 paragraphs per response.`
};

function goPage(id){var prev=document.getElementById(currentPageId);var next=document.getElementById(id);if(!next) return;var pl=PAGE_TO_LESSON[currentPageId];if(pl&&!lessonSignaled[pl]){lessonSignaled[pl]=true;window.parent.postMessage({type:'lessonComplete',courseId:COURSE_ID,moduleId:MODULE_ID,lessonId:pl},'*');}if(prev) prev.classList.remove('active');next.classList.add('active');currentPageId=id;updateTabs();window.scrollTo(0,0);}
function updateTabs(){document.querySelectorAll('.tab-lesson,.tab-sub,.tab-test').forEach(function(el){el.classList.toggle('active',el.dataset.page===currentPageId);});}
function answer(btn,result,qId){var box=document.getElementById(qId);box.querySelectorAll('.quiz-opt').forEach(function(b){b.disabled=true;});btn.classList.add(result);box.querySelectorAll('.quiz-feedback').forEach(function(fb){fb.classList.remove('show');});box.querySelector('.quiz-feedback.'+(result==='correct'?'right':'wrong')).classList.add('show');}
var mtTotal=15,mtCorrect=0,mtAnswered=0;
function mtAnswer(btn,result,qId){answer(btn,result,qId);mtAnswered++;if(result==='correct') mtCorrect++;if(mtAnswered>=mtTotal){var el=document.getElementById('mt-score');el.style.display='block';var pct=Math.round((mtCorrect/mtTotal)*100);el.innerHTML='Score: <strong>'+mtCorrect+'/'+mtTotal+'</strong> ('+pct+'%)'+(pct>=80?' — Module passed.':pct>=60?' — Review and retake.':' — Keep studying.');if(pct>=80) window.parent.postMessage({type:'modTestPassed',courseId:COURSE_ID,moduleId:MODULE_ID},'*');}}
var chatHistories={l1:[],l2:[],l3:[],l4:[]};var chatExchanges={l1:0,l2:0,l3:0,l4:0};var LAB_COMPLETE_THRESHOLD=3;
var ACADEMY_GUARDRAIL='You are an AI lab assistant for AESOP AI Academy — AI Governance course. Stay strictly on topic.\n\n';
function chatAppend(labId,role,text){var msgs=document.getElementById('msgs-'+labId);if(!msgs) return;var div=document.createElement('div');div.className='chat-msg '+(role==='user'?'user':'ai');div.innerHTML=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;}
function chatThinking(labId){var msgs=document.getElementById('msgs-'+labId);if(!msgs) return null;var div=document.createElement('div');div.className='chat-msg thinking';div.textContent='Thinking…';msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;return div;}
function chatSetLoading(labId,l){var btn=document.getElementById('send-'+labId);var inp=document.getElementById('inp-'+labId);if(btn) btn.disabled=l;if(inp) inp.disabled=l;}
async function chatSend(labId){var inp=document.getElementById('inp-'+labId);if(!inp) return;var text=inp.value.trim();if(!text) return;inp.value='';inp.style.height='auto';chatAppend(labId,'user',text);chatHistories[labId].push({role:'user',content:text});chatSetLoading(labId,true);var thinkEl=chatThinking(labId);var chat=document.getElementById('chat-'+labId);var ee=chat?chat.querySelector('.chat-error'):null;if(ee) ee.remove();try{var res=await fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:chatHistories[labId],system_prompt:ACADEMY_GUARDRAIL+(LAB_SYSTEM_PROMPTS[labId]||''),max_tokens:1024})});if(thinkEl) thinkEl.remove();if(!res.ok){var e=await res.json().catch(function(){return{};});throw new Error(e.error||'Server error '+res.status);}var data=await res.json();var reply=(data.content&&data.content[0]&&data.content[0].text)||data.reply||'(No response)';chatHistories[labId].push({role:'assistant',content:reply});chatAppend(labId,'ai',reply);chatExchanges[labId]=(chatExchanges[labId]||0)+1;if(chatExchanges[labId]>=LAB_COMPLETE_THRESHOLD&&!labSignaled[labId]){labSignaled[labId]=true;window.parent.postMessage({type:'labComplete',courseId:COURSE_ID,moduleId:MODULE_ID,lessonId:labId,exchangeCount:chatExchanges[labId]},'*');}}catch(err){if(thinkEl) thinkEl.remove();chatHistories[labId].pop();var errDiv=document.createElement('div');errDiv.className='chat-error';errDiv.textContent='⚠ '+(err.message||'Connection error.');if(chat) chat.appendChild(errDiv);}chatSetLoading(labId,false);var inpEl=document.getElementById('inp-'+labId);if(inpEl) inpEl.focus();}
function chatReset(labId){chatHistories[labId]=[];var msgs=document.getElementById('msgs-'+labId);if(!msgs) return;msgs.innerHTML='';var div=document.createElement('div');div.className='chat-msg ai';div.textContent='Conversation reset. Start fresh.';msgs.appendChild(div);}
function chatKeydown(e,labId){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();chatSend(labId);}}
document.querySelectorAll('.lab-chat-input textarea').forEach(function(ta){ta.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px';});});
var SIZER_KEY='aesop-font-size';
function applySize(val){val=parseInt(val);document.querySelectorAll('.lesson-section,.story-scene,.section-body,.story-text,.callout p,.gold-callout p,.warn-callout p').forEach(function(el){el.style.fontSize=val+'px';});localStorage.setItem(SIZER_KEY,val);var r=document.getElementById('sizerRange');if(r) r.value=val;}
function adjustSize(delta){var r=document.getElementById('sizerRange');if(!r) return;applySize(Math.min(22,Math.max(12,parseInt(r.value)+delta)));}
(function(){var saved=localStorage.getItem(SIZER_KEY);if(saved) applySize(parseInt(saved));})();
goPage('p-l1');

<\/script>
