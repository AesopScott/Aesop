<div class="tab-strip"><div class="tab-group"><div class="tab-lesson active" data-page="p-l1" onclick="goPage('p-l1')">L1</div><div class="tab-subs"><span class="tab-sep">·</span><div class="tab-sub" data-page="p-q1" onclick="goPage('p-q1')">Quiz</div><span class="tab-sep">·</span><div class="tab-sub" data-page="p-lab1" onclick="goPage('p-lab1')">Lab</div></div></div><div class="tab-group"><div class="tab-lesson" data-page="p-l2" onclick="goPage('p-l2')">L2</div><div class="tab-subs"><span class="tab-sep">·</span><div class="tab-sub" data-page="p-q2" onclick="goPage('p-q2')">Quiz</div><span class="tab-sep">·</span><div class="tab-sub" data-page="p-lab2" onclick="goPage('p-lab2')">Lab</div></div></div><div class="tab-group"><div class="tab-lesson" data-page="p-l3" onclick="goPage('p-l3')">L3</div><div class="tab-subs"><span class="tab-sep">·</span><div class="tab-sub" data-page="p-q3" onclick="goPage('p-q3')">Quiz</div><span class="tab-sep">·</span><div class="tab-sub" data-page="p-lab3" onclick="goPage('p-lab3')">Lab</div></div></div><div class="tab-group"><div class="tab-lesson" data-page="p-l4" onclick="goPage('p-l4')">L4</div><div class="tab-subs"><span class="tab-sep">·</span><div class="tab-sub" data-page="p-q4" onclick="goPage('p-q4')">Quiz</div><span class="tab-sep">·</span><div class="tab-sub" data-page="p-lab4" onclick="goPage('p-lab4')">Lab</div></div></div><div class="tab-test" data-page="p-mt" onclick="goPage('p-mt')">Module Test</div></div>
<div class="content-area">
<div class="page" id="p-l1"><div class="lesson-hero"><div class="lesson-kicker">Module 6 · Lesson 1</div><h1>How AI Auditing Works</h1><div class="tagline">Technical audits, process audits, and outcome audits — and why each alone is insufficient</div></div><div class="lesson-body"><div class="story-scene" data-label="The Audit Request"><p class="story-text">The regulator asked for an audit. The company provided documentation of their testing methodology, demographic performance metrics, and governance processes. The regulator reviewed it and found everything in order.</p><p class="story-text">Six months later, a journalist found that the AI was systematically disadvantaging one demographic group in production. The audit had missed it. The question was why — and what a better audit would have looked like.</p></div></div><div class="lesson-section"><div class="section-heading">How AI Auditing Works</div><div class="section-body"><p>AI auditing encompasses a range of activities that assess whether AI systems are performing as intended, complying with applicable requirements, and producing outcomes that meet defined standards. The term covers substantially different practices — from automated technical testing to human review of decision processes to third-party institutional evaluation.</p><p><strong>Technical auditing</strong> involves evaluating the AI system itself — testing accuracy, bias, robustness, and behavior across demographic subgroups and edge cases. Technical audits may include adversarial testing (attempting to cause failures), differential analysis (comparing outcomes across demographic groups), and red-teaming (simulating misuse scenarios).</p><p><strong>Process auditing</strong> evaluates the procedures surrounding AI development and deployment — documentation practices, training data management, testing protocols, incident response, and governance structures. Process audits ask whether the organization is doing the right things, even if they do not directly evaluate whether the AI is producing good outcomes.</p><p><strong>Outcome auditing</strong> evaluates the real-world effects of AI deployments — are the decisions the AI makes or influences producing the outcomes the organization intends? Are there disparate impacts? Are affected individuals receiving accurate information? Outcome auditing requires data beyond the AI system itself, including post-deployment monitoring of actual consequences.</p></div><div class="callout"><div class="callout-label">Why All Three Matter</div><p>Technical audits can miss harms that only manifest in deployment. Process audits can miss systems that follow good processes but still produce harmful outcomes. Outcome audits are the most relevant but also the most resource-intensive and the hardest to connect causally to AI system behavior. Meaningful AI auditing typically requires all three.</p></div></div><div class="page-nav"><button class="pnav-btn primary" onclick="goPage('p-q1')">Quiz →</button></div></div><div class="page" id="p-q1"><div class="quiz-hero"><h1>Lesson 1 Quiz</h1><div class="tagline">How AI auditing works</div></div><div class="quiz-area"><div class="quiz-box" id="q1-1"><div class="quiz-q">Adversarial testing in AI auditing involves:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q1-1')">Asking competitor companies to evaluate the AI system</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q1-1')">Attempting to cause AI system failures through deliberate probing — simulating misuse, edge cases, and attack scenarios</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q1-1')">Requiring the AI system to compete against human decision-makers</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q1-1')">Auditing the AI system while it is actively processing data</button>
      </div><div class="quiz-feedback right">Correct. Adversarial testing — deliberately probing for failure modes — is a core technical audit technique for identifying robustness and security weaknesses.</div><div class="quiz-feedback wrong">Adversarial testing deliberately attempts to cause AI failures — simulating misuse, edge cases, and attack scenarios to identify vulnerabilities.</div></div><div class="quiz-box" id="q1-2"><div class="quiz-q">Process auditing evaluates:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q1-2')">The accuracy of AI outputs on test datasets</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q1-2')">The procedures surrounding AI development — documentation, training data management, testing protocols, governance structures</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q1-2')">The real-world outcomes of AI deployment decisions</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q1-2')">The qualifications of AI development team members</button>
      </div><div class="quiz-feedback right">Correct. Process audits evaluate whether the organization is following good practices — documentation, data management, testing, governance — not whether the AI is directly producing good outcomes.</div><div class="quiz-feedback wrong">Process auditing evaluates the procedures and practices around AI development and deployment — not the AI outputs themselves or their real-world consequences.</div></div><div class="quiz-box" id="q1-3"><div class="quiz-q">Why is outcome auditing hardest to conduct?</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q1-3')">Outcomes are not quantifiable for AI systems</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q1-3')">It requires post-deployment monitoring of real-world consequences and is difficult to causally connect to AI system behavior</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q1-3')">Only the affected individuals can conduct outcome audits</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q1-3')">Regulatory frameworks prohibit outcome auditing</button>
      </div><div class="quiz-feedback right">Correct. Outcome auditing requires data from deployment contexts (not just testing), long time horizons, and difficult causal analysis connecting AI behavior to outcomes.</div><div class="quiz-feedback wrong">Outcome auditing is hardest because it requires post-deployment monitoring of real consequences — data beyond the AI system itself — and difficult causal attribution.</div></div><div class="quiz-box" id="q1-4"><div class="quiz-q">Why do meaningful AI audits require all three types (technical, process, outcome)?</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q1-4')">Regulators require all three types by law</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q1-4')">Each type catches different failure modes that the others miss: technical audits miss deployment harms, process audits miss outcome harms, outcome audits miss internal governance failures</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q1-4')">Using only one type is less expensive but produces equivalent results</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q1-4')">Three-part auditing is an international best practice without clear justification</button>
      </div><div class="quiz-feedback right">Correct. Each audit type has characteristic blind spots — combining all three catches failure modes that any single approach misses.</div><div class="quiz-feedback wrong">Each audit type has blind spots: technical audits miss deployment harms, process audits miss outcome harms, outcome audits miss internal governance. All three together provide better coverage.</div></div></div><div class="page-nav"><button class="pnav-btn" onclick="goPage('p-l1')">← Lesson</button><button class="pnav-btn primary" onclick="goPage('p-lab1')">Lab →</button></div></div><div class="page" id="p-lab1"><div class="lab-hero"><h1>Lab 1 — Audit Design</h1><div class="tagline">Design a meaningful AI audit for a specific system</div></div><div class="lab-area"><div class="lab-intro"><h4>Your Task</h4><p>Choose an AI system: credit scoring model at a bank, facial recognition in a retail store, or content moderation AI at a social media company.</p><p>Design a meaningful audit for that system. Specify the technical, process, and outcome audit components. For each component: what would you test, how would you test it, and what would constitute a passing vs. failing result?</p><div class="lab-prompt">Name your AI system and give me your initial audit design. I will probe whether your design would actually catch the most likely failure modes.</div></div><div class="lab-chat" id="chat-l1"><div class="lab-chat-header"><span>AI Lab Assistant</span><span class="chat-badge">AI Audit Designer</span></div><div class="lab-chat-msgs" id="msgs-l1"><div class="chat-msg ai">Name your system and give me your audit design. I will push you to test whether each component would actually catch the failure modes most likely for your specific system.</div></div><div class="lab-chat-input"><textarea id="inp-l1" placeholder="Type your response…" onkeydown="chatKeydown(event,'l1')"></textarea><button class="chat-reset-btn" onclick="chatReset('l1')">Reset</button><button class="chat-send-btn" id="send-l1" onclick="chatSend('l1')">Send</button></div></div></div><div class="page-nav"><button class="pnav-btn" onclick="goPage('p-q1')">← Quiz</button><button class="pnav-btn primary" onclick="goPage('p-l2')">Lesson 2 →</button></div></div><div class="page" id="p-l2"><div class="lesson-hero"><div class="lesson-kicker">Module 6 · Lesson 2</div><h1>The Third-Party Audit Ecosystem</h1><div class="tagline">Who conducts AI audits, what they can and cannot assess, and the limits of audit-based governance</div></div><div class="lesson-body"><div class="story-scene" data-label="The Audit Market"><p class="story-text">The company announced it had received an independent third-party audit of its AI system and passed with flying colors. The audit firm was paid by the company being audited. The auditors had API access but not model weights.</p><p class="story-text">This is the current state of much third-party AI auditing. The limitation is not incompetence — it is structure. The auditing ecosystem has not yet developed the independence, access, and standards that financial auditing built over decades.</p></div></div><div class="lesson-section"><div class="section-heading">The Third-Party AI Audit Ecosystem</div><div class="section-body"><p>A market for third-party AI auditing has emerged — companies offering to assess AI systems independently of the organizations that built or deploy them. Understanding this ecosystem requires understanding both its promise and its substantial limitations.</p></div><div class="section-heading">Types of Third-Party Auditors</div><div class="section-body"><p><strong>Technical AI audit firms:</strong> Companies that conduct technical assessments of AI systems — bias testing, performance evaluation, security assessment. Examples include Credo AI, Parity AI, Arthur AI, and others. These firms can run technical tests more rigorously than most internal teams, using standardized methodologies and independent judgment.</p><p><strong>Consulting firm AI audit practices:</strong> Big Four accounting firms (Deloitte, PwC, KPMG, EY) and large consulting firms have developed AI audit practices, often extending existing risk assurance services. These firms bring existing client relationships and credibility but often have less technical AI depth than specialized firms.</p><p><strong>Academic and civil society audits:</strong> Researchers and advocacy organizations sometimes conduct independent audits — particularly for AI systems with significant public interest implications. These audits can access information that paid auditors cannot (like testing with affected community members) and have independence from commercial relationships. But they lack standard authority or enforcement backing.</p></div><div class="section-heading">The Auditor Limitations Problem</div><div class="section-body"><p>Third-party AI auditing faces several structural challenges that limit its effectiveness: <strong>Model access:</strong> Auditors typically get limited access to the systems they audit — API access or testing environments, not full model weights or training data. This makes comprehensive technical assessment difficult. <strong>Conflict of interest:</strong> Third-party auditors are paid by the organizations they audit — creating the same structural capture problem as financial auditing. <strong>Standards gap:</strong> Unlike financial auditing, AI auditing lacks agreed-upon standards for what constitutes a compliant system. Auditor judgment substitutes for objective criteria, with significant variation. <strong>Sandbagging risk:</strong> Organizations may optimize their systems for test conditions that auditors evaluate, without improving their general-use behavior.</p></div><div class="gold-callout"><div class="callout-label">Analogies to Financial Auditing</div><p>Financial auditing faced similar limitations before standardization — auditors paid by the audited, inconsistent standards, inadequate access. The resolution involved mandatory standards (GAAP, IFRS), auditor independence requirements, and regulator-backed oversight. Whether AI auditing can follow a similar path is an open question. The complexity and pace of AI development makes standardization significantly harder than for financial statements.</p></div></div><div class="page-nav"><button class="pnav-btn" onclick="goPage('p-lab1')">← Lab 1</button><button class="pnav-btn primary" onclick="goPage('p-q2')">Quiz →</button></div></div><div class="page" id="p-q2"><div class="quiz-hero"><h1>Lesson 2 Quiz</h1><div class="tagline">Third-party AI audit ecosystem</div></div><div class="quiz-area"><div class="quiz-box" id="q2-1"><div class="quiz-q">The conflict-of-interest problem in third-party AI auditing is that:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q2-1')">Auditors often have technical conflicts when they also build AI systems</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q2-1')">Third-party AI auditors are paid by the organizations they audit, creating structural capture analogous to financial auditing capture</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q2-1')">Government auditors have conflicts with the private sector auditors they oversee</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q2-1')">Auditors from one country face conflicts when auditing companies in another</button>
      </div><div class="quiz-feedback right">Correct. Auditors paid by the audited face structural capture — the same problem financial auditing faced before independence requirements were mandated.</div><div class="quiz-feedback wrong">Structural capture: third-party AI auditors are paid by the organizations being audited, creating incentives that may compromise audit independence and rigor.</div></div><div class="quiz-box" id="q2-2"><div class="quiz-q">The model access limitation in third-party AI auditing means:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q2-2')">AI auditors are not allowed to access AI systems during normal operation</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q2-2')">Auditors typically get limited access (API or test environments) rather than full model weights and training data, limiting comprehensive technical assessment</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q2-2')">AI companies refuse to share any information with auditors</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q2-2')">Only government auditors can access full AI model internals</button>
      </div><div class="quiz-feedback right">Correct. Limited model access — API or test environment rather than full model weights and training data — constrains what auditors can technically assess.</div><div class="quiz-feedback wrong">Third-party auditors typically get limited API or test environment access, not full access to model weights or training data — this limits the depth of technical assessment possible.</div></div><div class="quiz-box" id="q2-3"><div class="quiz-q">The sandbagging risk in AI auditing refers to:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q2-3')">Auditors under-reporting problems to maintain client relationships</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q2-3')">Organizations optimizing their AI systems for test conditions auditors evaluate without improving general-use behavior</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q2-3')">Auditors being overwhelmed by the volume of AI systems needing assessment</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q2-3')">AI systems performing worse during audits than in normal operation</button>
      </div><div class="quiz-feedback right">Correct. Sandbagging — known in other auditing contexts — involves optimizing for the specific tests auditors run rather than improving actual system behavior.</div><div class="quiz-feedback wrong">Sandbagging means organizations tune systems for auditor test conditions without improving general behavior — audits assess the tuned version, not the deployed version.</div></div><div class="quiz-box" id="q2-4"><div class="quiz-q">Academic and civil society AI audits have an advantage over commercial audits in that:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q2-4')">They have more technical expertise than commercial auditors</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q2-4')">They have independence from commercial relationships and can sometimes access information (like affected community input) unavailable to paid auditors</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q2-4')">They receive better model access from AI companies</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q2-4')">They are backed by regulatory authority to require compliance</button>
      </div><div class="quiz-feedback right">Correct. Academic and civil society auditors have independence from commercial relationships and sometimes unique access to affected communities — but lack formal authority and consistent resources.</div><div class="quiz-feedback wrong">Civil society auditors have independence from commercial relationships and can engage affected communities in ways paid auditors typically cannot — but they lack regulatory authority.</div></div></div><div class="page-nav"><button class="pnav-btn" onclick="goPage('p-l2')">← Lesson</button><button class="pnav-btn primary" onclick="goPage('p-lab2')">Lab →</button></div></div><div class="page" id="p-lab2"><div class="lab-hero"><h1>Lab 2 — Audit Ecosystem Critique</h1><div class="tagline">Evaluate a real third-party AI audit</div></div><div class="lab-area"><div class="lab-intro"><h4>Your Task</h4><p>Find or research a real third-party AI audit (several are publicly available — Algorithmic Justice League has conducted some; academic researchers have audited facial recognition systems; some companies have published audit results).</p><p>Critique the audit: (1) What type of audit was it (technical, process, outcome)? (2) What was the auditor's access? (3) What structural limitations affected its validity? (4) What would a more rigorous audit have done differently?</p><div class="lab-prompt">Describe the audit you found and give me your initial critique. I will push you on the structural limitations and what they mean for what the audit can and cannot tell us.</div></div><div class="lab-chat" id="chat-l2"><div class="lab-chat-header"><span>AI Lab Assistant</span><span class="chat-badge">AI Audit Critic</span></div><div class="lab-chat-msgs" id="msgs-l2"><div class="chat-msg ai">Describe the audit you found and your initial critique. I will push you to assess what the structural limitations mean for what the audit actually tells us.</div></div><div class="lab-chat-input"><textarea id="inp-l2" placeholder="Type your response…" onkeydown="chatKeydown(event,'l2')"></textarea><button class="chat-reset-btn" onclick="chatReset('l2')">Reset</button><button class="chat-send-btn" id="send-l2" onclick="chatSend('l2')">Send</button></div></div></div><div class="page-nav"><button class="pnav-btn" onclick="goPage('p-q2')">← Quiz</button><button class="pnav-btn primary" onclick="goPage('p-l3')">Lesson 3 →</button></div></div><div class="page" id="p-l3"><div class="lesson-hero"><div class="lesson-kicker">Module 6 · Lesson 3</div><h1>Regulatory Enforcement</h1><div class="tagline">How AI governance rules actually get enforced — and where enforcement fails</div></div><div class="lesson-body"><div class="story-scene" data-label="Enforcement in Practice"><p class="story-text">The company had violated the rule. The question was whether anyone would find out, whether there was a regulator with clear authority to act, whether there was evidence sufficient for enforcement, and whether the penalty would be worth the enforcement effort.</p><p class="story-text">This calculation plays out continuously in AI governance. Enforcement is not automatic. It is resource-constrained, jurisdictionally bounded, and largely reactive.</p></div></div><div class="lesson-section"><div class="section-heading">Regulatory Enforcement: Cases and Mechanisms</div><div class="section-body"><p>How do AI governance rules get enforced in practice? Several notable cases illustrate different enforcement mechanisms and their effectiveness.</p></div><div class="section-heading">FTC Enforcement Actions</div><div class="section-body"><p>The FTC has pursued enforcement actions related to AI in several categories. Algorithmic bias in pricing — including a settlement with a rental housing algorithm that charged different prices based on protected characteristics. Deceptive AI claims — including action against companies that claimed their AI could accurately detect cancer, lying, or other conditions it could not. Data collection practices underlying AI systems — extending existing privacy and consumer protection authority into AI-specific contexts.</p><p>FTC enforcement is reactive — it responds to harms after they occur, often based on complaints or journalism. It lacks pre-deployment authority for most AI categories, meaning harms must occur before the enforcement mechanism activates.</p></div><div class="section-heading">CFPB and Financial Regulator Enforcement</div><div class="section-body"><p>Financial regulators have more developed AI enforcement mechanisms than most sectors, reflecting existing model risk management requirements. Bank regulators (OCC, Federal Reserve, FDIC) have issued guidance requiring banks to document, validate, and monitor AI models used in credit and risk decisions. CFPB has pursued enforcement against discriminatory credit algorithms. These agencies have examination authority — they can require documentation and review systems as part of regular bank examinations, not only in response to complaints.</p></div><div class="section-heading">EU AI Office Enforcement</div><div class="section-body"><p>The EU AI Office — newly established under the EU AI Act — represents a different enforcement model: a dedicated authority with primary responsibility for GPAI model oversight, investigation authority, and direct fine-levying capability. Early cases will shape precedent for how the Act is interpreted. As of 2024–2025, the Office was still in early operational stages, with enforcement cases limited but anticipated to increase.</p></div><div class="callout"><div class="callout-label">Enforcement Gaps</div><p>Most AI enforcement operates reactively and sectorally. Consumer AI applications that cause diffuse harms, AI systems used in small business operations, and AI operating across jurisdictions often lack effective enforcement coverage. The enforcement systems that exist were designed for other contexts and adapted to AI — creating gaps that only dedicated AI regulation begins to fill.</p></div></div><div class="page-nav"><button class="pnav-btn" onclick="goPage('p-lab2')">← Lab 2</button><button class="pnav-btn primary" onclick="goPage('p-q3')">Quiz →</button></div></div><div class="page" id="p-q3"><div class="quiz-hero"><h1>Lesson 3 Quiz</h1><div class="tagline">Regulatory enforcement of AI governance</div></div><div class="quiz-area"><div class="quiz-box" id="q3-1"><div class="quiz-q">FTC AI enforcement is primarily:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q3-1')">Pre-deployment approval for consumer AI applications</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q3-1')">Reactive — responding to harms after they occur, based on complaints or journalism</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q3-1')">Standard-setting through mandatory industry compliance</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q3-1')">Coordinated with EU AI Act enforcement mechanisms</button>
      </div><div class="quiz-feedback right">Correct. FTC enforcement is reactive — it cannot require pre-deployment review of most AI systems and activates after harms occur.</div><div class="quiz-feedback wrong">FTC enforcement is reactive — it responds to AI harms after they occur, typically based on consumer complaints or investigative journalism.</div></div><div class="quiz-box" id="q3-2"><div class="quiz-q">Financial regulators (OCC, Federal Reserve, FDIC) have more developed AI enforcement than most sectors because:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q3-2')">Financial AI is less complex than other AI applications</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q3-2')">They have examination authority enabling regular documentation review, not only complaint-based enforcement</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q3-2')">Financial companies self-regulate more effectively than other industries</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q3-2')">Financial AI causes fewer harms than other sectors</button>
      </div><div class="quiz-feedback right">Correct. Bank examination authority allows financial regulators to review AI systems as part of regular examinations — proactive oversight, not just reactive enforcement.</div><div class="quiz-feedback wrong">Financial regulators have examination authority — they can review AI documentation and systems during regular bank examinations, enabling proactive oversight rather than only complaint-based response.</div></div><div class="quiz-box" id="q3-3"><div class="quiz-q">The EU AI Office represents a different enforcement model because:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q3-3')">It is more experienced than national enforcement agencies</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q3-3')">It is a dedicated authority with primary GPAI model oversight responsibility, investigation authority, and direct fine-levying capability</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q3-3')">It coordinates enforcement among all global AI regulators</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q3-3')">It is funded by AI companies rather than governments</button>
      </div><div class="quiz-feedback right">Correct. The EU AI Office is a dedicated AI regulator — not an extension of existing sector regulation — with focused jurisdiction over GPAI models.</div><div class="quiz-feedback wrong">The EU AI Office is a dedicated AI authority specifically established for GPAI model oversight, with investigation authority and direct fine-levying capability.</div></div><div class="quiz-box" id="q3-4"><div class="quiz-q">Which of the following is a significant AI enforcement gap?</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q3-4')">Financial sector AI — which has well-developed regulatory frameworks</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q3-4')">Consumer AI applications that cause diffuse harms and AI operating across jurisdictions often lack effective enforcement coverage</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q3-4')">Medical AI — where FDA has established enforcement mechanisms</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q3-4')">Large technology company AI — which is covered by existing competition law</button>
      </div><div class="quiz-feedback right">Correct. Consumer AI applications, small business AI, and cross-jurisdictional AI systems often lack effective enforcement coverage.</div><div class="quiz-feedback wrong">Consumer AI applications, AI causing diffuse harms, and cross-jurisdictional systems are significant enforcement gaps — existing enforcement was designed for other contexts and adapted to AI.</div></div></div><div class="page-nav"><button class="pnav-btn" onclick="goPage('p-l3')">← Lesson</button><button class="pnav-btn primary" onclick="goPage('p-lab3')">Lab →</button></div></div><div class="page" id="p-lab3"><div class="lab-hero"><h1>Lab 3 — Enforcement Gap Analysis</h1><div class="tagline">Identify a specific AI system that falls through enforcement gaps and design a remedy</div></div><div class="lab-area"><div class="lab-intro"><h4>Your Task</h4><p>Choose an AI application with significant potential harms that you believe operates in an enforcement gap — where no existing regulator has clear authority and effective enforcement mechanisms.</p><p>(1) Map which regulators have potential jurisdiction and why each has limitations. (2) Describe the harm that the gap enables. (3) Propose a specific enforcement mechanism that would address the gap — who would have authority, what would trigger enforcement, what remedies would be available.</p><div class="lab-prompt">Name your AI application and start with the jurisdiction mapping. I will probe your claims about enforcement gaps and push you on your proposed remedy.</div></div><div class="lab-chat" id="chat-l3"><div class="lab-chat-header"><span>AI Lab Assistant</span><span class="chat-badge">AI Enforcement Gap Analyst</span></div><div class="lab-chat-msgs" id="msgs-l3"><div class="chat-msg ai">Name your AI application and give me your jurisdiction map. I will challenge your gap identification and proposed remedy.</div></div><div class="lab-chat-input"><textarea id="inp-l3" placeholder="Type your response…" onkeydown="chatKeydown(event,'l3')"></textarea><button class="chat-reset-btn" onclick="chatReset('l3')">Reset</button><button class="chat-send-btn" id="send-l3" onclick="chatSend('l3')">Send</button></div></div></div><div class="page-nav"><button class="pnav-btn" onclick="goPage('p-q3')">← Quiz</button><button class="pnav-btn primary" onclick="goPage('p-l4')">Lesson 4 →</button></div></div><div class="page" id="p-l4"><div class="lesson-hero"><div class="lesson-kicker">Module 6 · Lesson 4</div><h1>Building a Compliance Program</h1><div class="tagline">How organizations build AI governance compliance programs that actually work</div></div><div class="lesson-body"><div class="story-scene" data-label="The Compliance Challenge"><p class="story-text">The new Chief AI Officer asked for a list of all AI systems in production. No one could produce one. Different systems had been built by different teams, acquired from different vendors, and deployed across different business units.</p><p class="story-text">That was the first compliance gap — not a policy gap, not a technical gap. A visibility gap. And it is where most AI compliance programs should start.</p></div></div><div class="lesson-section"><div class="section-heading">What Is an AI Compliance Program?</div><div class="section-body"><p>A compliance program for AI governance is not simply a collection of policies — it is a system of processes, controls, documentation, and accountability that enables an organization to consistently meet its governance obligations and demonstrate that it has done so. Drawing on analogies from established compliance fields (privacy, financial regulation, environmental compliance), AI compliance programs share common structural elements.</p></div><div class="section-heading">Core Elements of an AI Compliance Program</div><div class="section-body"><p><strong>AI Inventory:</strong> A systematic registry of AI systems in use within the organization — what they do, where they are deployed, what data they use, and what risk classification they carry. Without knowing what AI is deployed, governance is impossible.</p><p><strong>Risk Classification:</strong> A process for assessing each AI system against risk criteria — probability of harm, severity of potential harm, affected population, reversibility of decisions. Risk classification determines what governance requirements apply to each system.</p><p><strong>Pre-deployment Review:</strong> A structured process for evaluating new AI systems before deployment — covering technical testing, data governance review, documentation review, ethics assessment, and governance sign-off. The review threshold and rigor should scale with risk classification.</p><p><strong>Ongoing Monitoring:</strong> Post-deployment performance monitoring with defined metrics, alert thresholds, and escalation processes. Compliance is not a one-time certification — AI systems drift, contexts change, and new failure modes emerge.</p><p><strong>Incident Management:</strong> A defined process for handling AI system failures — who is responsible for identification, escalation, investigation, remediation, and reporting (internal and, where required, regulatory).</p><p><strong>Documentation and Records:</strong> Systematic maintenance of governance documentation — design decisions, testing results, risk assessments, incident records, and governance approvals — sufficient to demonstrate compliance to regulators or internal auditors.</p></div><div class="gold-callout"><div class="callout-label">Starting Small</div><p>Organizations without mature AI compliance programs often struggle to know where to begin. The most effective starting point is typically the AI inventory — you cannot govern what you cannot see. A complete inventory, even without sophisticated governance attached, reveals where the highest-risk systems are and where to invest first.</p></div></div><div class="page-nav"><button class="pnav-btn" onclick="goPage('p-lab3')">← Lab 3</button><button class="pnav-btn primary" onclick="goPage('p-q4')">Quiz →</button></div></div><div class="page" id="p-q4"><div class="quiz-hero"><h1>Lesson 4 Quiz</h1><div class="tagline">Building an AI compliance program</div></div><div class="quiz-area"><div class="quiz-box" id="q4-1"><div class="quiz-q">The AI inventory is the starting point for compliance programs because:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q4-1')">It is the least expensive compliance activity</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q4-1')">You cannot govern what you cannot see — a complete inventory reveals where high-risk systems are and where to invest first</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q4-1')">Regulators specifically require AI inventories before other compliance activities</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q4-1')">AI inventories are the only compliance activity that does not require technical expertise</button>
      </div><div class="quiz-feedback right">Correct. Without knowing what AI is deployed, governance is impossible. The inventory is the foundation on which all other compliance elements depend.</div><div class="quiz-feedback wrong">The AI inventory is foundational — without visibility into what AI systems exist and what they do, governance programs cannot be targeted or effective.</div></div><div class="quiz-box" id="q4-2"><div class="quiz-q">Pre-deployment review in an AI compliance program should:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q4-2')">Apply the same rigor to all AI systems regardless of risk</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q4-2')">Scale in threshold and rigor with the risk classification of the system being reviewed</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q4-2')">Be conducted exclusively by external auditors for independence</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q4-2')">Replace post-deployment monitoring once completed</button>
      </div><div class="quiz-feedback right">Correct. Review rigor should scale with risk — a spam filter and a hiring algorithm should not face identical pre-deployment review requirements.</div><div class="quiz-feedback wrong">Pre-deployment review should scale with risk classification — applying the same rigor to all AI systems wastes resources on low-risk systems and underprotects against high-risk ones.</div></div><div class="quiz-box" id="q4-3"><div class="quiz-q">Ongoing monitoring matters for AI compliance because:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q4-3')">Pre-deployment testing is insufficient to identify initial failures</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q4-3')">AI systems drift, contexts change, and new failure modes emerge post-deployment — compliance requires continuous monitoring, not one-time certification</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q4-3')">Regulators require monitoring reports to be filed monthly</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q4-3')">AI systems always fail within the first six months of deployment</button>
      </div><div class="quiz-feedback right">Correct. AI systems change over time — drift, context shifts, new failure modes. Ongoing monitoring is not optional if compliance is to be meaningful.</div><div class="quiz-feedback wrong">AI systems drift, deployment contexts change, and new failure modes emerge post-deployment. Ongoing monitoring is essential because compliance is not a one-time certification.</div></div><div class="quiz-box" id="q4-4"><div class="quiz-q">Incident management in an AI compliance program includes:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="answer(this,'wrong','q4-4')">Only external reporting to regulators when required</button>
        <button class="quiz-opt" onclick="answer(this,'correct','q4-4')">A defined process covering identification, escalation, investigation, remediation, and reporting — internal and regulatory where required</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q4-4')">Primarily public communications about AI failures</button>
        <button class="quiz-opt" onclick="answer(this,'wrong','q4-4')">Financial restitution to individuals harmed by AI systems</button>
      </div><div class="quiz-feedback right">Correct. Incident management covers the full response lifecycle — identification through remediation — with both internal and regulatory reporting where required.</div><div class="quiz-feedback wrong">AI incident management covers the full response lifecycle: identification, escalation, investigation, remediation, and reporting (both internal and regulatory where required).</div></div></div><div class="page-nav"><button class="pnav-btn" onclick="goPage('p-l4')">← Lesson</button><button class="pnav-btn primary" onclick="goPage('p-lab4')">Lab →</button></div></div><div class="page" id="p-lab4"><div class="lab-hero"><h1>Lab 4 — Compliance Program Design</h1><div class="tagline">Build an AI compliance program for a specific organization</div></div><div class="lab-area"><div class="lab-intro"><h4>Your Task</h4><p>Choose an organization type: a mid-sized bank, a healthcare system, a large social media company, or a government agency using AI in benefits administration.</p><p>Design the core elements of an AI compliance program for that organization: inventory approach, risk classification criteria, pre-deployment review process, monitoring approach, and incident management. Identify the three biggest implementation challenges for your design.</p><div class="lab-prompt">Name your organization type and give me your compliance program design. I will probe each element and push you on implementation challenges.</div></div><div class="lab-chat" id="chat-l4"><div class="lab-chat-header"><span>AI Lab Assistant</span><span class="chat-badge">AI Compliance Program Designer</span></div><div class="lab-chat-msgs" id="msgs-l4"><div class="chat-msg ai">Name your organization and give me your compliance program design. I will push you on whether each element is appropriately scaled for your organization type and on realistic implementation challenges.</div></div><div class="lab-chat-input"><textarea id="inp-l4" placeholder="Type your response…" onkeydown="chatKeydown(event,'l4')"></textarea><button class="chat-reset-btn" onclick="chatReset('l4')">Reset</button><button class="chat-send-btn" id="send-l4" onclick="chatSend('l4')">Send</button></div></div></div><div class="page-nav"><button class="pnav-btn" onclick="goPage('p-q4')">← Quiz</button><button class="pnav-btn primary" onclick="goPage('p-mt')">Module Test →</button></div></div><div class="page" id="p-mt"><div class="quiz-hero"><h1>Module Test</h1><div class="tagline">15 questions · 80% to pass</div></div><div class="mt-area"><div class="quiz-box" id="mt-q1"><div class="quiz-q">Technical AI auditing involves:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q1')">Evaluating organizational AI policies and governance structures</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q1')">Testing the AI system itself — accuracy, bias, robustness, demographic performance, adversarial testing</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q1')">Reviewing post-deployment outcomes and real-world consequences</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q1')">Assessing the qualifications of AI development teams</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">Technical auditing evaluates the AI system itself — accuracy, bias across demographic groups, robustness, security — not policies or outcomes.</div></div><div class="quiz-box" id="mt-q2"><div class="quiz-q">Process auditing in AI governance evaluates:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q2')">The accuracy of AI outputs on test datasets</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q2')">Procedures surrounding AI development — documentation, data management, testing protocols, governance structures</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q2')">Real-world outcomes of AI deployment decisions</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q2')">The technical performance of AI models</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">Process auditing evaluates procedures and practices around AI development and deployment — not the AI outputs themselves.</div></div><div class="quiz-box" id="mt-q3"><div class="quiz-q">Outcome auditing is hardest to conduct because:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q3')">Outcomes are not quantifiable for AI systems</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q3')">It requires post-deployment data and difficult causal attribution connecting AI behavior to real-world consequences</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q3')">Only affected individuals can conduct outcome audits</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q3')">Regulatory frameworks prohibit it</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">Outcome auditing requires post-deployment monitoring of real consequences and difficult causal analysis — data and methods beyond what technical or process audits require.</div></div><div class="quiz-box" id="mt-q4"><div class="quiz-q">The conflict-of-interest problem in third-party AI auditing is:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q4')">Technical conflicts when auditors also build AI systems</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q4')">Auditors paid by the organizations they audit — structural capture analogous to financial auditing before independence requirements</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q4')">Government auditors conflicting with private auditors</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q4')">Cross-jurisdictional conflicts</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">Structural capture: third-party AI auditors are paid by the audited organization, creating incentives that may compromise independence and rigor.</div></div><div class="quiz-box" id="mt-q5"><div class="quiz-q">Sandbagging in AI auditing means:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q5')">Auditors under-reporting problems to keep clients</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q5')">Organizations optimizing their AI for auditor test conditions without improving general-use behavior</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q5')">Auditors overwhelmed by the volume of systems to assess</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q5')">AI systems performing worse during audits</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">Sandbagging: organizations tune systems for specific auditor tests without improving actual deployed behavior — audits assess the tuned version.</div></div><div class="quiz-box" id="mt-q6"><div class="quiz-q">FTC AI enforcement is primarily characterized as:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q6')">Pre-deployment approval for consumer AI</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q6')">Reactive — responding to harms after they occur</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q6')">Mandatory industry compliance standard-setting</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q6')">Coordinated with EU enforcement</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">FTC AI enforcement is reactive — it cannot require pre-deployment review and activates after harms occur.</div></div><div class="quiz-box" id="mt-q7"><div class="quiz-q">Bank regulators have more developed AI enforcement than most sectors because of:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q7')">Financial AI being less complex</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q7')">Examination authority allowing proactive documentation review during regular bank examinations</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q7')">Financial companies self-regulating more effectively</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q7')">Financial AI causing fewer harms</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">Bank examination authority allows proactive AI oversight — reviewing documentation during regular examinations, not only responding to complaints.</div></div><div class="quiz-box" id="mt-q8"><div class="quiz-q">The EU AI Office represents a different enforcement model because:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q8')">It is more experienced than national agencies</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q8')">It is a dedicated authority for GPAI model oversight with investigation authority and direct fine-levying capability</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q8')">It coordinates global AI regulators</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q8')">It is funded by AI companies</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">The EU AI Office is a dedicated AI regulator — not adapted sector regulation — with GPAI-specific jurisdiction and direct enforcement authority.</div></div><div class="quiz-box" id="mt-q9"><div class="quiz-q">An AI inventory is the starting point for compliance programs because:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q9')">It is least expensive</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q9')">You cannot govern what you cannot see — inventory reveals where high-risk systems are and where to invest first</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q9')">Regulators specifically require it first</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q9')">It requires no technical expertise</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">The AI inventory is foundational — without visibility into what AI systems exist, governance programs cannot be targeted or effective.</div></div><div class="quiz-box" id="mt-q10"><div class="quiz-q">Pre-deployment review in AI compliance should:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q10')">Apply the same rigor to all AI regardless of risk</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q10')">Scale in rigor with the risk classification of the system</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q10')">Be conducted exclusively by external auditors</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q10')">Replace post-deployment monitoring</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">Pre-deployment review should scale with risk classification — applying identical review to all AI wastes resources on low-risk systems and underprotects against high-risk ones.</div></div><div class="quiz-box" id="mt-q11"><div class="quiz-q">Ongoing monitoring matters for AI compliance because:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q11')">Pre-deployment testing is insufficient to identify initial failures</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q11')">AI systems drift, contexts change, and new failure modes emerge — compliance requires continuous monitoring</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q11')">Regulators require monthly monitoring reports</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q11')">AI systems always fail within six months</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">AI systems drift and contexts change post-deployment. Ongoing monitoring is essential because compliance cannot be a one-time certification.</div></div><div class="quiz-box" id="mt-q12"><div class="quiz-q">Academic and civil society AI auditors have an advantage in:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q12')">Greater technical expertise</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q12')">Independence from commercial relationships and sometimes access to affected communities unavailable to paid auditors</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q12')">Better model access from AI companies</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q12')">Regulatory authority to require compliance</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">Civil society auditors have independence from commercial relationships and can engage affected communities — but lack formal authority and consistent resources.</div></div><div class="quiz-box" id="mt-q13"><div class="quiz-q">AI incident management covers:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q13')">Only external regulatory reporting</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q13')">The full response lifecycle: identification, escalation, investigation, remediation, and reporting (internal and regulatory where required)</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q13')">Primarily public communications about failures</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q13')">Financial restitution to harmed individuals</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">AI incident management covers the full response lifecycle — identification through remediation — with both internal and regulatory reporting where required.</div></div><div class="quiz-box" id="mt-q14"><div class="quiz-q">A significant AI enforcement gap exists for:</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q14')">Financial sector AI — which has developed frameworks</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q14')">Consumer AI applications causing diffuse harms and AI operating across jurisdictions</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q14')">Medical AI — where FDA has established mechanisms</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q14')">Large tech company AI — covered by competition law</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">Consumer AI applications, AI causing diffuse harms, and cross-jurisdictional systems are major enforcement gaps — existing enforcement was designed for other contexts.</div></div><div class="quiz-box" id="mt-q15"><div class="quiz-q">Why do meaningful AI audits require technical, process, AND outcome evaluation?</div><div class="quiz-opts">
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q15')">Regulators require all three by law</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'correct','mt-q15')">Each type has characteristic blind spots that the others can catch — no single approach covers all failure modes</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q15')">Only one type is required but all three cost the same</button>
        <button class="quiz-opt" onclick="mtAnswer(this,'wrong','mt-q15')">This is international best practice without clear justification</button>
      </div><div class="quiz-feedback right">Correct.</div><div class="quiz-feedback wrong">Each audit type misses different failure modes. Technical audits miss deployment harms. Process audits miss outcome harms. Outcome audits miss internal governance failures. All three provide better coverage.</div></div><div id="mt-score" class="mt-score"></div></div><div class="page-nav"><button class="pnav-btn" onclick="goPage('p-lab4')">← Lab 4</button><button class="pnav-btn primary" onclick="window.parent.postMessage({type:'modTestPassed',courseId:'governance',moduleId:MODULE_ID},'*');this.textContent='\u2713 Reported';">Mark Complete &amp; Return to Hub</button></div></div>
</div></div>
<script>
var COURSE_ID='governance';
var MODULE_ID='gov-m6';
var PROXY_URL='/aesop-api/proxy.php';
var currentPageId='p-l1';
var lessonSignaled={},quizSignaled={},labSignaled={};
var PAGE_TO_LESSON={'p-l1':'l1','p-l2':'l2','p-l3':'l3','p-l4':'l4'};
var LAB_SYSTEM_PROMPTS={
  l1:`You are an AI audit designer for AESOP AI Academy, AI Governance Module 6. Students design a three-component audit for a specific AI system. Push them to specify what they would actually test, how they would test it, and what would constitute passing vs. failing for each component. Challenge: would the technical audit catch the most likely failure mode for this specific system? Stay on topic. 2-3 paragraphs per response.`,
  l2:`You are an AI audit ecosystem critic for AESOP AI Academy, AI Governance Module 6. Students critique a real third-party AI audit. Push them to assess structural limitations — not just technical shortcomings. What does the auditor's limited model access mean for what the audit can and cannot tell us? How does the client-pays structure affect audit independence? Stay on topic. 2-3 paragraphs per response.`,
  l3:`You are an AI enforcement gap analyst for AESOP AI Academy, AI Governance Module 6. Students identify AI applications in enforcement gaps and propose remedies. Push for specificity on jurisdictional limits — what specific provision of FTC law, CFPB authority, or sector regulation fails here and why? Push the remedy design: who would specifically have authority, what would specifically trigger enforcement, what would specifically make the remedy effective? Stay on topic. 2-3 paragraphs per response.`,
  l4:`You are an AI compliance program designer for AESOP AI Academy, AI Governance Module 6. Students design compliance programs for specific organization types. Push for appropriate scaling — a mid-sized bank should not have the same compliance program as a social media giant. Push on implementation challenges: what would a realistic compliance team encounter in the first 90 days of implementation? Stay on topic. 2-3 paragraphs per response.`
};

function goPage(id){var prev=document.getElementById(currentPageId);var next=document.getElementById(id);if(!next) return;var pl=PAGE_TO_LESSON[currentPageId];if(pl&&!lessonSignaled[pl]){lessonSignaled[pl]=true;window.parent.postMessage({type:'lessonComplete',courseId:COURSE_ID,moduleId:MODULE_ID,lessonId:pl},'*');}if(prev) prev.classList.remove('active');next.classList.add('active');currentPageId=id;updateTabs();window.scrollTo(0,0);var _sc=document.querySelector('.content');if(_sc)_sc.scrollTop=0;}
function updateTabs(){document.querySelectorAll('.tab-lesson,.tab-sub,.tab-test').forEach(function(el){el.classList.toggle('active',el.dataset.page===currentPageId);});}
function answer(btn,result,qId){var box=document.getElementById(qId);box.querySelectorAll('.quiz-opt').forEach(function(b){b.disabled=true;});btn.classList.add(result);box.querySelectorAll('.quiz-feedback').forEach(function(fb){fb.classList.remove('show');});box.querySelector('.quiz-feedback.'+(result==='right'?'right':'wrong')).classList.add('show');}
var mtTotal=15,mtCorrect=0,mtAnswered=0;
function mtAnswer(btn,result,qId){answer(btn,result,qId);mtAnswered++;if(result==='correct') mtCorrect++;if(mtAnswered>=mtTotal){var el=document.getElementById('mt-score');el.style.display='block';var pct=Math.round((mtCorrect/mtTotal)*100);el.innerHTML='Score: <strong>'+mtCorrect+'/'+mtTotal+'</strong> ('+pct+'%)'+(pct>=80?' — Module passed.':pct>=60?' — Review and retake.':' — Keep studying.');if(pct>=80) window.parent.postMessage({type:'modTestPassed',courseId:COURSE_ID,moduleId:MODULE_ID},'*');}}
var chatHistories={l1:[],l2:[],l3:[],l4:[]};var chatExchanges={l1:0,l2:0,l3:0,l4:0};var LAB_COMPLETE_THRESHOLD=3;
var ACADEMY_GUARDRAIL='You are an AI lab assistant for AESOP AI Academy — AI Governance course. Stay strictly on topic.\n\n';
function chatAppend(labId,role,text){var msgs=document.getElementById('msgs-'+labId);if(!msgs) return;var div=document.createElement('div');div.className='chat-msg '+(role==='user'?'user':'ai');div.innerHTML=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;}
function chatThinking(labId){var msgs=document.getElementById('msgs-'+labId);if(!msgs) return null;var div=document.createElement('div');div.className='chat-msg thinking';div.textContent='Thinking…';msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;return div;}
function chatSetLoading(labId,l){var btn=document.getElementById('send-'+labId);var inp=document.getElementById('inp-'+labId);if(btn) btn.disabled=l;if(inp) inp.disabled=l;}
async function chatSend(labId){var inp=document.getElementById('inp-'+labId);if(!inp) return;var text=inp.value.trim();if(!text) return;inp.value='';inp.style.height='auto';chatAppend(labId,'user',text);chatHistories[labId].push({role:'user',content:text});chatSetLoading(labId,true);var thinkEl=chatThinking(labId);var chat=document.getElementById('chat-'+labId);var ee=chat?chat.querySelector('.chat-error'):null;if(ee) ee.remove();try{var res=await fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:chatHistories[labId],system_prompt:ACADEMY_GUARDRAIL+(LAB_SYSTEM_PROMPTS[labId]||''),max_tokens:1024})});if(thinkEl) thinkEl.remove();if(!res.ok){var e=await res.json().catch(function(){return{};});throw new Error(e.error||'Server error '+res.status);}var data=await res.json();var reply=(data.content&&data.content[0]&&data.content[0].text)||data.reply||'(No response)';chatHistories[labId].push({role:'assistant',content:reply});chatAppend(labId,'ai',reply);chatExchanges[labId]=(chatExchanges[labId]||0)+1;if(chatExchanges[labId]>=LAB_COMPLETE_THRESHOLD&&!labSignaled[labId]){labSignaled[labId]=true;window.parent.postMessage({type:'labComplete',courseId:COURSE_ID,moduleId:MODULE_ID,lessonId:labId,exchangeCount:chatExchanges[labId]},'*');}}catch(err){if(thinkEl) thinkEl.remove();chatHistories[labId].pop();var errDiv=document.createElement('div');errDiv.className='chat-error';errDiv.textContent='⚠ '+(err.message||'Connection error.');if(chat) chat.appendChild(errDiv);}chatSetLoading(labId,false);var inpEl=document.getElementById('inp-'+labId);if(inpEl) inpEl.focus();}
function chatReset(labId){chatHistories[labId]=[];var msgs=document.getElementById('msgs-'+labId);if(!msgs) return;msgs.innerHTML='';var div=document.createElement('div');div.className='chat-msg ai';div.textContent='Conversation reset. Start fresh.';msgs.appendChild(div);}
function chatKeydown(e,labId){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();chatSend(labId);}}
document.querySelectorAll('.lab-chat-input textarea').forEach(function(ta){ta.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px';});});
var SIZER_KEY='aesop-font-size';
function applySize(val){val=parseInt(val);document.querySelectorAll('.lesson-section,.story-scene,.section-body,.story-text,.callout p,.gold-callout p,.warn-callout p').forEach(function(el){el.style.fontSize=val+'px';});localStorage.setItem(SIZER_KEY,val);var r=document.getElementById('sizerRange');if(r) r.value=val;}
function adjustSize(delta){var r=document.getElementById('sizerRange');if(!r) return;applySize(Math.min(22,Math.max(12,parseInt(r.value)+delta)));}
(function(){var saved=localStorage.getItem(SIZER_KEY);if(saved) applySize(parseInt(saved));})();
goPage('p-l1');

<\/script>
