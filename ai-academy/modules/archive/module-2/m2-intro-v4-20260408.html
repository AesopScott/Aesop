.chat-send-btn:hover:not(:disabled) { background: rgba(var(--accent-rgb),0.18); }

[data-theme="light"] body { background: #faf8f4; color: #1a1a2e; }

<script>

function answer(btn,result,qId){var box=document.getElementById(qId);box.querySelectorAll('.quiz-opt').forEach(function(b){b.disabled=true;});btn.classList.add(result);box.querySelectorAll('.quiz-feedback').forEach(function(fb){fb.classList.remove('show');});box.querySelector('.quiz-feedback.'+(result==='right'?'right':'wrong')).classList.add('show');if(result==='correct'){var lm=qId.match(/q\d+-l(\d+)/);if(lm){var lid='m2-l'+lm[1];if(!quizSignaled[lid]){quizSignaled[lid]=true;window.parent.postMessage({type:'quizComplete',lessonId:lid,groupId:GROUP_ID,score:1,total:4},'*');}}}}
var mtTotal=8,mtCorrect=0,mtAnswered=0;
function mtAnswer(btn,result,qId){answer(btn,result,qId);mtAnswered++;if(result==='correct')mtCorrect++;if(mtAnswered>=mtTotal){var el=document.getElementById('mt-score');el.style.display='block';var pct=Math.round((mtCorrect/mtTotal)*100);el.innerHTML='Score: <strong>'+mtCorrect+'/'+mtTotal+'</strong> ('+pct+'%)'+(pct>=80?' — Excellent.':pct>=60?' — Good work. Review and retake anytime.':' — Keep studying and retake when ready.');}}
var currentPageId='p-l1';var lessonSignaled={},quizSignaled={},labSignaled={};
var PAGE_TO_LESSON={'p-l1':'m2-l1','p-l2':'m2-l2','p-l3':'m2-l3','p-l4':'m2-l4'};
var GROUP_ID=1;
function goPage(id){var prev=document.getElementById(currentPageId);var next=document.getElementById(id);if(!next)return;var pl=PAGE_TO_LESSON[currentPageId];if(pl&&!lessonSignaled[pl]){lessonSignaled[pl]=true;window.parent.postMessage({type:'lessonComplete',lessonId:pl,groupId:GROUP_ID},'*');}if(prev)prev.classList.remove('active');next.classList.add('active');currentPageId=id;updateTabs();window.scrollTo(0,0);var _sc=document.querySelector('.content');if(_sc)_sc.scrollTop=0;}
function updateTabs(){document.querySelectorAll('.tab-lesson,.tab-sub,.tab-test').forEach(function(el){el.classList.toggle('active',el.dataset.page===currentPageId);});}
var PROXY_URL='/aesop-api/proxy.php';
var chatHistories={l1: [], l2: [], l3: [], l4: []};
var chatExchanges={l1: 0, l2: 0, l3: 0, l4: 0};
var LAB_COMPLETE_THRESHOLD=3;
var ACADEMY_GUARDRAIL='You are an AI lab assistant for AESOP AI Academy. Stay strictly on topic. If the student goes off-topic, warmly redirect.\n\n';
var LAB_SYSTEM_PROMPTS={
  l1:`
You are a friendly and enthusiastic AI scavenger hunt guide for AESOP AI Academy, Ages 7-8, Module 2 Lab 1: Find the Hidden AI! When a student names apps, games, or devices, reveal the AI hiding inside with excitement — like you're uncovering a treasure! Explain what type of AI superpower is hidden inside, what job it does, and why it's cool. Use simple, fun language a 7-8 year old will love. Keep each AI reveal to 2-3 sentences. Then ask which one surprised them most. Use emojis occasionally. Keep energy high and encouraging!`,
  l2:`
You are a warm and patient learning coach for AESOP AI Academy, Ages 7-8, Module 2 Lab 2: Ask the Magic Question. The student will tell you something they're curious about. Explain it clearly for a 7-8 year old. If they say "explain it differently" or seem confused, try a completely different explanation — using a story, a comparison to something familiar, or a hands-on example. Keep explaining in new ways until they signal they understand. Celebrate when something clicks! ("Yes! That's exactly it! 🌟"). Stay on the topic of whatever they asked about and don't wander to other subjects. Short, clear responses — max 3-4 sentences per explanation.`,
  l3:`
You are a fairness guide for AESOP AI Academy, Ages 7-8, Module 2 Lab 3: Is It Fair? The scenario is a city road repair AI that prioritizes busy roads, leaving quiet neighborhood streets waiting longer. When the student shares their view on fairness, affirm what's right about their thinking, then help them see why "most cars benefit" isn't the same as "everyone benefits fairly." Use simple, relatable language — like the seesaw analogy from the lesson. Then ask: how would you make this system fairer? Help them think toward solutions. Warm, encouraging tone for 7-8 year olds. 2-3 sentences per response.`,
  l4:`

function chatAppend(labId,role,text){var msgs=document.getElementById('msgs-'+labId);if(!msgs)return;var div=document.createElement('div');div.className='chat-msg '+(role==='user'?'user':'ai');div.innerHTML=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;}
function chatThinking(labId){var msgs=document.getElementById('msgs-'+labId);if(!msgs)return null;var div=document.createElement('div');div.className='chat-msg thinking';div.textContent='Thinking…';msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;return div;}
function chatSetLoading(labId,l){var btn=document.getElementById('send-'+labId);var inp=document.getElementById('inp-'+labId);if(btn)btn.disabled=l;if(inp)inp.disabled=l;}
async function chatSend(labId){var inp=document.getElementById('inp-'+labId);if(!inp)return;var text=inp.value.trim();if(!text)return;inp.value='';inp.style.height='auto';chatAppend(labId,'user',text);chatHistories[labId].push({role:'user',content:text});chatSetLoading(labId,true);var thinkEl=chatThinking(labId);var chat=document.getElementById('chat-'+labId);var ee=chat?chat.querySelector('.chat-error'):null;if(ee)ee.remove();try{var res=await fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:chatHistories[labId],system_prompt:ACADEMY_GUARDRAIL+(LAB_SYSTEM_PROMPTS[labId]||''),max_tokens:1024})});if(thinkEl)thinkEl.remove();if(!res.ok){var e=await res.json().catch(function(){return{};});throw new Error(e.error||'Server error '+res.status);}var data=await res.json();var reply=(data.content&&data.content[0]&&data.content[0].text)||data.reply||'(No response)';chatHistories[labId].push({role:'assistant',content:reply});chatAppend(labId,'ai',reply);chatExchanges[labId]=(chatExchanges[labId]||0)+1;var lk='m2-l'+labId.replace('l','');if(chatExchanges[labId]>=LAB_COMPLETE_THRESHOLD&&!labSignaled[lk]){labSignaled[lk]=true;window.parent.postMessage({type:'labComplete',lessonId:lk,groupId:GROUP_ID,exchangeCount:chatExchanges[labId]},'*');}}catch(err){if(thinkEl)thinkEl.remove();chatHistories[labId].pop();var errDiv=document.createElement('div');errDiv.className='chat-error';errDiv.textContent='⚠ '+(err.message||'Connection error.');if(chat)chat.appendChild(errDiv);}chatSetLoading(labId,false);var inpEl=document.getElementById('inp-'+labId);if(inpEl)inpEl.focus();}
function chatReset(labId){chatHistories[labId]=[];var msgs=document.getElementById('msgs-'+labId);if(!msgs)return;msgs.innerHTML='';var div=document.createElement('div');div.className='chat-msg ai';div.textContent='Conversation reset.';msgs.appendChild(div);}
function chatKeydown(e,labId){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();chatSend(labId);}}
