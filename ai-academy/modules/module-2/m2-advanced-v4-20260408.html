<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI in Our World — Advanced | AESOP AI Academy Module 2</title>
<link rel="stylesheet" href="/academy-theme.css?v=2">
<link rel="stylesheet" href="/academy-dark-mode.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<script>(function(){var p=localStorage.getItem('aesop-theme');if(p==='light')document.documentElement.setAttribute('data-theme','light');})();</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body { font-family: var(--font-body), sans-serif; background: #0a1118; color: #e8e3db; min-height: 100vh; -webkit-font-smoothing: antialiased; }
:root { --accent: #c0384f; --accent-rgb: 192,56,79; --bg: #0a1118; --panel: #0d1520; --panel2: #111c28; --border-dark: #1a2738; --text: #e8e3db; --muted: #4a5a6a; --gold: #c9a05a; }
.shell { display: flex; flex-direction: column; min-height: 100vh; }
.topbar { background: #060e18; border-bottom: 1px solid var(--border-dark); padding: 0 2rem; height: 72px; display: flex; align-items: center; gap: 1.5rem; position: sticky; top: 0; z-index: 200; flex-shrink: 0; }
.topbar-back { font-size: 1rem; font-weight: 500; color: var(--muted); display: flex; align-items: center; gap: 0.5rem; cursor: pointer; text-decoration: none; transition: color 0.2s; white-space: nowrap; }
.topbar-back:hover { color: var(--gold); }
.topbar-sep { width: 1px; height: 22px; background: var(--border-dark); flex-shrink: 0; }
.topbar-module { font-size: 1.1rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.topbar-sizer { display: flex; align-items: center; gap: 0.55rem; margin-left: auto; }
.sizer-btn { background: transparent; border: 1px solid var(--border-dark); color: var(--muted); border-radius: 3px; padding: 0.28rem 0.65rem; font-size: 0.9rem; font-weight: 700; cursor: pointer; line-height: 1; transition: all 0.15s; font-family: var(--font-body), sans-serif; }
.sizer-btn:hover { border-color: var(--gold); color: var(--gold); }
.sizer-range { -webkit-appearance: none; appearance: none; width: 110px; height: 4px; background: var(--border-dark); border-radius: 99px; outline: none; cursor: pointer; }
.sizer-range::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--gold); cursor: pointer; }
.sizer-range::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: var(--gold); border: none; cursor: pointer; }
.sizer-divider { width: 1px; height: 22px; background: var(--border-dark); margin: 0 0.3rem; opacity: 0.5; }
.sizer-label { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.08em; color: var(--muted); font-family: var(--font-body), sans-serif; text-transform: uppercase; }
.color-range { -webkit-appearance: none; appearance: none; width: 110px; height: 4px; border-radius: 99px; outline: none; cursor: pointer; }
.color-range::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--gold); cursor: pointer; }
.color-range::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: var(--gold); border: none; cursor: pointer; }
.topbar-tier { margin-left: 0; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); border: 1px solid rgba(var(--accent-rgb),0.25); padding: 0.35rem 0.9rem; border-radius: 4px; flex-shrink: 0; }
.tab-strip { background: #060e18; border-bottom: 1px solid var(--border-dark); padding: 0 2rem; display: flex; gap: 0; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; min-height: 48px; }
.tab-strip::-webkit-scrollbar { display: none; }
.tab-group { display: flex; align-items: stretch; flex-shrink: 0; }
.tab-lesson { font-family: 'Crimson Pro', Georgia, serif; font-size: 1.2rem; color: rgba(201,160,90,0.22); padding: 0.85rem 1.4rem 0.8rem; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; }
.tab-lesson:hover { color: rgba(201,160,90,0.55); }
.tab-lesson.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab-subs { display: flex; align-items: center; padding: 0 0.25rem; }
.tab-sep { color: rgba(201,160,90,0.1); font-size: 1rem; padding: 0 0.15rem; }
.tab-sub { font-size: 1rem; font-weight: 500; color: rgba(201,160,90,0.15); padding: 0.85rem 0.7rem; cursor: pointer; transition: color 0.15s; white-space: nowrap; }
.tab-sub:hover { color: rgba(201,160,90,0.4); }
.tab-sub.active { color: var(--gold); }
.tab-test { font-size: 0.9rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(201,160,90,0.2); padding: 0.85rem 1.3rem; margin-left: auto; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; flex-shrink: 0; }
.tab-test:hover { color: rgba(201,160,90,0.5); }
.tab-test.active { color: var(--gold); border-bottom-color: var(--gold); }
.content-area { flex: 1; display: flex; flex-direction: column; }
.page { display: none; flex: 1; flex-direction: column; }
.page.active { display: flex; }
.lesson-hero { padding: 2.5rem 3.5rem 2rem; border-bottom: 1px solid var(--border-dark); background: linear-gradient(180deg, rgba(var(--accent-rgb),0.03) 0%, transparent 100%); text-align: center; }
.lesson-kicker { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.65rem; }
.lesson-hero h1 { font-family: 'Crimson Pro', Georgia, serif; font-size: clamp(1.7rem,4vw,2.5rem); font-weight: 600; color: #fff; line-height: 1.15; margin-bottom: 0.4rem; font-style: italic; }
.lesson-hero .tagline { font-family: 'Crimson Pro', Georgia, serif; font-size: 1rem; color: rgba(201,160,90,0.4); font-style: italic; line-height: 1.5; max-width: 700px; margin: 0 auto; }
.lesson-body { width: 90%; margin: 0 auto; padding: 2rem 2.5rem; flex: 1; }
.story-scene { border-left: 1px solid rgba(201,160,90,0.18); padding: 0 0 0 1.5rem; margin-bottom: 2rem; }
.story-scene[data-label]::before { content: attr(data-label); display: block; font-size: 0.58rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(201,160,90,0.4); margin-bottom: 0.75rem; }
.story-text { font-family: 'Crimson Pro', Georgia, serif; font-size: 1.05rem; line-height: 1.9; color: #a89f93; font-style: italic; }
.story-text + .story-text { margin-top: 0.85rem; }
.story-text em { color: var(--accent); font-style: normal; }
.story-text .char { color: var(--gold); font-style: normal; font-weight: 600; }
.section-heading { font-family: 'Crimson Pro', Georgia, serif; font-size: 1.15rem; font-weight: 600; color: #e8e3db; margin: 1.75rem 0 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border-dark); }
.lesson-section { padding: 0 2.5rem; }.section-body { font-size: 0.9rem; line-height: 1.85; color: #6e6861; }
.section-body p + p { margin-top: 0.85rem; }
.section-body em { color: #a89f93; font-style: normal; }
.section-divider { height: 1px; background: linear-gradient(90deg,transparent,var(--border-dark),transparent); margin: 1.75rem 0; }
.callout { background: rgba(var(--accent-rgb),0.04); border-top: 1px solid rgba(var(--accent-rgb),0.12); border-bottom: 1px solid rgba(var(--accent-rgb),0.12); padding: 1rem 1.25rem; margin: 1.25rem 0; }
.callout-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
.callout p { font-size: 0.87rem; line-height: 1.75; color: #a89f93; }
.gold-callout { background: rgba(201,160,90,0.04); border-top: 1px solid rgba(201,160,90,0.12); border-bottom: 1px solid rgba(201,160,90,0.12); padding: 1rem 1.25rem; margin: 1.25rem 0; }
.gold-callout .callout-label { color: var(--gold); }
.gold-callout p { font-size: 0.87rem; line-height: 1.75; color: #a89f93; }
.warn-callout { background: rgba(240,112,112,0.04); border-top: 1px solid rgba(240,112,112,0.12); border-bottom: 1px solid rgba(240,112,112,0.12); padding: 1rem 1.25rem; margin: 1.25rem 0; }
.warn-callout .callout-label { color: #f07070; }
.warn-callout p { font-size: 0.87rem; line-height: 1.75; color: #a89f93; }
.page-nav { display: flex; gap: 0.75rem; padding: 1.5rem 0 2.5rem; width: 90%; margin: auto auto 0; border-top: 1px solid var(--border-dark); }
.pnav-btn { flex: 1; padding: 0.65rem 1rem; border: 1px solid var(--border-dark); border-radius: 4px; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); text-align: center; cursor: pointer; transition: all 0.15s; text-decoration: none; display: block; background: transparent; }
.pnav-btn:hover { border-color: var(--accent); color: var(--accent); }
.pnav-btn.primary { border-color: rgba(var(--accent-rgb),0.4); color: var(--accent); background: rgba(var(--accent-rgb),0.05); }
.pnav-btn.primary:hover { border-color: var(--accent); background: rgba(var(--accent-rgb),0.1); }
.quiz-hero, .lab-hero { padding: 2rem 3.5rem 1.5rem; border-bottom: 1px solid var(--border-dark); text-align: center; }
.quiz-hero h1, .lab-hero h1 { font-family: 'Crimson Pro', Georgia, serif; font-size: 1.5rem; font-weight: 600; color: #fff; font-style: italic; margin-bottom: 0.3rem; }
.quiz-hero .tagline, .lab-hero .tagline { font-size: 0.78rem; color: var(--muted); }
.quiz-area { width: 90%; margin: 0 auto; padding: 1.5rem 0; flex: 1; }
.quiz-box { background: rgba(var(--accent-rgb),0.02); border: 1px solid var(--border-dark); border-radius: 6px; padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
.quiz-q { font-family: 'Crimson Pro', Georgia, serif; font-size: 1rem; font-weight: 600; color: #fff; margin-bottom: 0.85rem; line-height: 1.45; }
.quiz-opts { display: flex; flex-direction: column; gap: 0.5rem; }
.quiz-opt { background: transparent; border: 1px solid var(--border-dark); color: #6e6861; padding: 0.65rem 1rem; border-radius: 4px; font-family: var(--font-body),sans-serif; font-size: 0.82rem; cursor: pointer; text-align: left; transition: all 0.15s; font-weight: 500; }
.quiz-opt:hover:not(:disabled) { border-color: var(--accent); color: #e8e3db; background: rgba(var(--accent-rgb),0.04); }
.quiz-opt.correct { border-color: #4fcf8a; background: rgba(79,207,138,0.06); color: #4fcf8a; }
.quiz-opt.wrong { border-color: #f07070; background: rgba(240,112,112,0.05); color: #f07070; }
.quiz-feedback { margin-top: 0.75rem; font-size: 0.8rem; line-height: 1.6; padding: 0.65rem 0.85rem; border-radius: 4px; display: none !important; }
.quiz-feedback.show { display: block !important; }
.quiz-feedback.right { background: rgba(79,207,138,0.06); border: 1px solid rgba(79,207,138,0.18); color: #4fcf8a; }
.quiz-feedback.wrong { background: rgba(240,112,112,0.05); border: 1px solid rgba(240,112,112,0.15); color: #f07070; }
.lab-area { width: 90%; margin: 0 auto; padding: 1.5rem 0; flex: 1; display: flex; flex-direction: column; }
.lab-intro { margin-bottom: 1.25rem; }
.lab-intro h4 { font-family: 'Crimson Pro', Georgia, serif; font-size: 1rem; font-weight: 600; color: #e8e3db; margin-bottom: 0.6rem; }
.lab-intro p { font-size: 0.85rem; line-height: 1.75; color: #6e6861; margin-bottom: 0.5rem; }
.lab-intro ol { padding-left: 1.25rem; }
.lab-intro ol li { font-size: 0.85rem; line-height: 1.75; color: #6e6861; margin-bottom: 0.4rem; }
.lab-prompt { background: rgba(var(--accent-rgb),0.04); border: 1px solid rgba(var(--accent-rgb),0.12); border-radius: 4px; padding: 0.75rem 1rem; margin-top: 0.75rem; font-size: 0.82rem; font-style: italic; color: var(--accent); line-height: 1.6; }
.lab-chat { background: rgba(var(--accent-rgb),0.02); border: 1px solid var(--border-dark); border-radius: 6px; overflow: hidden; flex: 1; display: flex; flex-direction: column; min-height: 280px; }
.lab-chat-header { background: rgba(var(--accent-rgb),0.05); border-bottom: 1px solid var(--border-dark); padding: 0.6rem 1rem; display: flex; align-items: center; gap: 0.75rem; }
.lab-chat-header span { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); }
.chat-badge { font-size: 0.6rem; font-weight: 700; background: rgba(var(--accent-rgb),0.1); border: 1px solid rgba(var(--accent-rgb),0.2); color: var(--accent); padding: 0.15rem 0.5rem; border-radius: 3px; }
.lab-chat-msgs { flex: 1; min-height: 120px; max-height: 320px; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.65rem; scrollbar-width: thin; scrollbar-color: var(--border-dark) transparent; }
.chat-msg { max-width: 88%; padding: 0.65rem 0.85rem; border-radius: 6px; font-size: 0.85rem; line-height: 1.65; }
.chat-msg.ai { align-self: flex-start; background: var(--panel2); border: 1px solid var(--border-dark); color: #a89f93; border-bottom-left-radius: 2px; }
.chat-msg.user { align-self: flex-end; background: rgba(var(--accent-rgb),0.08); border: 1px solid rgba(var(--accent-rgb),0.15); color: #e8e3db; border-bottom-right-radius: 2px; }
.chat-msg.thinking { align-self: flex-start; background: var(--panel2); border: 1px solid var(--border-dark); color: var(--muted); font-style: italic; border-bottom-left-radius: 2px; }
.lab-chat-input { display: flex; gap: 0.5rem; padding: 0.65rem 0.85rem; border-top: 1px solid var(--border-dark); background: rgba(0,0,0,0.1); }
.lab-chat-input textarea { flex: 1; background: rgba(255,255,255,0.02); border: 1px solid var(--border-dark); border-radius: 4px; color: var(--text); font-family: var(--font-body),sans-serif; font-size: 0.85rem; padding: 0.5rem 0.75rem; resize: none; min-height: 38px; max-height: 100px; line-height: 1.5; }
.lab-chat-input textarea:focus { outline: none; border-color: rgba(var(--accent-rgb),0.3); }
.lab-chat-input textarea::placeholder { color: var(--muted); }
.chat-send-btn { background: rgba(var(--accent-rgb),0.1); border: 1px solid rgba(var(--accent-rgb),0.3); color: var(--accent); border-radius: 4px; padding: 0 1rem; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; align-self: flex-end; height: 38px; transition: all 0.15s; }
.chat-send-btn:hover:not(:disabled) { background: rgba(var(--accent-rgb),0.18); }
.chat-send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.chat-reset-btn { background: transparent; border: 1px solid var(--border-dark); color: var(--muted); border-radius: 4px; padding: 0 0.75rem; font-size: 0.72rem; font-weight: 600; cursor: pointer; align-self: flex-end; height: 38px; transition: all 0.15s; }
.chat-reset-btn:hover { border-color: rgba(var(--accent-rgb),0.2); color: var(--accent); }
.chat-error { color: #f07070; font-size: 0.78rem; font-style: italic; padding: 0.5rem 1rem; background: rgba(240,112,112,0.04); }
.mt-area { width: 90%; margin: 0 auto; padding: 1.5rem 0; flex: 1; }
.mt-score { font-family: 'Crimson Pro', Georgia, serif; font-size: 1.25rem; font-weight: 600; color: var(--accent); text-align: center; padding: 1.25rem; margin-top: 1rem; display: none; border: 1px solid rgba(var(--accent-rgb),0.15); border-radius: 6px; background: rgba(var(--accent-rgb),0.03); }
/* ── LIGHT MODE ─────────────────────────────────────────────────────────── */
[data-theme="light"] body { background: #faf8f4; color: #1a1a2e; }

/* Topbar & tabs */
[data-theme="light"] .topbar,
[data-theme="light"] .tab-strip { background: #f0ece4; border-bottom-color: #d4c9b8; }
[data-theme="light"] .topbar-back,
[data-theme="light"] .topbar-module,
[data-theme="light"] .topbar-tier,
[data-theme="light"] .sizer-btn,
[data-theme="light"] .sizer-label { color: #3a3530; border-color: #d4c9b8; }
[data-theme="light"] .tab-lesson { color: rgba(60,45,20,0.45); }
[data-theme="light"] .tab-lesson.active { color: #8a6820; border-bottom-color: #8a6820; }
[data-theme="light"] .tab-sub { color: rgba(60,45,20,0.35); }
[data-theme="light"] .tab-sub.active { color: #8a6820; }
[data-theme="light"] .tab-test { color: rgba(60,45,20,0.4); }
[data-theme="light"] .tab-test.active { color: #8a6820; border-bottom-color: #8a6820; }

/* Page & hero */
[data-theme="light"] .page { background: #faf8f4; }
[data-theme="light"] .lesson-hero { background: linear-gradient(180deg, rgba(180,140,60,0.06) 0%, transparent 100%); border-bottom-color: #e2d9cc; }
[data-theme="light"] .lesson-hero h1,
[data-theme="light"] .quiz-hero h1,
[data-theme="light"] .lab-hero h1 { color: #1a1208; }
[data-theme="light"] .lesson-hero .tagline,
[data-theme="light"] .quiz-hero .tagline,
[data-theme="light"] .lab-hero .tagline { color: rgba(120,90,20,0.6); }

/* Lesson content */
[data-theme="light"] .section-heading { color: #1a1208; border-bottom-color: #e2d9cc; }
[data-theme="light"] .section-body { color: #3a3530; }
[data-theme="light"] .section-body em { color: #5a5248; }
[data-theme="light"] .story-scene { border-left-color: rgba(160,120,40,0.3); }
[data-theme="light"] .story-scene[data-label]::before { color: rgba(120,90,20,0.5); }
[data-theme="light"] .story-text { color: #5a5248; }
[data-theme="light"] .section-divider { background: linear-gradient(90deg,transparent,#e2d9cc,transparent); }

/* Callouts */
[data-theme="light"] .callout { background: rgba(var(--accent-rgb),0.05); border-top-color: rgba(var(--accent-rgb),0.2); border-bottom-color: rgba(var(--accent-rgb),0.2); }
[data-theme="light"] .callout p,
[data-theme="light"] .gold-callout p,
[data-theme="light"] .warn-callout p { color: #4a4540; }
[data-theme="light"] .gold-callout { background: rgba(180,140,40,0.06); border-top-color: rgba(180,140,40,0.25); border-bottom-color: rgba(180,140,40,0.25); }
[data-theme="light"] .warn-callout { background: rgba(200,60,60,0.05); border-top-color: rgba(200,60,60,0.2); border-bottom-color: rgba(200,60,60,0.2); }

/* Quiz */
[data-theme="light"] .quiz-box { background: #fff; border-color: #e2d9cc; }
[data-theme="light"] .quiz-q { color: #1a1208; }
[data-theme="light"] .quiz-opt { border-color: #d4c9b8; color: #3a3530; background: #faf8f4; }
[data-theme="light"] .quiz-opt:hover:not(:disabled) { border-color: var(--accent); color: #1a1208; background: rgba(var(--accent-rgb),0.05); }
[data-theme="light"] .quiz-feedback { color: #3a3530; }

/* Lab */
[data-theme="light"] .lab-intro h4 { color: #1a1208; }
[data-theme="light"] .lab-intro p,
[data-theme="light"] .lab-intro ol li { color: #3a3530; }
[data-theme="light"] .lab-prompt { color: #4a3a10; background: rgba(var(--accent-rgb),0.06); border-color: rgba(var(--accent-rgb),0.2); }
[data-theme="light"] .lab-chat { background: #fff; border-color: #e2d9cc; }
[data-theme="light"] .lab-chat-header { background: #f0ece4; border-bottom-color: #e2d9cc; color: #3a3530; }
[data-theme="light"] .chat-msg.ai { background: #f5f0e8; border-color: #e2d9cc; color: #3a3530; }
[data-theme="light"] .chat-msg.user { background: rgba(var(--accent-rgb),0.08); border-color: rgba(var(--accent-rgb),0.2); color: #1a1208; }
[data-theme="light"] .lab-chat-input { background: #f5f0e8; border-top-color: #e2d9cc; }
[data-theme="light"] .lab-chat-input textarea { background: #fff; border-color: #d4c9b8; color: #1a1208; }

/* Page nav */
[data-theme="light"] .page-nav { border-top-color: #e2d9cc; }
[data-theme="light"] .pnav-btn { border-color: #d4c9b8; color: #5a5248; }
[data-theme="light"] .pnav-btn:hover { border-color: var(--accent); color: var(--accent); }
[data-theme="light"] .pnav-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }



@media (max-width: 1200px) {
  .lesson-body, .quiz-area, .lab-area, .mt-area { padding: 2rem 3.5rem; }
  .page-nav { padding: 1.5rem 3.5rem 2rem; }
}
@media (max-width: 900px) {
  .lesson-body, .quiz-area, .lab-area, .mt-area { padding: 1.5rem 2.5rem; }
  .page-nav { padding: 1.25rem 2.5rem 1.75rem; }
  .lesson-hero, .quiz-hero, .lab-hero { padding: 1.75rem 2.5rem 1.25rem; }
}
@media (max-width: 600px) {
  .lesson-hero, .quiz-hero, .lab-hero { padding: 1.25rem 1.25rem 1rem; }
  .lesson-body, .quiz-area, .lab-area, .mt-area { padding: 1rem 1.25rem; }
  .page-nav { padding: 1rem 1.25rem; }
  .topbar, .tab-strip { padding: 0 1rem; }
}
</style>
</head>
<body>
<div class="shell">
<div class="topbar">
  <a href="/ai-academy/" class="topbar-back">← Back to Academy</a>
  <div class="topbar-sep"></div>
  <div class="topbar-module">Module 2 · AI in Our World — Advanced | AESOP AI Academy Module 2</div>

<script>

function answer(btn,result,qId){var box=document.getElementById(qId);box.querySelectorAll('.quiz-opt').forEach(function(b){b.disabled=true;});btn.classList.add(result);box.querySelectorAll('.quiz-feedback').forEach(function(fb){fb.classList.remove('show');});box.querySelector('.quiz-feedback.'+(result==='correct'?'right':'wrong')).classList.add('show');if(result==='correct'){var lm=qId.match(/q\d+-l(\d+)/);if(lm){var lid='m2-l'+lm[1];if(!quizSignaled[lid]){quizSignaled[lid]=true;window.parent.postMessage({type:'quizComplete',lessonId:lid,groupId:GROUP_ID,score:1,total:4},'*');}}}}
var mtTotal=15,mtCorrect=0,mtAnswered=0;
function mtAnswer(btn,result,qId){answer(btn,result,qId);mtAnswered++;if(result==='correct')mtCorrect++;if(mtAnswered>=mtTotal){var el=document.getElementById('mt-score');el.style.display='block';var pct=Math.round((mtCorrect/mtTotal)*100);el.innerHTML='Score: <strong>'+mtCorrect+'/'+mtTotal+'</strong> ('+pct+'%)'+(pct>=80?' — Excellent.':pct>=60?' — Good work. Review and retake anytime.':' — Keep studying and retake when ready.');}}
var currentPageId='p-l1';var lessonSignaled={},quizSignaled={},labSignaled={};
var PAGE_TO_LESSON={'p-l1':'m2-l1','p-l2':'m2-l2','p-l3':'m2-l3','p-l4':'m2-l4','p-l5':'m2-l5','p-l6':'m2-l6','p-l7':'m2-l7','p-l8':'m2-l8'};
var GROUP_ID=3;
function goPage(id){var prev=document.getElementById(currentPageId);var next=document.getElementById(id);if(!next)return;var pl=PAGE_TO_LESSON[currentPageId];if(pl&&!lessonSignaled[pl]){lessonSignaled[pl]=true;window.parent.postMessage({type:'lessonComplete',lessonId:pl,groupId:GROUP_ID},'*');}if(prev)prev.classList.remove('active');next.classList.add('active');currentPageId=id;updateTabs();window.scrollTo(0,0);}
function updateTabs(){document.querySelectorAll('.tab-lesson,.tab-sub,.tab-test').forEach(function(el){el.classList.toggle('active',el.dataset.page===currentPageId);});}
var PROXY_URL='/aesop-api/proxy.php';
var chatHistories={l1: [], l2: [], l3: [], l4: [], l5: [], l6: [], l7: [], l8: []};
var chatExchanges={l1: 0, l2: 0, l3: 0, l4: 0, l5: 0, l6: 0, l7: 0, l8: 0};
var LAB_COMPLETE_THRESHOLD=3;
var ACADEMY_GUARDRAIL='You are an AI lab assistant for AESOP AI Academy. Stay strictly on topic. If the student goes off-topic, warmly redirect.\n\n';
var LAB_SYSTEM_PROMPTS={
  l1:`
You are an AI stack auditor for AESOP AI Academy, Ages 16+, Module 2 Lab 1: AI You See Every Day. When a student names an app or device, break down: (1) what AI systems it likely contains and their technical approach, (2) what each system is optimizing for (the objective function), (3) what data is collected and how it's used, (4) whose interests the design serves, and (5) what structural consequences follow from those design choices. Be technically precise about AI methods (collaborative filtering, NLP, computer vision, etc.). Keep responses to 2-4 paragraphs. Challenge the student to think about objective functions, not just capabilities.`,
  l2:`
You are an educational design analyst for AESOP AI Academy, Ages 16+, Module 2 Lab 2: AI at School and at Play. When a student names an assessment (essay, test, project, presentation), break down: what cognitive skills it's designed to measure, which of those AI assistance undermines or changes, and what modifications could preserve the learning intent. Then when they propose a redesign, stress-test it: how could AI still circumvent it? What does it actually measure? Is the measurement worth preserving? Be constructive — the goal is clarity about what learning requires, not AI-bashing. 2-4 paragraphs per response.`,
  l3:`
You are a fairness mathematics tutor for AESOP AI Academy, Ages 16+, Module 2 Lab 3: Algorithmic Fairness Impossibility. Guide the student through the COMPAS impossibility. Explain the three standard fairness criteria (equalized false positive rates, equalized false negative rates, equal positive predictive value). When they choose one to prioritize, work through what happens to the others when base rates differ. Challenge them to defend their choice against critics who prioritize the other criteria. The goal: understanding that fairness choices are values choices, not technical ones. Use concrete numbers when helpful. 2-4 paragraphs.`,
  l4:`
You are a validation protocol challenger for AESOP AI Academy, Ages 16+, Module 2 Lab 4: Validation Design for Medical AI. The student is designing a validation protocol for a radiology AI. Challenge every protocol they propose with realistic failure scenarios it wouldn't catch: shortcut learning, distribution shift, automation bias, edge cases in underrepresented populations. Be constructive — help them understand the tradeoffs between rigor, cost, and deployment speed rather than making the task seem impossible. 2-4 paragraphs per response.`,
  l5:`
You are a labor policy stress-tester for AESOP AI Academy, Ages 16+, Module 2 Lab 5: Labor Policy Design. When the student proposes a policy to address algorithmic management, present the strongest counterarguments from: (1) platform companies (flexibility, innovation, legal structure), (2) workers who prefer the current arrangement, and (3) economists concerned about unintended consequences. Encourage them to revise and defend. There's no perfect policy — the goal is understanding real tradeoffs. 2-4 paragraphs.`,
  l6:`
You are a consent architecture designer for AESOP AI Academy, Ages 16+, Module 2 Lab 6: Designing a Consent Architecture. When the student proposes a consent/compensation system for AI training data, stress-test it against: scale (billions of works across the global internet), enforcement (who verifies compliance?), historical data (what about models already trained?), and economic viability (can creators actually be compensated at scale?). Help them understand why there's no clean solution. 2-4 paragraphs.`,
  l7:`
You are an AI accountability framework designer for AESOP AI Academy, Ages 16+, Module 2 Lab 7: Building an AI Accountability Framework. When the student proposes a mandatory accountability framework for law enforcement AI, present counterarguments from: (1) law enforcement (operational burden, speed requirements), (2) AI vendors (proprietary methods, competitive disclosure concerns), and (3) legal constraints (what's currently constitutional or statutory). Challenge them to find the framework that provides meaningful accountability without being operationally impossible. 2-4 paragraphs.`,
  l8:`
You are a geopolitical analysis facilitator for AESOP AI Academy, Ages 16+, Module 2 Lab 8: Geopolitical Scenario Analysis. The scenario has been presented: a Southeast Asian democracy choosing between subsidized Chinese and full-price US AI surveillance infrastructure. When the student analyzes stakeholders and proposes a recommendation, challenge them: who benefits from each choice? What second-order effects are they not accounting for? What's the long-term sovereignty implications? What would they do differently if they were representing China? The US? A local civil society group? Help them hold the full complexity. 2-4 paragraphs.`
};
function chatAppend(labId,role,text){var msgs=document.getElementById('msgs-'+labId);if(!msgs)return;var div=document.createElement('div');div.className='chat-msg '+(role==='user'?'user':'ai');div.innerHTML=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;}
function chatThinking(labId){var msgs=document.getElementById('msgs-'+labId);if(!msgs)return null;var div=document.createElement('div');div.className='chat-msg thinking';div.textContent='Thinking…';msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;return div;}
function chatSetLoading(labId,l){var btn=document.getElementById('send-'+labId);var inp=document.getElementById('inp-'+labId);if(btn)btn.disabled=l;if(inp)inp.disabled=l;}
async function chatSend(labId){var inp=document.getElementById('inp-'+labId);if(!inp)return;var text=inp.value.trim();if(!text)return;inp.value='';inp.style.height='auto';chatAppend(labId,'user',text);chatHistories[labId].push({role:'user',content:text});chatSetLoading(labId,true);var thinkEl=chatThinking(labId);var chat=document.getElementById('chat-'+labId);var ee=chat?chat.querySelector('.chat-error'):null;if(ee)ee.remove();try{var res=await fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:chatHistories[labId],system_prompt:ACADEMY_GUARDRAIL+(LAB_SYSTEM_PROMPTS[labId]||''),max_tokens:1024})});if(thinkEl)thinkEl.remove();if(!res.ok){var e=await res.json().catch(function(){return{};});throw new Error(e.error||'Server error '+res.status);}var data=await res.json();var reply=(data.content&&data.content[0]&&data.content[0].text)||data.reply||'(No response)';chatHistories[labId].push({role:'assistant',content:reply});chatAppend(labId,'ai',reply);chatExchanges[labId]=(chatExchanges[labId]||0)+1;var lk='m2-l'+labId.replace('l','');if(chatExchanges[labId]>=LAB_COMPLETE_THRESHOLD&&!labSignaled[lk]){labSignaled[lk]=true;window.parent.postMessage({type:'labComplete',lessonId:lk,groupId:GROUP_ID,exchangeCount:chatExchanges[labId]},'*');}}catch(err){if(thinkEl)thinkEl.remove();chatHistories[labId].pop();var errDiv=document.createElement('div');errDiv.className='chat-error';errDiv.textContent='⚠ '+(err.message||'Connection error.');if(chat)chat.appendChild(errDiv);}chatSetLoading(labId,false);var inpEl=document.getElementById('inp-'+labId);if(inpEl)inpEl.focus();}
function chatReset(labId){chatHistories[labId]=[];var msgs=document.getElementById('msgs-'+labId);if(!msgs)return;msgs.innerHTML='';var div=document.createElement('div');div.className='chat-msg ai';div.textContent='Conversation reset.';msgs.appendChild(div);}
function chatKeydown(e,labId){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();chatSend(labId);}}
document.querySelectorAll('.lab-chat-input textarea').forEach(function(ta){ta.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px';});});
(function(){var params=new URLSearchParams(window.location.search);var lp=params.get('lesson')||window.location.hash.replace('#','');var lm={'m2-l1': 'p-l1', 'm2-l2': 'p-l2', 'm2-l3': 'p-l3', 'm2-l4': 'p-l4', 'm2-l5': 'p-l5', 'm2-l6': 'p-l6', 'm2-l7': 'p-l7', 'm2-l8': 'p-l8', 'm2-test': 'p-mt'};if(lp&&lm[lp]){goPage(lm[lp]);}else{goPage('p-l1');}})();

var SIZER_KEY = 'aesop-font-size';
var COLOR_KEY  = 'aesop-text-color';
var SIZER_DEFAULT = 16; // px — matches html { font-size: 16px }

// Inject (or update) a <style> tag that scales every text element proportionally.
// Each selector keeps its own em-based size; we just scale the root multiplier.
function applySize(val) {
  val = parseInt(val);
  var ratio = val / SIZER_DEFAULT; // e.g. 24/16 = 1.5 → 50% larger
  var styleId = 'aesop-size-style';
  var el = document.getElementById(styleId);
  if (!el) {
    el = document.createElement('style');
    el.id = styleId;
    document.head.appendChild(el);
  }
  // Scale each element by overriding its font-size in em terms (ratio * base_em)
  el.textContent = [
    // Lessons
    '.section-body         { font-size: ' + (0.90  * ratio).toFixed(3) + 'rem !important; }',
    '.section-heading      { font-size: ' + (1.15  * ratio).toFixed(3) + 'rem !important; }',
    '.story-text           { font-size: ' + (1.05  * ratio).toFixed(3) + 'rem !important; }',
    '.callout p            { font-size: ' + (0.87  * ratio).toFixed(3) + 'rem !important; }',
    '.gold-callout p       { font-size: ' + (0.87  * ratio).toFixed(3) + 'rem !important; }',
    '.warn-callout p       { font-size: ' + (0.87  * ratio).toFixed(3) + 'rem !important; }',
    // Quiz
    '.quiz-q               { font-size: ' + (1.00  * ratio).toFixed(3) + 'rem !important; }',
    '.quiz-opt             { font-size: ' + (0.82  * ratio).toFixed(3) + 'rem !important; }',
    '.quiz-feedback        { font-size: ' + (0.80  * ratio).toFixed(3) + 'rem !important; }',
    // Lab
    '.lab-intro h4         { font-size: ' + (1.00  * ratio).toFixed(3) + 'rem !important; }',
    '.lab-intro p          { font-size: ' + (0.85  * ratio).toFixed(3) + 'rem !important; }',
    '.lab-intro ol li      { font-size: ' + (0.85  * ratio).toFixed(3) + 'rem !important; }',
    '.lab-prompt           { font-size: ' + (0.82  * ratio).toFixed(3) + 'rem !important; }',
    '.chat-msg             { font-size: ' + (0.85  * ratio).toFixed(3) + 'rem !important; }',
    '.lab-chat-input textarea { font-size: ' + (0.85 * ratio).toFixed(3) + 'rem !important; }',
    // Module test
    '.mt-area .quiz-q      { font-size: ' + (1.00  * ratio).toFixed(3) + 'rem !important; }',
    '.mt-area .quiz-opt    { font-size: ' + (0.82  * ratio).toFixed(3) + 'rem !important; }',
    '.mt-score             { font-size: ' + (1.25  * ratio).toFixed(3) + 'rem !important; }'
  ].join('\n');

  localStorage.setItem(SIZER_KEY, val);
  var r = document.getElementById('sizerRange');
  if (r) r.value = val;
}

function adjustSize(delta) {
  var r = document.getElementById('sizerRange');
  if (!r) return;
  var val = Math.min(24, Math.max(12, parseInt(r.value) + delta));
  applySize(val);
}

// Color slider: 0 = dimmer, 50 = default, 100 = near-white
// Uses a single injected style block targeting all readable text.
var COLOR_TARGETS = [
  '.section-body', '.story-text', '.callout p', '.gold-callout p', '.warn-callout p',
  '.quiz-opt', '.quiz-feedback', '.lab-intro p', '.lab-intro ol li', '.lab-prompt',
  '.chat-msg', '.lab-chat-input textarea'
].join(', ');

function applyColor(val) {
  val = parseInt(val);
  var lightness = Math.round(40 + (val * 0.52)); // 40% dim → 92% near-white
  var color = 'hsl(30, 8%, ' + lightness + '%)';
  var styleId = 'aesop-color-style';
  var el = document.getElementById(styleId);
  if (!el) {
    el = document.createElement('style');
    el.id = styleId;
    document.head.appendChild(el);
  }
  el.textContent = COLOR_TARGETS + ' { color: ' + color + ' !important; }';
  localStorage.setItem(COLOR_KEY, val);
  var cr = document.getElementById('colorRange');
  if (cr) cr.value = val;
}

(function() {
  var savedSize  = localStorage.getItem(SIZER_KEY);
  if (savedSize)  applySize(parseInt(savedSize));
  var savedColor = localStorage.getItem(COLOR_KEY);
  if (savedColor) applyColor(parseInt(savedColor));
})();
</script>
