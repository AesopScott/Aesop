.review-section{margin-top:3rem;}
.review-title{
  font-size:0.62rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;

<script>
// ─────────────────────────────────────────────────────────────
// EXAM CONFIGURATION — populate this object per course
// ─────────────────────────────────────────────────────────────
const EXAM_CONFIG = {
  courseId: 'building-with-ai-v2',
  courseTitle: 'Building with AI',
  backUrl: '/ai-academy/modules/v2/building-with-ai/m8.html',
  passPct: 70,
  timeLimitSeconds: 3600,
  retakeDays: 3,
};

// ─────────────────────────────────────────────────────────────
// EXAM DATA — 30 questions, each with:
//   q: question text
//   choices: [A, B, C, D]
//   correct: 0-3 (index)
//   standard: citation string
//   explanation: why the correct answer is right (and why the wrong ones aren't)
// ─────────────────────────────────────────────────────────────
const EXAM_DATA = [

  // ── MODULE 1: Prompt Engineering ──

  {
    q: "A prompt consistently returns well-structured output in testing but produces inconsistent results when deployed by different team members. Which component of the three-part prompt structure is most likely missing or underspecified?",
    choices: [
      "The role — team members are not specifying who the AI should be",
      "The context — each team member is providing different background information about the task",
      "The constraints — the prompt lacks explicit output format, length, and tone requirements",
      "The model — different team members may be using different underlying AI models"
    ],
    correct: 2,
    standard: "AI4K12 Big Idea 3",
    explanation: "Inconsistent output across users with the same task is the classic symptom of underspecified constraints — without explicit format, length, and tone requirements, each user's implicit assumptions fill the gap differently. Role underspecification would produce wrong personas, not inconsistent formatting. Context differences would be visible in the prompts themselves and would explain content variation, not structural variation."
  },

  {
    q: "A student asks an AI to 'write something about climate change' and receives an unfocused, overly general response. Which diagnostic step should come first when iterating to improve the prompt?",
    choices: [
      "Rerun the same prompt several times to see if the output improves with randomness",
      "Switch to a different AI model that may handle vague instructions better",
      "Identify which of the three prompt components — role, context, or constraints — is absent or ambiguous",
      "Add more adjectives to describe the desired quality of the output"
    ],
    correct: 2,
    standard: "AI4K12 Big Idea 3",
    explanation: "Effective prompt iteration starts with diagnosis: mapping the failure back to a missing role, insufficient context, or vague constraints tells you exactly what to add. Rerunning the same prompt doesn't fix a structural deficit. Switching models addresses capability, not prompt design. Adding adjectives is a surface-level tweak that rarely resolves a foundational ambiguity."
  },

  {
    q: "You write a prompt with a clearly defined role and detailed context, but the AI consistently returns responses that are either too long or formatted as prose when you need bullet points. Which component needs revision?",
    choices: [
      "Role — the persona assigned does not match the output format you want",
      "Context — the background information is creating ambiguity about the task",
      "Constraints — explicit output format and length requirements are missing",
      "Temperature — the model's creativity setting is overriding the intended structure"
    ],
    correct: 2,
    standard: "CSTA 3B-AP-16",
    explanation: "Output format and length are governed by constraints — the third component of the three-part structure. When role and context are solid but output form is wrong, the missing piece is always a constraint specifying format (e.g., 'respond in bullet points') and length. Role affects voice and expertise, not structure. Temperature is a model parameter, not a prompt component, and does not control formatting."
  },

  {
    q: "Which of the following best describes why prompt iteration is necessary even when a prompt seems well-written on first draft?",
    choices: [
      "AI models change their internal weights over time, so prompts that worked before may stop working",
      "The gap between the task the writer imagined and the task the model inferred is only visible in the output",
      "Well-written prompts often contain too many constraints, which the model ignores after a threshold",
      "Iteration is only necessary when using models that lack fine-tuning on the relevant domain"
    ],
    correct: 1,
    standard: "AI4K12 Big Idea 3",
    explanation: "Prompts are interpreted, not executed literally — the model infers intent from language, and that inference can diverge from the writer's intention in ways that only the output reveals. Iteration closes that gap by using each output as evidence about where the model's interpretation went wrong. Model weights do not change between uses by the same user; iteration is valuable regardless of fine-tuning status."
  },

  // ── MODULE 2: Context and Memory ──

  {
    q: "A developer is building a customer support chatbot that needs to recall details from conversations that happened two weeks ago. Which memory approach is most appropriate for this requirement?",
    choices: [
      "In-context memory — paste the last two weeks of conversation history into every prompt",
      "External memory — retrieve relevant past conversation summaries from a database and inject them into the prompt",
      "Fine-tuning — train the model on historical conversations so it learns customer patterns",
      "Prompt chaining — break each conversation into smaller segments to stay within the context window"
    ],
    correct: 1,
    standard: "AI4K12 Big Idea 4",
    explanation: "External memory (a retrieval system connected to a database) is designed precisely for persistent, long-horizon recall — it stores information outside the model and fetches relevant pieces per request. In-context memory is bounded by the context window and cannot hold two weeks of history. Fine-tuning bakes patterns into model weights but does not give the model access to specific past conversations. Prompt chaining manages window limits but does not solve cross-session memory."
  },

  {
    q: "A user pastes a 50-page document into an AI chat, asks several questions, and notices that the model's answers near the end of the conversation begin ignoring details from the beginning of the document. What is the most likely cause?",
    choices: [
      "The model has a bias toward more recent information because it was trained on newer data",
      "The conversation has exceeded the model's context window, causing earlier content to be dropped or degraded",
      "The model is rate-limiting responses to conserve compute after processing a large document",
      "Repeated questions about the same document cause the model to deprioritize earlier context"
    ],
    correct: 1,
    standard: "AI4K12 Big Idea 4",
    explanation: "Context windows have a fixed token limit; when input exceeds this limit, the model either truncates earlier content or its attention degrades on distant tokens — both produce the symptom of 'forgetting' early information. This is a hard architectural constraint, not a training bias toward recency or a rate-limiting behavior. There is no mechanism that deprioritizes repeated context questions."
  },

  {
    q: "An AI product team wants their model to respond consistently in a specific brand voice across all users without including lengthy style instructions in every prompt. Which memory strategy best addresses this at scale?",
    choices: [
      "In-context memory — prepend the brand voice guide to every user prompt at runtime",
      "External memory — store the brand voice guide in a vector database and retrieve it per request",
      "Fine-tuning — train the model on examples of the brand voice so the style is embedded in the weights",
      "Prompt chaining — have one model generate a style summary and pass it to a second model"
    ],
    correct: 2,
    standard: "O*NET 15-2051 · AI Development Skills",
    explanation: "Fine-tuning is the appropriate strategy when you need a behavior to be consistent across all interactions without prompt overhead — the style becomes part of the model's learned behavior rather than an instruction that must be re-delivered. In-context and external memory both require runtime injection, which adds cost and latency at scale. Prompt chaining adds architectural complexity without solving the core problem of per-prompt style instructions."
  },

  // ── MODULE 3: AI Use Case Evaluation ──

  {
    q: "A hospital administrator proposes using an AI system to automatically approve or deny insurance pre-authorization requests without human review. Using the four-question evaluation framework, which factor most clearly pushes this toward a red line?",
    choices: [
      "Low reversibility — a denied authorization may delay critical care before any appeal is processed",
      "High stakes — insurance decisions involve large financial sums for the hospital system",
      "Poor human alternatives — human reviewers make inconsistent decisions across cases",
      "Disclosure complexity — patients may not understand how to request a human review"
    ],
    correct: 0,
    standard: "EU AI Act · Art. 13",
    explanation: "Reversibility is the decisive factor here: a wrongly denied authorization can delay or prevent time-sensitive medical care, and the harm may be irreversible before an appeal resolves. High stakes alone do not prohibit automation — many high-stakes decisions can be safely automated with reversible safeguards. Human inconsistency is an argument for AI assistance, not full autonomy. Disclosure complexity is a design challenge, not a red-line criterion."
  },

  {
    q: "A teacher wants to use AI to give students instant grammar feedback on essay drafts before the teacher's final review. Which evaluation framework outcome best describes this use case?",
    choices: [
      "Red line — AI should not evaluate student work because it can introduce grading bias",
      "Gray area requiring disclosure — students should know AI reviewed their drafts, but the use is appropriate",
      "Clear approval — stakes are low, reversible, and a human does the final review",
      "Requires fine-tuning — general AI models cannot evaluate student writing without domain adaptation"
    ],
    correct: 2,
    standard: "ISTE Standard 2.6",
    explanation: "This use case scores well on all four framework questions: stakes are low (draft feedback, not final grades), the decision is fully reversible (the teacher reviews everything), human alternatives exist and still apply (the teacher's final review), and disclosure is straightforward. It is not a red line because no irreversible harm is possible. Gray area concerns arise when human oversight is absent or the stakes are higher — neither applies here."
  },

  {
    q: "A marketing team uses AI to generate first-draft social media posts that a human always reviews and approves before publishing. A colleague argues this use requires full disclosure to followers. Which position does the four-question framework best support?",
    choices: [

// ENGINE — do not modify below
// ─────────────────────────────────────────────────────────────
const STORAGE_KEY = `aesop_exam_${EXAM_CONFIG.courseId}`;
let currentQ = 0;
let answers = new Array(EXAM_DATA.length).fill(-1);
let timerInterval = null;
let secondsLeft = EXAM_CONFIG.timeLimitSeconds;
let examStarted = false;
let examSubmitted = false;

function init() {
  document.getElementById('topbarBack').href = EXAM_CONFIG.backUrl;
  document.getElementById('topbarCourse').textContent = EXAM_CONFIG.courseTitle;
  document.getElementById('topbarProgress').textContent = '';
  document.getElementById('startTitle').textContent = EXAM_CONFIG.courseTitle + ' — Final Exam';
  document.getElementById('startEyebrow').textContent = 'Module 8 Complete · Final Exam';

  const saved = getSaved();
  if (saved && saved.lockedUntil && Date.now() < saved.lockedUntil) {
    const days = Math.ceil((saved.lockedUntil - Date.now()) / 86400000);
    const hrs  = Math.ceil((saved.lockedUntil - Date.now()) / 3600000);
    document.getElementById('retakeNotice').style.display = 'block';
    document.getElementById('retakeNotice').textContent =
      `You did not pass. Retakes are available in ${hrs < 24 ? hrs + ' hour(s)' : days + ' day(s)'}.`;
    document.getElementById('btnStart').disabled = true;
  }
}

function getSaved() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; }
}
function setSaved(obj) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(obj));
}

function startExam() {
  examStarted = true;
  answers = new Array(EXAM_DATA.length).fill(-1);
  currentQ = 0;
  secondsLeft = EXAM_CONFIG.timeLimitSeconds;
  show('screenExam');
  renderQ();
  startTimer();
}

function startTimer() {
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    secondsLeft--;
    updateTimerDisplay();
    if (secondsLeft <= 0) { clearInterval(timerInterval); submitExam(); }
  }, 1000);
}

function updateTimerDisplay() {
  const h = Math.floor(secondsLeft / 3600);
  const m = Math.floor((secondsLeft % 3600) / 60);
  const s = secondsLeft % 60;
  const str = `${h}:${pad(m)}:${pad(s)}`;
  const el = document.getElementById('timer');
  el.textContent = str;
  el.className = 'topbar-timer' + (secondsLeft < 300 ? ' warning' : '');
}

function pad(n) { return String(n).padStart(2, '0'); }

function renderQ() {
  const q = EXAM_DATA[currentQ];
  const answered = answers[currentQ] !== -1;
  const pct = Math.round(((currentQ + 1) / EXAM_DATA.length) * 100);

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('topbarProgress').textContent = `${currentQ + 1} / ${EXAM_DATA.length}`;
  document.getElementById('qCounter').textContent = `Question ${currentQ + 1} of ${EXAM_DATA.length}`;
  document.getElementById('btnPrev').disabled = currentQ === 0;

  const isLast = currentQ === EXAM_DATA.length - 1;
  const allAnswered = answers.every(a => a !== -1);
  const btn = document.getElementById('btnNext');
  if (isLast) {
    btn.textContent = allAnswered ? 'Submit Exam →' : 'Next →';
    btn.onclick = allAnswered ? submitExam : nextQ;
  } else {
    btn.textContent = 'Next →';
    btn.onclick = nextQ;
  }

  const letters = ['A', 'B', 'C', 'D'];
  document.getElementById('questionWrap').innerHTML = `
    <div class="question-card">
      <div class="q-meta">
        <span class="q-num">Question ${currentQ + 1}</span>
        <span class="q-standard">${q.standard}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="choices">
        ${q.choices.map((c, i) => `
          <button class="choice${answers[currentQ] === i ? ' selected' : ''}"
            onclick="selectAnswer(${i})"
            ${examSubmitted ? 'disabled' : ''}>
            <span class="choice-letter">${letters[i]}</span>
            <span class="choice-text">${c}</span>
          </button>
        `).join('')}
      </div>
      <div class="q-explanation" id="qExpl"></div>
    </div>
  `;
}

function selectAnswer(idx) {
  if (examSubmitted) return;
  answers[currentQ] = idx;
  renderQ();
  // auto-advance if not last question
  if (currentQ < EXAM_DATA.length - 1) {
    setTimeout(() => { currentQ++; renderQ(); }, 300);
  }
}

function nextQ() {
  if (currentQ < EXAM_DATA.length - 1) { currentQ++; renderQ(); }
}
function prevQ() {
  if (currentQ > 0) { currentQ--; renderQ(); }
}

function submitExam() {
  clearInterval(timerInterval);
  examSubmitted = true;

  const correct = answers.filter((a, i) => a === EXAM_DATA[i].correct).length;
  const total   = EXAM_DATA.length;
  const pct     = Math.round((correct / total) * 100);
  const passed  = pct >= EXAM_CONFIG.passPct;

  // Save result + lock if failed
  const result = { passed, pct, correct, total, date: Date.now() };
  if (!passed) {
    result.lockedUntil = Date.now() + (EXAM_CONFIG.retakeDays * 86400000);
  }
  setSaved(result);

  // Score ring
  const ring = document.getElementById('scoreRing');
  ring.className = 'score-ring ' + (passed ? 'pass' : 'fail');
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('resultsVerdict').textContent = passed ? 'Exam Passed' : 'Exam Not Passed';
  document.getElementById('resultsSub').textContent = passed
    ? `You scored ${pct}% — above the ${EXAM_CONFIG.passPct}% threshold. This result has been recorded.`
    : `You scored ${pct}% — below the ${EXAM_CONFIG.passPct}% threshold. Review the wrong answers below, then retake when the timer clears.`;

  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = total - correct;
  document.getElementById('statPct').textContent = pct + '%';

  if (!passed) {
    const unlockDate = new Date(result.lockedUntil);
    document.getElementById('retakeInfo').textContent =
      `Retake available after ${unlockDate.toLocaleDateString('en-US', {weekday:'long',month:'long',day:'numeric'})} at ${unlockDate.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'})}.`;
    document.getElementById('btnRetake').disabled = true;
  } else {
    document.getElementById('retakeInfo').textContent = '';
    document.getElementById('btnRetake').style.display = 'none';
  }

  // Build wrong-answer review
  const wrong = answers.map((a, i) => ({i, a, q: EXAM_DATA[i]})).filter(x => x.a !== x.q.correct);
  const letters = ['A','B','C','D'];
  document.getElementById('reviewWrap').innerHTML = wrong.length === 0
    ? '<p style="color:var(--teal);font-size:0.88rem;">Perfect score — no wrong answers to review.</p>'
    : wrong.map(({i, a, q}) => `
        <div class="review-item wrong-item">
          <div class="review-q">Q${i+1}. ${q.q}</div>
          <div class="review-answers">
            <span class="your">Your answer: ${letters[a]}. ${q.choices[a]}</span><br>
            <span class="correct">Correct: ${letters[q.correct]}. ${q.choices[q.correct]}</span>
          </div>
          <div class="review-explanation">${q.explanation}</div>
          <span class="review-standard">${q.standard}</span>
        </div>
      `).join('');

  show('screenResults');
}

function resetExam() {
  const saved = getSaved();
  if (saved && saved.lockedUntil && Date.now() < saved.lockedUntil) return;
  examSubmitted = false;
  startExam();
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

init();
</script>
</body>
</html>
