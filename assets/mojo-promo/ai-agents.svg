<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0a20"/>
      <stop offset="100%" stop-color="#15103a"/>
    </linearGradient>
    <linearGradient id="purple2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bc8cff"/>
      <stop offset="100%" stop-color="#9d6fff"/>
    </linearGradient>
    <linearGradient id="blue2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#388bfd"/>
      <stop offset="100%" stop-color="#5ba3ff"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="160" height="160" rx="20" fill="url(#bg2)"/>
  <!-- Connection lines -->
  <line x1="80" y1="48" x2="38" y2="110" stroke="rgba(188,140,255,0.25)" stroke-width="1.5"/>
  <line x1="80" y1="48" x2="122" y2="110" stroke="rgba(188,140,255,0.25)" stroke-width="1.5"/>
  <line x1="38" y1="110" x2="122" y2="110" stroke="rgba(188,140,255,0.2)" stroke-width="1.5"/>
  <!-- Animated data packets on lines -->
  <circle r="3.5" fill="#bc8cff" filter="url(#glow2)" opacity="0.9">
    <animateMotion dur="2.4s" repeatCount="indefinite">
      <mpath href="#path-top-left"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;0.9;0.9;0" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="3.5" fill="#388bfd" filter="url(#glow2)" opacity="0.9">
    <animateMotion dur="2.8s" begin="0.9s" repeatCount="indefinite">
      <mpath href="#path-top-right"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;0.9;0.9;0" dur="2.8s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="#3dd6c0" filter="url(#glow2)" opacity="0.9">
    <animateMotion dur="2.2s" begin="1.6s" repeatCount="indefinite">
      <mpath href="#path-bottom"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;0.9;0.9;0" dur="2.2s" begin="1.6s" repeatCount="indefinite"/>
  </circle>
  <defs>
    <path id="path-top-left" d="M80,48 L38,110"/>
    <path id="path-top-right" d="M80,48 L122,110"/>
    <path id="path-bottom" d="M38,110 L122,110"/>
  </defs>
  <!-- Top agent (center top) -->
  <polygon points="80,22 96,42 64,42" fill="rgba(188,140,255,0.12)" stroke="url(#purple2)" stroke-width="2"/>
  <circle cx="80" cy="35" r="14" fill="#1a1040" stroke="url(#purple2)" stroke-width="2.5" filter="url(#glow2)"/>
  <rect x="73" y="29" width="14" height="9" rx="2.5" fill="#bc8cff" opacity="0.8"/>
  <circle cx="75.5" cy="33.5" r="2" fill="#0e0a20"/>
  <circle cx="84.5" cy="33.5" r="2" fill="#0e0a20"/>
  <rect x="75" y="39" width="10" height="2.5" rx="1.25" fill="#bc8cff" opacity="0.6"/>
  <!-- Bottom-left agent -->
  <circle cx="38" cy="115" r="16" fill="#1a1040" stroke="url(#blue2)" stroke-width="2.5" filter="url(#glow2)"/>
  <rect x="31" y="109" width="14" height="9" rx="2.5" fill="#388bfd" opacity="0.8"/>
  <circle cx="33.5" cy="113.5" r="2" fill="#0e0a20"/>
  <circle cx="42.5" cy="113.5" r="2" fill="#0e0a20"/>
  <rect x="33" y="119" width="10" height="2.5" rx="1.25" fill="#388bfd" opacity="0.6"/>
  <!-- Bottom-right agent -->
  <circle cx="122" cy="115" r="16" fill="#1a1040" stroke="#3dd6c0" stroke-width="2.5" filter="url(#glow2)"/>
  <rect x="115" y="109" width="14" height="9" rx="2.5" fill="#3dd6c0" opacity="0.8"/>
  <circle cx="117.5" cy="113.5" r="2" fill="#0e0a20"/>
  <circle cx="126.5" cy="113.5" r="2" fill="#0e0a20"/>
  <rect x="117" y="119" width="10" height="2.5" rx="1.25" fill="#3dd6c0" opacity="0.6"/>
  <!-- Corner dots -->
  <circle cx="20" cy="20" r="2" fill="#bc8cff" opacity="0.35"/>
  <circle cx="140" cy="20" r="2" fill="#388bfd" opacity="0.35"/>
  <circle cx="20" cy="145" r="2" fill="#3dd6c0" opacity="0.3"/>
  <circle cx="145" cy="145" r="2" fill="#bc8cff" opacity="0.3"/>
</svg>
