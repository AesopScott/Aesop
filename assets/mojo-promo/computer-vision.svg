<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060c18"/>
      <stop offset="100%" stop-color="#0a1a2e"/>
    </linearGradient>
    <radialGradient id="iris5" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#388bfd" stop-opacity="1"/>
      <stop offset="40%" stop-color="#1a5acc" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0c2a6e" stop-opacity="1"/>
    </radialGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="eyeClip5">
      <ellipse cx="80" cy="80" rx="60" ry="38"/>
    </clipPath>
  </defs>
  <rect width="160" height="160" rx="20" fill="url(#bg5)"/>
  <!-- Eye white -->
  <ellipse cx="80" cy="80" rx="60" ry="38" fill="#0a1a30" stroke="rgba(56,139,253,0.5)" stroke-width="1.5"/>
  <!-- Iris -->
  <circle cx="80" cy="80" r="28" fill="url(#iris5)" clip-path="url(#eyeClip5)"/>
  <!-- Hexagonal iris pattern -->
  <g clip-path="url(#eyeClip5)" opacity="0.35">
    <polygon points="80,55 90,61 90,73 80,79 70,73 70,61" fill="none" stroke="#3dd6c0" stroke-width="0.8"/>
    <polygon points="80,59 88,64 88,74 80,79 72,74 72,64" fill="none" stroke="#3dd6c0" stroke-width="0.6"/>
    <line x1="80" y1="55" x2="80" y2="79" stroke="#3dd6c0" stroke-width="0.5"/>
    <line x1="70" y1="61" x2="90" y2="73" stroke="#3dd6c0" stroke-width="0.5"/>
    <line x1="90" y1="61" x2="70" y2="73" stroke="#3dd6c0" stroke-width="0.5"/>
  </g>
  <!-- Pupil -->
  <circle cx="80" cy="80" r="14" fill="#06101e" clip-path="url(#eyeClip5)"/>
  <circle cx="80" cy="80" r="11" fill="#060c18" clip-path="url(#eyeClip5)"/>
  <!-- Pupil reflection -->
  <circle cx="74" cy="74" r="4.5" fill="rgba(255,255,255,0.12)" clip-path="url(#eyeClip5)"/>
  <circle cx="75" cy="75" r="2" fill="rgba(255,255,255,0.25)" clip-path="url(#eyeClip5)"/>
  <!-- Scanning line -->
  <rect x="22" y="77" width="116" height="2.5" rx="1.25" fill="#3dd6c0" opacity="0.7" filter="url(#glow5)">
    <animate attributeName="y" values="44;116;44" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2.8s" repeatCount="indefinite"/>
  </rect>
  <!-- Corner detection markers -->
  <g stroke="#3dd6c0" stroke-width="2.5" fill="none" opacity="0.9" filter="url(#glow5)">
    <path d="M22,30 L22,22 L30,22"/>
    <path d="M138,30 L138,22 L130,22"/>
    <path d="M22,130 L22,138 L30,138"/>
    <path d="M138,130 L138,138 L130,138"/>
  </g>
  <!-- Focus reticle -->
  <circle cx="80" cy="80" r="34" fill="none" stroke="rgba(56,139,253,0.2)" stroke-width="1" stroke-dasharray="3,4"/>
  <circle cx="80" cy="80" r="42" fill="none" stroke="rgba(56,139,253,0.1)" stroke-width="1" stroke-dasharray="2,6"/>
</svg>
