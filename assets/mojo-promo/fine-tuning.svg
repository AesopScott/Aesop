<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#100e08"/>
      <stop offset="100%" stop-color="#1e1808"/>
    </linearGradient>
    <linearGradient id="gold4h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a05a"/>
      <stop offset="100%" stop-color="#e8c47a"/>
    </linearGradient>
    <linearGradient id="teal4h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#26b8a6"/>
      <stop offset="100%" stop-color="#3dd6c0"/>
    </linearGradient>
    <linearGradient id="purple4h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9d6fff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="160" height="160" rx="20" fill="url(#bg4)"/>
  <!-- Neural grid backdrop -->
  <g opacity="0.12" stroke="#c9a05a" stroke-width="0.75">
    <line x1="20" y1="30" x2="140" y2="30"/><line x1="20" y1="50" x2="140" y2="50"/>
    <line x1="20" y1="70" x2="140" y2="70"/><line x1="20" y1="90" x2="140" y2="90"/>
    <line x1="20" y1="110" x2="140" y2="110"/><line x1="20" y1="130" x2="140" y2="130"/>
    <line x1="30" y1="20" x2="30" y2="145"/><line x1="60" y1="20" x2="60" y2="145"/>
    <line x1="90" y1="20" x2="90" y2="145"/><line x1="120" y1="20" x2="120" y2="145"/>
  </g>
  <!-- Slider 1 (top) -->
  <rect x="22" y="46" width="116" height="6" rx="3" fill="rgba(255,255,255,0.07)"/>
  <rect x="22" y="46" width="75" height="6" rx="3" fill="url(#gold4h)" opacity="0.9" filter="url(#glow4)"/>
  <circle cx="97" cy="49" r="10" fill="#1e1808" stroke="url(#gold4h)" stroke-width="2.5" filter="url(#glow4)"/>
  <circle cx="97" cy="49" r="4" fill="#c9a05a"/>
  <text x="22" y="40" font-family="system-ui,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.4)" font-weight="600" letter-spacing="0.06em">LEARNING RATE</text>
  <!-- Slider 2 (middle) -->
  <rect x="22" y="84" width="116" height="6" rx="3" fill="rgba(255,255,255,0.07)"/>
  <rect x="22" y="84" width="45" height="6" rx="3" fill="url(#teal4h)" opacity="0.9" filter="url(#glow4)"/>
  <circle cx="67" cy="87" r="10" fill="#1e1808" stroke="url(#teal4h)" stroke-width="2.5" filter="url(#glow4)"/>
  <circle cx="67" cy="87" r="4" fill="#3dd6c0"/>
  <text x="22" y="78" font-family="system-ui,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.4)" font-weight="600" letter-spacing="0.06em">BATCH SIZE</text>
  <!-- Slider 3 (bottom) -->
  <rect x="22" y="122" width="116" height="6" rx="3" fill="rgba(255,255,255,0.07)"/>
  <rect x="22" y="122" width="90" height="6" rx="3" fill="url(#purple4h)" opacity="0.9" filter="url(#glow4)"/>
  <circle cx="112" cy="125" r="10" fill="#1e1808" stroke="url(#purple4h)" stroke-width="2.5" filter="url(#glow4)"/>
  <circle cx="112" cy="125" r="4" fill="#bc8cff"/>
  <text x="22" y="116" font-family="system-ui,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.4)" font-weight="600" letter-spacing="0.06em">EPOCHS</text>
</svg>
