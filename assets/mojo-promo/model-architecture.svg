<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060c18"/>
      <stop offset="100%" stop-color="#0d1e38"/>
    </linearGradient>
    <linearGradient id="layer1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#388bfd" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#5ba3ff" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3dd6c0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#26b8a6" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bc8cff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#9d6fff" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="layer4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a05a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#e8c47a" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="glow7">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="160" height="160" rx="20" fill="url(#bg7)"/>
  <!-- Layer 1: Input -->
  <rect x="30" y="20" width="100" height="16" rx="5" fill="url(#layer1)" filter="url(#glow7)"/>
  <rect x="30" y="20" width="100" height="16" rx="5" fill="none" stroke="#388bfd" stroke-width="1.5" opacity="0.8"/>
  <text x="80" y="31.5" font-family="monospace" font-size="6.5" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="0.1em">INPUT</text>
  <!-- Connector 1→2 -->
  <g opacity="0.6">
    <line x1="50" y1="36" x2="50" y2="50" stroke="#388bfd" stroke-width="1"/><polygon points="50,50 47,44 53,44" fill="#388bfd"/>
    <line x1="80" y1="36" x2="80" y2="50" stroke="#388bfd" stroke-width="1"/><polygon points="80,50 77,44 83,44" fill="#388bfd"/>
    <line x1="110" y1="36" x2="110" y2="50" stroke="#388bfd" stroke-width="1"/><polygon points="110,50 107,44 113,44" fill="#388bfd"/>
  </g>
  <!-- Layer 2: Attention -->
  <rect x="22" y="50" width="116" height="16" rx="5" fill="url(#layer2)" filter="url(#glow7)"/>
  <rect x="22" y="50" width="116" height="16" rx="5" fill="none" stroke="#3dd6c0" stroke-width="1.5" opacity="0.8"/>
  <text x="80" y="61.5" font-family="monospace" font-size="6" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="0.1em">ATTENTION</text>
  <!-- Connector 2→3 -->
  <g opacity="0.6">
    <line x1="50" y1="66" x2="50" y2="80" stroke="#3dd6c0" stroke-width="1"/><polygon points="50,80 47,74 53,74" fill="#3dd6c0"/>
    <line x1="80" y1="66" x2="80" y2="80" stroke="#3dd6c0" stroke-width="1"/><polygon points="80,80 77,74 83,74" fill="#3dd6c0"/>
    <line x1="110" y1="66" x2="110" y2="80" stroke="#3dd6c0" stroke-width="1"/><polygon points="110,80 107,74 113,74" fill="#3dd6c0"/>
  </g>
  <!-- Layer 3: FFN -->
  <rect x="30" y="80" width="100" height="16" rx="5" fill="url(#layer3)" filter="url(#glow7)"/>
  <rect x="30" y="80" width="100" height="16" rx="5" fill="none" stroke="#bc8cff" stroke-width="1.5" opacity="0.8"/>
  <text x="80" y="91.5" font-family="monospace" font-size="6" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="0.1em">FEED-FORWARD</text>
  <!-- Connector 3→4 -->
  <g opacity="0.6">
    <line x1="50" y1="96" x2="50" y2="110" stroke="#bc8cff" stroke-width="1"/><polygon points="50,110 47,104 53,104" fill="#bc8cff"/>
    <line x1="80" y1="96" x2="80" y2="110" stroke="#bc8cff" stroke-width="1"/><polygon points="80,110 77,104 83,104" fill="#bc8cff"/>
    <line x1="110" y1="96" x2="110" y2="110" stroke="#bc8cff" stroke-width="1"/><polygon points="110,110 107,104 113,104" fill="#bc8cff"/>
  </g>
  <!-- Layer 4: Output -->
  <rect x="38" y="110" width="84" height="16" rx="5" fill="url(#layer4)" filter="url(#glow7)"/>
  <rect x="38" y="110" width="84" height="16" rx="5" fill="none" stroke="#c9a05a" stroke-width="1.5" opacity="0.8"/>
  <text x="80" y="121.5" font-family="monospace" font-size="6.5" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="0.1em">OUTPUT</text>
  <!-- Label count -->
  <text x="22" y="49" font-family="system-ui,sans-serif" font-size="6" fill="rgba(255,255,255,0.25)" letter-spacing="0.08em">× N LAYERS</text>
  <!-- Dots -->
  <circle cx="80" cy="140" r="3" fill="#c9a05a" opacity="0.5" filter="url(#glow7)"/>
  <circle cx="72" cy="140" r="2" fill="#c9a05a" opacity="0.3"/>
  <circle cx="88" cy="140" r="2" fill="#c9a05a" opacity="0.3"/>
</svg>
