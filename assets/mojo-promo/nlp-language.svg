<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1e"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <linearGradient id="purple6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bc8cff"/>
      <stop offset="100%" stop-color="#9b6cff"/>
    </linearGradient>
    <filter id="glow6">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="160" height="160" rx="20" fill="url(#bg6)"/>
  <!-- Speech bubble shape -->
  <path d="M20,30 Q20,20 30,20 L130,20 Q140,20 140,30 L140,100 Q140,110 130,110 L90,110 L75,138 L65,110 L30,110 Q20,110 20,100 Z"
    fill="rgba(188,140,255,0.08)" stroke="url(#purple6)" stroke-width="2.5" filter="url(#glow6)"/>
  <!-- Text wave lines inside bubble -->
  <g opacity="0.9">
    <!-- Line 1: short word, long word, medium -->
    <rect x="35" y="40" width="18" height="5" rx="2.5" fill="#bc8cff" opacity="0.8"/>
    <rect x="58" y="40" width="42" height="5" rx="2.5" fill="rgba(255,255,255,0.25)"/>
    <rect x="105" y="40" width="24" height="5" rx="2.5" fill="rgba(255,255,255,0.15)"/>
    <!-- Line 2 -->
    <rect x="35" y="52" width="55" height="5" rx="2.5" fill="rgba(255,255,255,0.2)"/>
    <rect x="95" y="52" width="30" height="5" rx="2.5" fill="#bc8cff" opacity="0.6"/>
    <!-- Line 3: highlighted -->
    <rect x="35" y="64" width="28" height="5" rx="2.5" fill="rgba(255,255,255,0.15)"/>
    <rect x="68" y="62" width="50" height="9" rx="4" fill="rgba(188,140,255,0.25)"/>
    <rect x="70" y="64" width="46" height="5" rx="2.5" fill="#bc8cff" opacity="0.9"/>
    <!-- Line 4 -->
    <rect x="35" y="76" width="70" height="5" rx="2.5" fill="rgba(255,255,255,0.18)"/>
    <rect x="110" y="76" width="20" height="5" rx="2.5" fill="rgba(255,255,255,0.1)"/>
    <!-- Line 5 -->
    <rect x="35" y="88" width="35" height="5" rx="2.5" fill="#3dd6c0" opacity="0.7"/>
    <rect x="75" y="88" width="48" height="5" rx="2.5" fill="rgba(255,255,255,0.15)"/>
  </g>
  <!-- Processing dots -->
  <circle cx="55" cy="125" r="5" fill="#bc8cff" filter="url(#glow6)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="72" cy="125" r="5" fill="#9d6fff" filter="url(#glow6)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="89" cy="125" r="5" fill="#3dd6c0" filter="url(#glow6)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <!-- Corner sparkles -->
  <circle cx="145" cy="145" r="2" fill="#bc8cff" opacity="0.3"/>
  <circle cx="15" cy="145" r="2" fill="#9b6cff" opacity="0.3"/>
</svg>
