<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d1f3c"/>
    </linearGradient>
    <linearGradient id="gold1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a05a"/>
      <stop offset="100%" stop-color="#e8c47a"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="160" height="160" rx="20" fill="url(#bg1)"/>
  <!-- Terminal window -->
  <rect x="18" y="44" width="102" height="82" rx="8" fill="#0f1e38" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="18" y="44" width="102" height="19" rx="8" fill="#162040"/>
  <rect x="18" y="53" width="102" height="10" fill="#162040"/>
  <circle cx="32" cy="54" r="3.5" fill="#ff5f57"/>
  <circle cx="43" cy="54" r="3.5" fill="#febc2e"/>
  <circle cx="54" cy="54" r="3.5" fill="#28c840"/>
  <rect x="28" y="73" width="12" height="5" rx="2" fill="#bc8cff" opacity="0.9"/>
  <rect x="44" y="73" width="50" height="5" rx="2" fill="rgba(255,255,255,0.22)"/>
  <rect x="28" y="84" width="18" height="5" rx="2" fill="#3dd6c0" opacity="0.9"/>
  <rect x="50" y="84" width="40" height="5" rx="2" fill="rgba(255,255,255,0.18)"/>
  <rect x="94" y="84" width="18" height="5" rx="2" fill="#c9a05a" opacity="0.8"/>
  <rect x="28" y="95" width="55" height="5" rx="2" fill="rgba(255,255,255,0.13)"/>
  <rect x="28" y="106" width="8" height="5" rx="2" fill="#c9a05a" opacity="0.9"/>
  <rect x="40" y="106" width="28" height="5" rx="2" fill="rgba(255,255,255,0.18)"/>
  <rect x="72" y="106" width="6" height="5" rx="1" fill="#3dd6c0" opacity="0.85">
    <animate attributeName="opacity" values="0.85;0.1;0.85" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- Magnifying glass -->
  <circle cx="116" cy="48" r="24" fill="rgba(201,160,90,0.06)" stroke="url(#gold1)" stroke-width="3.5" filter="url(#glow1)"/>
  <circle cx="109" cy="41" r="5" fill="rgba(255,255,255,0.12)"/>
  <line x1="133" y1="65" x2="148" y2="80" stroke="url(#gold1)" stroke-width="5.5" stroke-linecap="round" filter="url(#glow1)"/>
  <circle cx="22" cy="32" r="2" fill="#c9a05a" opacity="0.4"/>
  <circle cx="148" cy="115" r="2.5" fill="#3dd6c0" opacity="0.35"/>
  <circle cx="142" cy="28" r="1.5" fill="#bc8cff" opacity="0.45"/>
</svg>
