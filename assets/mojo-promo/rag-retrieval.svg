<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#081a18"/>
      <stop offset="100%" stop-color="#0c2228"/>
    </linearGradient>
    <linearGradient id="teal3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3dd6c0"/>
      <stop offset="100%" stop-color="#26b8a6"/>
    </linearGradient>
    <linearGradient id="gold3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a05a"/>
      <stop offset="100%" stop-color="#e8c47a"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="160" height="160" rx="20" fill="url(#bg3)"/>
  <!-- Database (left) -->
  <ellipse cx="45" cy="58" rx="22" ry="8" fill="#0f2e2a" stroke="url(#teal3)" stroke-width="2"/>
  <rect x="23" y="58" width="44" height="18" fill="#0f2e2a"/>
  <line x1="23" y1="58" x2="23" y2="76" stroke="#3dd6c0" stroke-width="2"/>
  <line x1="67" y1="58" x2="67" y2="76" stroke="#3dd6c0" stroke-width="2"/>
  <ellipse cx="45" cy="76" rx="22" ry="8" fill="#0f2e2a" stroke="url(#teal3)" stroke-width="2"/>
  <rect x="23" y="76" width="44" height="18" fill="#0f2e2a"/>
  <line x1="23" y1="76" x2="23" y2="94" stroke="#3dd6c0" stroke-width="2"/>
  <line x1="67" y1="76" x2="67" y2="94" stroke="#3dd6c0" stroke-width="2"/>
  <ellipse cx="45" cy="94" rx="22" ry="8" fill="#0f2e2a" stroke="url(#teal3)" stroke-width="2"/>
  <!-- Database row lines -->
  <line x1="30" y1="68" x2="60" y2="68" stroke="rgba(61,214,192,0.3)" stroke-width="1"/>
  <line x1="30" y1="86" x2="60" y2="86" stroke="rgba(61,214,192,0.3)" stroke-width="1"/>
  <!-- Top label -->
  <text x="45" y="57" font-family="monospace" font-size="6" fill="#3dd6c0" text-anchor="middle" opacity="0.7">VECTOR DB</text>
  <!-- Data stream particles -->
  <circle cx="80" cy="80" r="2.5" fill="#3dd6c0" opacity="0.8" filter="url(#glow3)">
    <animateMotion dur="1.6s" repeatCount="indefinite" path="M67,80 L93,80"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="80" r="2.5" fill="#c9a05a" opacity="0.8" filter="url(#glow3)">
    <animateMotion dur="1.6s" begin="0.5s" repeatCount="indefinite" path="M93,80 L67,80"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="1.6s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Connection line -->
  <line x1="68" y1="80" x2="93" y2="80" stroke="rgba(61,214,192,0.15)" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Arrows -->
  <polygon points="90,76 98,80 90,84" fill="rgba(201,160,90,0.5)"/>
  <!-- Brain (right) - stylized -->
  <g transform="translate(115,80)">
    <!-- Brain outline via paths -->
    <path d="M0,-32 C14,-32 24,-24 26,-14 C32,-12 36,-4 34,6 C40,10 40,22 32,26 C30,34 20,38 10,34 C6,40 -6,40 -10,34 C-20,38 -30,34 -32,26 C-40,22 -40,10 -34,6 C-36,-4 -32,-12 -26,-14 C-24,-24 -14,-32 0,-32 Z"
      fill="rgba(201,160,90,0.1)" stroke="url(#gold3)" stroke-width="2.5" filter="url(#glow3)"/>
    <!-- Brain folds -->
    <path d="M-8,-18 C-4,-22 4,-22 8,-18 C12,-14 10,-8 6,-6 C10,-2 10,6 6,8" fill="none" stroke="rgba(201,160,90,0.5)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M-14,-4 C-18,0 -18,8 -14,12" fill="none" stroke="rgba(201,160,90,0.4)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M14,-4 C18,0 18,8 14,12" fill="none" stroke="rgba(201,160,90,0.4)" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Center glow dot -->
    <circle r="5" fill="#c9a05a" opacity="0.25" filter="url(#glow3)"/>
    <circle r="2.5" fill="#c9a05a" opacity="0.8"/>
  </g>
  <!-- Corner accents -->
  <circle cx="22" cy="22" r="2" fill="#3dd6c0" opacity="0.35"/>
  <circle cx="142" cy="142" r="2" fill="#c9a05a" opacity="0.35"/>
</svg>
