# Aesop AI Academy — OG Image Worker config
# Deploy with: cd cloudflare && npx wrangler deploy
#
# One-time setup (wrangler already installed from advisory-board worker):
#   cd cloudflare
#   npx wrangler deploy

name               = "aesop-og-worker"
main               = "og-worker.js"
compatibility_date = "2024-11-01"

account_id = "a701416150e038275c8a130628484698"

# Intercepts electives-hub.html requests that have a ?course= param.
# The * wildcard covers the full query string.
routes = [
  { pattern = "aesopacademy.org/ai-academy/modules/electives-hub.html*", zone_name = "aesopacademy.org" }
]

[observability]
enabled = true
