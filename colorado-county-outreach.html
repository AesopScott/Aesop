function load() {
  try {
    const d = localStorage.getItem(KEY);
    if (!d) return SEED.map(r=>({...r}));
    const stored = JSON.parse(d);
    // Backfill li_url into existing rows from SEED (by county match)
    const seedMap = Object.fromEntries(SEED.map(s=>[s.county.toLowerCase(), s]));
    stored.forEach(r => {
      if (r.li_url === undefined || r.li_url === '') {
        const s = seedMap[r.county.toLowerCase()];
        if (s?.li_url) r.li_url = s.li_url;
      }
    });
    // Append any new SEED counties not yet in stored data
    const storedCounties = new Set(stored.map(r=>r.county.toLowerCase()));
    const newEntries = SEED.filter(r=>!storedCounties.has(r.county.toLowerCase()));
    return [...stored, ...newEntries.map(r=>({...r}))];
  } catch { return SEED.map(r=>({...r})); }
}

function collectRows() {
  return [...document.querySelectorAll('#tbody tr[data-row]')].map(tr => ({
    name:     tr.querySelector('.col-name').innerText.trim(),
    county:   tr.querySelector('.col-county').innerText.trim(),
    title:    tr.querySelector('.col-title').innerText.trim(),
    email:    tr.querySelector('.col-email').innerText.trim(),
    phone:    tr.querySelector('.col-phone').innerText.trim(),
    status:   tr.querySelector('.status-sel').value,
    linkedin: tr.querySelector('.li-sel').value,
    li_url:   tr.querySelector('.li-td').dataset.liUrl || '',
    notes:    tr.querySelector('.col-notes').innerText.trim(),
  }));
}

function saveData() {
  const rows = collectRows();
  localStorage.setItem(KEY, JSON.stringify(rows));
  const el = document.getElementById('savedMsg');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
  renderStats(rows);
}

function renderStats(rows) {
  const c = { total:rows.length, sent:0, bounced:0, replied:0, meeting:0, liOut:0, liIn:0 };
  rows.forEach(r => {
    if (r.status === 'sent' || r.status === 'no-response') c.sent++;
    if (r.status === 'bounced')  c.bounced++;
    if (r.status === 'replied')  c.replied++;
    if (r.status === 'meeting')  c.meeting++;
    if (r.linkedin && r.linkedin !== 'not-attempted') c.liOut++;
    if (['connected','messaged','responded','meeting'].includes(r.linkedin)) c.liIn++;
  });
  document.getElementById('stats').innerHTML = `
    <div class="stat"><strong>${c.total}</strong> Total</div>
    <div class="stat blue"><strong>${c.sent}</strong> Email Sent</div>
    <div class="stat red"><strong>${c.bounced}</strong> Bounced</div>
    <div class="stat green"><strong>${c.replied}</strong> Replied</div>
    <div class="stat gold"><strong>${c.meeting}</strong> Meeting Set</div>
    <div class="stat purple"><strong>${c.liOut}</strong> LI Requested</div>
    <div class="stat teal"><strong>${c.liIn}</strong> LI Connected</div>
  `;
}

function makeSelect(current) {
  const sel = document.createElement('select');
  sel.className = 'status-sel';
  STATUSES.forEach(s => {
    const o = document.createElement('option');
    o.value = s.v; o.textContent = s.l;
    if (s.v === current) o.selected = true;
    sel.appendChild(o);
  });
  const style = () => {
    STATUSES.forEach(s => sel.classList.remove(s.c));
    sel.classList.add(STATUSES.find(s => s.v === sel.value)?.c || '');
  };
  style();
  sel.addEventListener('change', () => { style(); saveData(); });
  return sel;
}

function makeLiSelect(current) {
  const sel = document.createElement('select');
  sel.className = 'status-sel li-sel';
  LI_STATUSES.forEach(s => {
    const o = document.createElement('option');
    o.value = s.v; o.textContent = s.l;
    if (s.v === current) o.selected = true;
    sel.appendChild(o);
  });
  const style = () => {
    LI_STATUSES.forEach(s => sel.classList.remove(s.c));
    sel.classList.add(LI_STATUSES.find(s => s.v === sel.value)?.c || '');
  };
  style();
  sel.addEventListener('change', () => { style(); saveData(); });
  return sel;
}

function editable(cls, ph, text) {
  const td = document.createElement('td');
  td.className = cls;
  td.contentEditable = 'true';
  td.dataset.ph = ph;
  if (text) td.innerText = text;
  td.addEventListener('blur', saveData);
  return td;
}

function buildRow(data, idx) {
  const tr = document.createElement('tr');
  tr.dataset.row = idx;

  const statusTd = document.createElement('td');
  statusTd.appendChild(makeSelect(data.status || 'not-sent'));

  const liTd = document.createElement('td');
  liTd.className = 'li-td';
  liTd.dataset.liUrl = data.li_url || '';
  liTd.appendChild(makeLiSelect(data.linkedin || 'not-attempted'));
  if (data.li_url) {
    const a = document.createElement('a');
    a.href = data.li_url; a.target = '_blank'; a.rel = 'noopener noreferrer';
    a.textContent = '↗'; a.title = 'Open LinkedIn profile';
    a.style.cssText = 'color:#0a66c2;font-size:0.85rem;margin-left:6px;text-decoration:none;vertical-align:middle;';
    liTd.appendChild(a);
  }

  const delTd = document.createElement('td');
  const btn = document.createElement('button');
  btn.className = 'del-btn'; btn.title = 'Remove'; btn.textContent = '×';
  btn.onclick = () => { tr.remove(); saveData(); };
  delTd.appendChild(btn);

  tr.append(
    editable('col-name name',    'Name',            data.name),
    editable('col-county county','County',          data.county),
    editable('col-title title',  'Title',           data.title),
    editable('col-email email',  'email@county.gov',data.email),
    editable('col-phone phone',  '000-000-0000',    data.phone),
    statusTd,
    liTd,
    editable('col-notes notes',  'Notes…',          data.notes),
    delTd,
  );
  return tr;
}

function addRow() {
  const tbody = document.getElementById('tbody');
  const addTr = tbody.querySelector('.add-row-tr');
  const idx = tbody.querySelectorAll('tr[data-row]').length;
  const tr = buildRow({ name:'', county:'', title:'', email:'', phone:'', status:'not-sent', linkedin:'not-attempted', li_url:'', notes:'' }, idx);
  tbody.insertBefore(tr, addTr);
  tr.querySelector('.col-name').focus();
}

function exportCSV() {
  const rows = collectRows();
  const hdr = ['Name','County','Title','Email','Phone','Status','LinkedIn Status','LinkedIn URL','Notes'];
  const csv = [hdr, ...rows.map(r => [
    r.name, r.county, r.title, r.email, r.phone,
    STATUSES.find(s=>s.v===r.status)?.l || r.status,
    LI_STATUSES.find(s=>s.v===r.linkedin)?.l || r.linkedin,
    r.li_url || '',
    r.notes
  ])].map(row => row.map(v => `"${(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([csv], {type:'text/csv'})),
    download: 'colorado-county-outreach.csv'
  });
  a.click();
}

const rows = load();
const tbody = document.getElementById('tbody');
rows.forEach((r, i) => tbody.appendChild(buildRow(r, i)));

const addTr = document.createElement('tr');
addTr.className = 'add-row-tr';
const addTd = document.createElement('td');
addTd.colSpan = 9; addTd.className = 'add-row-cell';
const addBtn = document.createElement('button');
addBtn.className = 'add-row-btn'; addBtn.textContent = '+ Add row';
addBtn.onclick = addRow;
addTd.appendChild(addBtn);
addTr.appendChild(addTd);
tbody.appendChild(addTr);

renderStats(rows);
</script>
</body>
