<!DOCTYPE html>
<!-- consent-confirmed-v1.0 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consent Confirmed | AESOP AI Academy</title>
<link rel="stylesheet" href="/academy-theme.css">
<style>
  :root { --navy:#1a1a2e; --gold:#c9a05a; --cream:#faf8f4; --teal:#3dd6c0; --ink-muted:#718096; --border:#e2d9cc; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--cream); font-family:'DM Sans',Georgia,sans-serif; color:var(--navy); min-height:100vh; display:flex; flex-direction:column; }
  .top-nav { background:var(--navy); padding:14px 32px; }
  .top-nav .brand { color:var(--gold); font-family:'Playfair Display',serif; font-size:18px; font-weight:700; text-decoration:none; }
  .page-center { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 24px; }
  .card { background:white; border:1px solid var(--border); border-radius:10px; max-width:480px; width:100%; padding:44px 40px; box-shadow:0 4px 24px rgba(0,0,0,0.07); text-align:center; }
  .checkmark { font-size:56px; margin-bottom:16px; }
  h1 { font-family:'Playfair Display',serif; font-size:26px; font-weight:700; color:var(--navy); margin-bottom:10px; }
  p { font-size:15px; color:var(--ink-muted); line-height:1.7; margin-bottom:16px; }
  .child-name { color:var(--navy); font-weight:700; }
  .btn { display:inline-block; background:var(--teal); color:var(--navy); text-decoration:none; padding:14px 32px; border-radius:6px; font-size:15px; font-weight:700; margin-top:8px; }
  .btn:hover { opacity:0.85; }
  .note { font-size:13px; color:var(--ink-muted); margin-top:20px; line-height:1.5; }
  .note a { color:var(--gold); }
</style>
</head>
<body>
<nav class="top-nav">
  <a href="https://aesopacademy.org" class="brand">AESOP AI Academy</a>
</nav>
<div class="page-center">
  <div class="card">
    <div class="checkmark">✅</div>
    <h1>Consent confirmed!</h1>
    <p id="confirm-msg">Your child can now create their AESOP AI Academy account and begin learning.</p>
    <p>Have them visit the link below to sign up and start their first lesson.</p>
    <a href="/ai-academy/" class="btn">Enter AI Academy →</a>
    <p class="note">Questions about your child's data or account?<br>
    <a href="/parent-portal.html">Visit the Parent Portal</a> &nbsp;|&nbsp; <a href="/privacy.html">Privacy Notice</a></p>
  </div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const child = params.get('child');
  if (child) {
    document.getElementById('confirm-msg').innerHTML =
      '<span class="child-name">' + decodeURIComponent(child) + '</span> can now create their AESOP AI Academy account and begin learning.';
  }
</script>
</body>
</html>
