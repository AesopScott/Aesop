/* ─── AUTH OVERLAY ─────────────────────────────────────── */
.auth-overlay {
  position: fixed; inset: 0;
  background: rgba(15,23,42,0.97);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
}
.auth-box {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 12px; padding: 32px; width: 380px; max-width: 92vw;
  text-align: center; box-shadow: 0 12px 48px rgba(0,0,0,0.25);
}
.auth-logo { font-size: 36px; margin-bottom: 8px; }
.auth-box h2 { margin: 4px 0 6px; font-size: 20px; font-family: var(--heading); color: var(--navy); }
.auth-box p { color: var(--ink-muted); font-size: 13px; margin: 0 0 18px; }
.auth-input {
  width: 100%; padding: 10px 12px; margin: 6px 0;
  background: var(--cream); color: var(--ink);
  border: 1px solid var(--border); border-radius: 8px;
  font-size: 14px; font-family: var(--body);
}
.auth-input:focus { outline: none; border-color: var(--gold); }
.auth-btn {
  width: 100%; padding: 10px; margin-top: 10px;
  background: var(--gold); color: var(--white); border: 0;
  border-radius: 8px; font-weight: 600; cursor: pointer;
  font-size: 14px; font-family: var(--body);
  transition: filter 0.2s;
}
.auth-btn:hover { filter: brightness(1.08); }
.auth-error { color: #ef4444; font-size: 12px; min-height: 16px; margin-top: 8px; }
.auth-note { color: var(--ink-muted); font-size: 11px; margin-top: 14px; }

/* ─── DARK MODE AUTH ──────────────────────────────────── */
[data-theme="dark"] .auth-box { background: #1e293b; border-color: #334155; }
[data-theme="dark"] .auth-box h2 { color: #e2e8f0; }
[data-theme="dark"] .auth-box p { color: #94a3b8; }
[data-theme="dark"] .auth-input { background: #0f172a; color: #e2e8f0; border-color: #334155; }
[data-theme="dark"] .auth-input:focus { border-color: var(--gold); }
[data-theme="dark"] .auth-note { color: #64748b; }

/* ─── PAGE LAYOUT ─────────────────────────────────────── */
body { padding-top: 0; }
.dev-header {
  background: var(--navy); color: var(--cream);
  padding: 40px 24px 32px; text-align: center;
  border-bottom: 3px solid var(--gold);
}
.dev-header h1 {
  font-family: var(--heading); font-size: 2rem; margin: 0 0 6px;
  color: var(--gold-light);
}
.dev-header .subtitle {
  font-family: var(--body); font-size: 0.95rem; color: var(--cream);
  opacity: 0.8;
}
.dev-header .meta-bar {
  margin-top: 14px; display: flex; justify-content: center; align-items: center;
  gap: 16px; flex-wrap: wrap; font-size: 0.82rem; color: var(--cream); opacity: 0.65;
}
.dev-header .back-link {
  position: absolute; top: 16px; left: 20px;
  color: var(--gold-light); text-decoration: none; font-size: 0.85rem;
  font-family: var(--body);
}
.dev-header .back-link:hover { text-decoration: underline; }
.dev-header .sign-out-btn {
  position: absolute; top: 16px; right: 20px;
  background: transparent; border: 1px solid rgba(250,248,244,0.3);
  color: var(--cream); padding: 4px 12px; border-radius: 6px;
  cursor: pointer; font-size: 0.78rem; font-family: var(--body);
}
.dev-header .sign-out-btn:hover { border-color: var(--gold); color: var(--gold); }

.dev-stats {
  display: flex; justify-content: center; gap: 32px; flex-wrap: wrap;
  padding: 20px 24px; background: var(--cream);
  border-bottom: 1px solid var(--border);
}
.dev-stat {
  text-align: center; font-family: var(--body);
}
.dev-stat .num {
  font-size: 1.8rem; font-weight: 700; color: var(--navy);
  font-family: var(--heading);
}
.dev-stat .label {
  font-size: 0.75rem; color: var(--ink-muted); text-transform: uppercase;
  letter-spacing: 0.04em;
}

[data-theme="dark"] .dev-stats { background: #0f172a; border-color: #1e293b; }
[data-theme="dark"] .dev-stat .num { color: var(--gold-light); }
[data-theme="dark"] .dev-stat .label { color: #94a3b8; }

/* ─── TIMELINE ────────────────────────────────────────── */
.dev-container {
  max-width: 900px; margin: 0 auto; padding: 32px 24px 80px;
}
.day-block {
  margin-bottom: 36px;
}
.day-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
  cursor: pointer; user-select: none;
}
.day-header:hover .day-date { color: var(--gold); }
.day-dot {
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--gold); flex-shrink: 0;
}
.day-date {
  font-family: var(--heading); font-size: 1.25rem; font-weight: 600;
  color: var(--navy); transition: color 0.2s;
}
.day-count {
  font-family: var(--body); font-size: 0.78rem; color: var(--ink-muted);
  background: var(--cream); border: 1px solid var(--border);
  border-radius: 20px; padding: 2px 10px;
}
.day-chevron {
  margin-left: auto; font-size: 1.1rem; color: var(--ink-muted);
  transition: transform 0.25s;
}
.day-block.collapsed .day-chevron { transform: rotate(-90deg); }
.day-block.collapsed .day-items { display: none; }

[data-theme="dark"] .day-date { color: #e2e8f0; }
[data-theme="dark"] .day-count { background: #1e293b; border-color: #334155; color: #94a3b8; }

.day-items {
  list-style: none; padding: 0; margin: 0 0 0 6px;
  border-left: 2px solid var(--border-light);
}
.day-items li {
  position: relative; padding: 6px 0 6px 24px;
  font-family: var(--body); font-size: 0.92rem; color: var(--ink);
  line-height: 1.45;
}
.day-items li::before {
  content: '';
  position: absolute; left: -5px; top: 14px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--cream); border: 2px solid var(--border);
}
.day-items li:hover::before { border-color: var(--gold); background: var(--gold-pale); }

[data-theme="dark"] .day-items { border-left-color: #334155; }
[data-theme="dark"] .day-items li { color: #cbd5e1; }
[data-theme="dark"] .day-items li::before { background: #1e293b; border-color: #475569; }
[data-theme="dark"] .day-items li:hover::before { border-color: var(--gold); background: #2a2000; }

/* ─── CATEGORY TAGS ───────────────────────────────────── */
.tag {
  display: inline-block; font-size: 0.68rem; font-weight: 600;
  padding: 1px 7px; border-radius: 4px; margin-right: 6px;
  vertical-align: middle; text-transform: uppercase;

.tag-fix { background: #fef2f2; color: #dc2626; }
.tag-feat { background: #f0fdf4; color: #16a34a; }

.tag-marketing { background: #fdf4ff; color: #a855f7; }

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyAPLGIn4wqgTL92VZFXuu8-ZgxMBBT2eKY",
    authDomain:        "playagame-f733d.firebaseapp.com",
    projectId:         "playagame-f733d",
    storageBucket:     "playagame-f733d.firebasestorage.app",
    messagingSenderId: "610508714644",
    appId:             "1:610508714644:web:b7df8f61ce21cf1281ba81"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const ADMIN_EMAILS = ['scott@aesopacademy.org'];
  const isAdmin = u => u && (ADMIN_EMAILS.length === 0 || ADMIN_EMAILS.includes(u.email));

  const overlay = document.getElementById('auth-overlay');
  const appEl   = document.getElementById('app');
  const errEl   = document.getElementById('auth-error');

  document.getElementById('auth-btn').addEventListener('click', doSignIn);
  document.getElementById('auth-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doSignIn(); });
  document.getElementById('auth-email').addEventListener('keydown', e => { if (e.key === 'Enter') doSignIn(); });
  document.getElementById('signOutBtn').addEventListener('click', () => signOut(auth));

  async function doSignIn() {
    errEl.textContent = '';
    const email = document.getElementById('auth-email').value.trim();
    const pass  = document.getElementById('auth-pass').value;
    if (!email || !pass) { errEl.textContent = 'Email and password required.'; return; }
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch (e) {
      errEl.textContent = (e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found')
        ? 'Invalid email or password.' : (e.message || 'Sign in failed.');
    }
  }

  onAuthStateChanged(auth, user => {
    if (user && isAdmin(user)) {
      overlay.style.display = 'none';
      appEl.style.display = 'block';
      document.getElementById('userLabel').textContent = user.email || 'Signed in';
      renderTimeline();
    } else if (user && !isAdmin(user)) {
      overlay.style.display = 'flex';
      appEl.style.display = 'none';
      errEl.textContent = 'This account does not have admin access.';
    } else {
      overlay.style.display = 'flex';
      appEl.style.display = 'none';
    }
  });
</script>

/* ─── AUTO-CATEGORIZE ENTRIES ─────────────────────────── */
const CATEGORIES = [
  { tag: 'fix',       label: 'FIX',       patterns: /\bfix(ed|es|ing)?\b|bug|broken|corrupt|cleanup|cleared|restored|reverted|correction/i },
  { tag: 'infra',     label: 'INFRA',     patterns: /\bgit\b|lock|index|rebase|sync|scheduled|deploy|migration|migrated|sandbox|proxy|hooks?|repo\b/i },
  { tag: 'feat',      label: 'FEAT',      patterns: /\b(build|built|created|added|activated|implemented|new)\b|mobile site|dashboard|fallback|tracker/i },
  { tag: 'content',   label: 'CONTENT',   patterns: /\btranslat|i18n|multilingual|spanish|arabic|hindi|module|course|foundations|pregunta|lesson|guiding question/i },
  { tag: 'marketing', label: 'MARKETING', patterns: /\blinkedin|facebook|instagram|youtube|tiktok|social media|investor|outreach|GTM|distribution/i },
  { tag: 'ops',       label: 'OPS',       patterns: /\baudit|style|sitemap|SEO|registry|filename|standardiz|directive|preferences|path correction/i },
];

function categorize(text) {
  for (const cat of CATEGORIES) {
    if (cat.patterns.test(text)) return cat;
  }
  return null;
}

/* ─── RENDER ──────────────────────────────────────────── */
function renderTimeline() {
  const container = document.getElementById('timeline');
  const dates = Object.keys(DEV_LOG).sort().reverse();
  let totalEntries = 0, totalFixes = 0, totalFeatures = 0;

  let html = '';
  for (const date of dates) {
    const items = DEV_LOG[date];
    totalEntries += items.length;

    const d = new Date(date + 'T12:00:00');
    const dayName = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

    let listHtml = '';
    for (const item of items) {
      const cat = categorize(item);
      const tagHtml = cat ? `<span class="tag tag-${cat.tag}">${cat.label}</span>` : '';
      if (cat && cat.tag === 'fix') totalFixes++;
      if (cat && cat.tag === 'feat') totalFeatures++;
      listHtml += `<li>${tagHtml}${escHtml(item)}</li>\n`;
    }

    html += `
      <div class="day-block">
        <div class="day-header" onclick="this.parentElement.classList.toggle('collapsed')">
          <div class="day-dot"></div>
          <div class="day-date">${dayName}</div>
          <div class="day-count">${items.length} item${items.length !== 1 ? 's' : ''}</div>
          <div class="day-chevron">▾</div>
        </div>
        <ul class="day-items">${listHtml}</ul>
      </div>`;
  }

  container.innerHTML = html;

  document.getElementById('statDays').textContent = dates.length;
  document.getElementById('statEntries').textContent = totalEntries;
  document.getElementById('statFixes').textContent = totalFixes;
  document.getElementById('statFeatures').textContent = totalFeatures;
  document.getElementById('totalDays').textContent = dates.length + ' days tracked';
  document.getElementById('totalEntries').textContent = totalEntries + ' entries';
