<!DOCTYPE html>
<!-- v1.0.3 | 2026-04-21 -->
<!-- LinkedIn Group cover image template — Free AI Education
     Renders a pixel-perfect 1536×768 cover. Open in a browser and click
     "Download PNG" for the exact-dimensions export. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Free AI Education — LinkedIn Group Cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root { --navy:#0d1b2a; --navy-2:#152a3f; --gold:#c9a05a; --gold-soft:rgba(201,160,90,0.6); }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 2rem; background: #1a2332; color: #e8e3db; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }
  header { max-width: 1600px; margin: 0 auto 1.5rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
  h1 { font-size: 1rem; margin: 0; font-weight: 600; color: #fff; letter-spacing: 0.04em; }
  .hint { font-size: 0.82rem; color: rgba(255,255,255,0.55); margin-left: 0.5rem; }
  button {
    background: var(--gold); color: var(--navy); border: 0;
    padding: 0.7rem 1.3rem; font-weight: 800; border-radius: 6px;
    cursor: pointer; font-size: 0.85rem; letter-spacing: 0.04em;
    font-family: inherit; transition: background 0.15s;
  }
  button:hover { background: #d4b47a; }
  button:active { transform: translateY(1px); }
  button.secondary { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
  button.secondary:hover { background: rgba(255,255,255,0.14); }
  .preview-wrap {
    max-width: 1536px; margin: 0 auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    border-radius: 4px; overflow: hidden;
  }
  /* ─── THE COVER ITSELF — 1536 × 768 (LinkedIn group header spec) ─── */
  .cover {
    width: 1536px; height: 768px;
    background:
      radial-gradient(ellipse 70% 55% at 50% 40%, rgba(201,160,90,0.12) 0%, transparent 60%),
      linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 55%, var(--navy) 100%);
    position: relative; overflow: hidden;
    color: #fff;
  }
  .eyebrow {
    position: absolute; left: 50%; top: 200px; transform: translateX(-50%);
    font-family: system-ui, sans-serif; font-size: 14px;
    color: var(--gold-soft); letter-spacing: 0.35em; text-transform: uppercase;
    white-space: nowrap;
  }
  .rule { position: absolute; left: 50%; transform: translateX(-50%);
          width: 120px; height: 2px; background: var(--gold); }
  .rule-top { top: 240px; }
  .rule-bot { bottom: 210px; }
  .title {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    font-family: 'Cinzel', Georgia, serif;
    font-weight: 900; font-size: 140px; line-height: 0.95;
    color: #fff; letter-spacing: 0.06em; text-align: center;
    text-shadow: 0 4px 40px rgba(0,0,0,0.4);
    margin: 0;
  }
  .subtitle {
    position: absolute; left: 50%; bottom: 238px; transform: translateX(-50%);
    font-family: 'Crimson Pro', Georgia, serif; font-style: italic;
    font-size: 34px; color: var(--gold);
    letter-spacing: 0.02em; white-space: nowrap;
  }
  .attribution {
    position: absolute; right: 40px; bottom: 28px;
    font-family: system-ui, sans-serif; font-size: 13px;
    color: rgba(255,255,255,0.38); letter-spacing: 0.08em;
  }
  /* Safe-zone guide overlay (toggleable) */
  .cover.show-guides::after {
    content: '';
    position: absolute; inset: 0;
    pointer-events: none;
    background:
      /* safe zone = central box avoiding LinkedIn's overlays */
      linear-gradient(to right,
        rgba(255,80,80,0.08) 0 180px,
        transparent 180px calc(100% - 180px),
        rgba(255,80,80,0.08) calc(100% - 180px) 100%);
    outline: 2px dashed rgba(255,80,80,0.4);
    outline-offset: -180px;
  }
</style>
</head>
<body>

<header>
  <h1>Free AI Education — LinkedIn Group Cover (1536 × 768)</h1>
  <button onclick="downloadPNG()">⬇ Download PNG</button>
  <button class="secondary" onclick="toggleGuides()">Toggle safe-zone guides</button>
  <span class="hint">Open at 100% zoom. Click Download PNG for the exact-dimensions export.</span>
</header>

<div class="preview-wrap">
  <div class="cover" id="cover">
    <div class="eyebrow">A Community Hosted by AESOP AI Academy</div>
    <div class="rule rule-top"></div>
    <h2 class="title">FREE AI<br>EDUCATION</h2>
    <div class="rule rule-bot"></div>
    <div class="subtitle">AI literacy belongs to everyone.</div>
    <div class="attribution">aesopacademy.org</div>
  </div>
</div>

<script>
function toggleGuides() {
  document.getElementById('cover').classList.toggle('show-guides');
}

/**
 * Render the cover directly to a canvas at exact 1536×768 and download as PNG.
 * Re-draws the design in canvas (not html2canvas) so fonts, gradients, and
 * positions are pixel-perfect and identical across browsers.
 */
async function downloadPNG() {
  // Make sure web fonts are loaded before we rasterize
  await document.fonts.ready;

  const W = 1536, H = 768;
  const canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');

  // ─── background: dark navy gradient ────────────────────────────────
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#0d1b2a');
  bg.addColorStop(0.55, '#152a3f');
  bg.addColorStop(1, '#0d1b2a');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // ─── radial gold glow ─────────────────────────────────────────────
  const glow = ctx.createRadialGradient(W / 2, H * 0.4, 40, W / 2, H * 0.4, 640);
  glow.addColorStop(0, 'rgba(201,160,90,0.14)');
  glow.addColorStop(1, 'rgba(201,160,90,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  // ─── eyebrow (tracked uppercase) ──────────────────────────────────
  ctx.fillStyle = 'rgba(201,160,90,0.65)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = '500 14px system-ui, -apple-system, sans-serif';
  drawTrackedText(ctx, 'A COMMUNITY HOSTED BY AESOP AI ACADEMY', W / 2, 200, 4.9);

  // ─── top rule ─────────────────────────────────────────────────────
  ctx.fillStyle = '#c9a05a';
  ctx.fillRect(W / 2 - 60, 240, 120, 2);

  // ─── title (two-line, heavy serif) ────────────────────────────────
  ctx.fillStyle = '#ffffff';
  ctx.font = '900 140px "Cinzel", Georgia, serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 40;
  ctx.shadowOffsetY = 4;
  drawTrackedText(ctx, 'FREE AI', W / 2, 340, 8.4);
  drawTrackedText(ctx, 'EDUCATION', W / 2, 480, 8.4);
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;

  // ─── bottom rule ──────────────────────────────────────────────────
  ctx.fillStyle = '#c9a05a';
  ctx.fillRect(W / 2 - 60, 558, 120, 2);

  // ─── subtitle (italic serif gold) ─────────────────────────────────
  ctx.fillStyle = '#c9a05a';
  ctx.font = 'italic 400 34px "Crimson Pro", Georgia, serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('AI literacy belongs to everyone.', W / 2, 608);

  // ─── attribution (bottom-right) ───────────────────────────────────
  ctx.fillStyle = 'rgba(255,255,255,0.38)';
  ctx.font = '13px system-ui, -apple-system, sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'alphabetic';
  drawTrackedText(ctx, 'aesopacademy.org', W - 40, H - 28, 1.0, 'right');

  // ─── trigger download ─────────────────────────────────────────────
  canvas.toBlob(function (blob) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'free-ai-education-cover-1536x768.png';
    document.body.appendChild(a);
    a.click();
    setTimeout(function () {
      URL.revokeObjectURL(url);
      a.remove();
    }, 1000);
  }, 'image/png', 1.0);
}

/**
 * Canvas 2D doesn't support CSS letter-spacing natively in all browsers.
 * This draws text with a fixed extra-tracking value per character so the
 * PNG export visually matches the CSS preview.
 */
function drawTrackedText(ctx, text, cx, cy, trackingPx, align) {
  align = align || 'center';
  const chars = text.split('');
  const widths = chars.map(function (c) { return ctx.measureText(c).width; });
  const totalWidth =
    widths.reduce(function (a, b) { return a + b; }, 0) +
    trackingPx * (chars.length - 1);

  let x = align === 'right' ? cx - totalWidth : cx - totalWidth / 2;
  ctx.textAlign = 'left';
  chars.forEach(function (c, i) {
    ctx.fillText(c, x, cy);
    x += widths[i] + trackingPx;
  });
  ctx.textAlign = align;
}
</script>
<script src="/assets/top-banner.js"></script>
</body>
</html>
