<!DOCTYPE html>
<!-- v1.0.0 | 2026-04-14 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIP Draft Review — AESOP AI Academy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --teal: #1A7A6E;
    --teal-light: #23a090;
    --gold: #C8950A;
    --gold-dim: #7A5800;
    --bg: #0a0f0e;
    --surface: #111918;
    --surface2: #182220;
    --border: #1e2e2b;
    --text: #d4e8e5;
    --muted: #5a7a76;
    --pending: #C8950A;
    --approved: #1A7A6E;
    --rejected: #7a3030;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 160px;
  }

  /* ── HEADER ── */
  header {
    border-bottom: 2px solid var(--border);
    padding: 48px 80px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .logo-mark {
    width: 72px; height: 72px;
    background: var(--teal);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 26px;
    font-weight: 500;
    color: #fff;
    letter-spacing: -2px;
  }

  .logo-text {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .logo-sub {
    font-size: 22px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-top: 2px;
  }

  .header-meta {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    color: var(--muted);
    text-align: right;
  }

  .pulse-dot {
    display: inline-block;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--teal-light);
    margin-right: 12px;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── MAIN ── */
  main {
    max-width: 1800px;
    margin: 0 auto;
    padding: 96px 80px 0;
  }

  .page-title {
    font-size: 64px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 12px;
  }

  .page-sub {
    font-size: 28px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 80px;
  }

  /* ── FILTERS ── */
  .filters {
    display: flex;
    gap: 16px;
    margin-bottom: 64px;
  }

  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 12px 28px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn.active,
  .filter-btn:hover {
    border-color: var(--teal);
    color: var(--teal-light);
  }

  /* ── EMPTY / LOADING STATE ── */
  .state-msg {
    font-family: 'DM Mono', monospace;
    font-size: 26px;
    color: var(--muted);
    padding: 120px 0;
    text-align: center;
  }

  .state-msg span { color: var(--teal); }

  /* ── DRAFT CARD ── */
  .draft-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 24px;
    padding: 56px 64px;
    margin-bottom: 32px;
    transition: border-color 0.2s;
    animation: fadeIn 0.3s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .draft-card:hover { border-color: #2a4040; }

  .draft-card.approved { border-left: 6px solid var(--teal); }
  .draft-card.rejected { border-left: 6px solid var(--rejected); opacity: 0.6; }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 40px;
    margin-bottom: 32px;
  }

  .card-title {
    font-size: 40px;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
  }

  .card-id {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    color: var(--muted);
    margin-top: 8px;
  }

  .card-date {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .card-synopsis {
    font-size: 28px;
    color: #8ab0ac;
    line-height: 1.65;
    margin-bottom: 40px;
  }

  .modules-label {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .modules-list {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 48px;
  }

  .module-tag {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    padding: 8px 20px;
    border-radius: 8px;
    background: var(--surface2);
    border: 2px solid var(--border);
    color: var(--teal-light);
    counter-increment: module;
  }

  .module-tag::before {
    content: counter(module, decimal-leading-zero) "  ";
    color: var(--muted);
  }

  .card-actions {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .btn-approve, .btn-reject {
    font-family: 'DM Mono', monospace;
    font-size: 24px;
    font-weight: 500;
    padding: 16px 40px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }

  .btn-approve {
    background: var(--teal);
    color: #fff;
  }

  .btn-approve:hover { background: var(--teal-light); }

  .btn-reject {
    background: transparent;
    border: 2px solid #3a2020;
    color: #a05050;
  }

  .btn-reject:hover { border-color: #7a3030; color: #c07070; }

  .status-badge {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    padding: 8px 20px;
    border-radius: 8px;
    font-weight: 500;
    letter-spacing: 0.05em;
  }

  .status-badge.pending  { background: #2a1f00; color: var(--gold); border: 2px solid #3a2a00; }
  .status-badge.approved { background: #0a1f1a; color: var(--teal-light); border: 2px solid #1a3a30; }
  .status-badge.rejected { background: #1f0a0a; color: #a05050; border: 2px solid #3a1a1a; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 64px;
    left: 50%;
    transform: translateX(-50%) translateY(40px);
    background: var(--surface);
    border: 2px solid var(--teal);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 24px;
    padding: 24px 48px;
    border-radius: 16px;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    z-index: 999;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    gap: 64px;
    margin-bottom: 64px;
    padding: 32px 48px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 16px;
    font-family: 'DM Mono', monospace;
  }

  .stat { display: flex; flex-direction: column; gap: 6px; }
  .stat-num { font-size: 44px; font-weight: 500; color: #fff; }
  .stat-label { font-size: 20px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }

  .stat-num.pending  { color: var(--gold); }
  .stat-num.approved { color: var(--teal-light); }
  .stat-num.rejected { color: #a05050; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">AIP</div>
    <div>
      <div class="logo-text">AESOP AI Academy</div>
      <div class="logo-sub">Intelligence Pipeline — Draft Review</div>
    </div>
  </div>
  <div class="header-meta">
    <div><span class="pulse-dot"></span>Research Agent Active</div>
    <div style="margin-top:8px">Runs every Monday · 9:00 UTC</div>
  </div>
</header>

<main>
  <div class="page-title">Course Proposals</div>
  <div class="page-sub" id="subtitle">Loading drafts from repo…</div>

  <div class="stats-bar">
    <div class="stat"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total</div></div>
    <div class="stat"><div class="stat-num pending" id="stat-pending">—</div><div class="stat-label">Pending</div></div>
    <div class="stat"><div class="stat-num approved" id="stat-approved">—</div><div class="stat-label">Approved</div></div>
    <div class="stat"><div class="stat-num rejected" id="stat-rejected">—</div><div class="stat-label">Rejected</div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
    <button class="filter-btn" onclick="setFilter('approved', this)">Approved</button>
    <button class="filter-btn" onclick="setFilter('rejected', this)">Rejected</button>
  </div>

  <div id="drafts-container">
    <div class="state-msg">Fetching proposals…</div>
  </div>
</main>

<div id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const REPO_OWNER  = 'AesopScott';
const REPO_NAME   = 'Aesop';
const DRAFTS_PATH = 'aip/drafts';
// GitHub PAT — only needed for write operations (approve/reject)
// Reads use site-local index.json (no API needed)
let GH_TOKEN = sessionStorage.getItem('aip_gh_token') || '';

// ── STATE ─────────────────────────────────────────────────────────────────────
let allDrafts = [];
let currentFilter = 'all';
let moduleCounter = 0;

// ── INIT ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  await loadDrafts();
});

// ── LOAD DRAFTS ───────────────────────────────────────────────────────────────
async function loadDrafts() {
  const container = document.getElementById('drafts-container');

  try {
    // Load from site-local index (no GitHub API needed for reads)
    const indexRes = await fetch(`../${DRAFTS_PATH}/index.json`);
    if (!indexRes.ok) throw new Error(`Could not load draft index (${indexRes.status})`);
    const fileList = await indexRes.json();

    const jsonFiles = fileList.filter(f => f.endsWith('.json') && f !== 'index.json');
    if (jsonFiles.length === 0) {
      container.innerHTML = '<div class="state-msg">No drafts yet. The agent runs every Monday.</div>';
      updateSubtitle(0);
      updateStats();
      return;
    }

    // Fetch each draft JSON from the site directly
    const drafts = await Promise.all(jsonFiles.map(async f => {
      const res = await fetch(`../${DRAFTS_PATH}/${f}`);
      const data = await res.json();
      data._filename = f;
      data._sha = '';  // SHA fetched on-demand for write operations
      return data;
    }));

    // Sort: pending first, then by date desc
    drafts.sort((a, b) => {
      if (a.status === 'pending' && b.status !== 'pending') return -1;
      if (a.status !== 'pending' && b.status === 'pending') return 1;
      return b.generated.localeCompare(a.generated);
    });

    allDrafts = drafts;
    updateSubtitle(drafts.length);
    updateStats();
    renderDrafts();

  } catch (err) {
    container.innerHTML = `<div class="state-msg">Error loading drafts: <span>${err.message}</span></div>`;
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderDrafts() {
  const container = document.getElementById('drafts-container');
  const filtered = allDrafts.filter(d => currentFilter === 'all' || d.status === currentFilter);

  if (filtered.length === 0) {
    container.innerHTML = `<div class="state-msg">No <span>${currentFilter}</span> drafts.</div>`;
    return;
  }

  container.style.counterReset = 'module';
  container.innerHTML = filtered.map((d, i) => renderCard(d, i)).join('');
}

function renderCard(draft, idx) {
  const isPending  = draft.status === 'pending';
  const isApproved = draft.status === 'approved';

  const modules = (draft.modules || []).map((m, i) =>
    `<div class="module-tag">${escHtml(m)}</div>`
  ).join('');

  const actions = isPending ? `
    <button class="btn-approve" onclick="setStatus('${draft._filename}', 'approved')">✓ Approve</button>
    <button class="btn-reject"  onclick="setStatus('${draft._filename}', 'rejected')">✗ Reject</button>
  ` : `<span class="status-badge ${draft.status}">${draft.status.toUpperCase()}</span>`;

  return `
    <div class="draft-card ${draft.status}" id="card-${draft._filename}" style="animation-delay:${idx * 0.05}s">
      <div class="card-top">
        <div>
          <div class="card-title">${escHtml(draft.title || 'Untitled')}</div>
          <div class="card-id">${escHtml(draft.id || '')}</div>
        </div>
        <div class="card-date">${escHtml(draft.generated || '')}</div>
      </div>
      <div class="card-synopsis">${escHtml(draft.synopsis || '')}</div>
      <div class="modules-label">Modules</div>
      <div class="modules-list" style="counter-reset:module">${modules}</div>
      <div class="card-actions">${actions}</div>
    </div>
  `;
}

// ── APPROVE / REJECT ──────────────────────────────────────────────────────────
async function setStatus(filename, newStatus) {
  const draft = allDrafts.find(d => d._filename === filename);
  if (!draft) return;

  // Prompt for PAT if not yet provided (needed for writes)
  if (!GH_TOKEN) {
    GH_TOKEN = prompt('Enter GitHub PAT to approve/reject courses:');
    if (!GH_TOKEN) { showToast('Action cancelled — PAT required.'); return; }
    sessionStorage.setItem('aip_gh_token', GH_TOKEN);
  }

  draft.status = newStatus;

  try {
    // Fetch current SHA from API (needed for write operations)
    if (!draft._sha) {
      const metaRes = await ghFetch(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DRAFTS_PATH}/${filename}`);
      if (!metaRes.ok) throw new Error(`Could not fetch file SHA: ${metaRes.status}`);
      const meta = await metaRes.json();
      draft._sha = meta.sha;
    }

    // Update the JSON file in the repo
    const updated = { ...draft };
    delete updated._filename;
    delete updated._sha;

    const content = btoa(unescape(encodeURIComponent(JSON.stringify(updated, null, 2))));

    const res = await ghFetch(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DRAFTS_PATH}/${filename}`, {
      method: 'PUT',
      body: JSON.stringify({
        message: `AIP: ${newStatus} "${draft.title}"`,
        content,
        sha: draft._sha,
      })
    });

    if (!res.ok) throw new Error(`GitHub write failed: ${res.status}`);

    const data = await res.json();
    draft._sha = data.content.sha; // update SHA for future writes

    updateStats();
    renderDrafts();
    showToast(`"${draft.title}" marked as ${newStatus}.`);

  } catch (err) {
    showToast(`Error: ${err.message}`);
    draft.status = 'pending'; // rollback
  }
}

// ── FILTER ────────────────────────────────────────────────────────────────────
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderDrafts();
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function updateStats() {
  const total    = allDrafts.length;
  const pending  = allDrafts.filter(d => d.status === 'pending').length;
  const approved = allDrafts.filter(d => d.status === 'approved').length;
  const rejected = allDrafts.filter(d => d.status === 'rejected').length;

  document.getElementById('stat-total').textContent    = total;
  document.getElementById('stat-pending').textContent  = pending;
  document.getElementById('stat-approved').textContent = approved;
  document.getElementById('stat-rejected').textContent = rejected;
}

function updateSubtitle(count) {
  document.getElementById('subtitle').textContent =
    count === 0 ? 'No proposals yet' : `${count} proposal${count !== 1 ? 's' : ''} in queue`;
}

// ── GITHUB FETCH ──────────────────────────────────────────────────────────────
function ghFetch(path, opts = {}) {
  const headers = {
    'Accept': 'application/vnd.github+json',
    'Content-Type': 'application/json',
    ...(opts.headers || {})
  };
  if (GH_TOKEN) headers['Authorization'] = `Bearer ${GH_TOKEN}`;
  return fetch(`https://api.github.com${path}`, { ...opts, headers });
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>
</body>
</html>
