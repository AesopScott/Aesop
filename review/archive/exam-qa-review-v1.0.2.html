<!DOCTYPE html>
<!-- v1.0.2 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AESOP Exam QA Review — v1.0.2</title>
<link rel="stylesheet" href="/academy-theme.css">
<style>
:root {
  --bg:#f7f5f0; --bg2:#ffffff; --bg3:#eeeae3;
  --text:#1a1a2e; --muted:#718096; --border:#e0d9cf;
  --navy:#1a1a2e; --gold:#c9a05a; --teal:#2ba898;
  --green:#2d8a5e; --red:#c0384f; --amber:#d97706;
  --shadow:0 2px 10px rgba(26,26,46,.08);
  --shadow-lg:0 8px 30px rgba(26,26,46,.14);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:clamp(13px,.9vw + .3rem,16px)}
body{background:var(--bg);color:var(--text);font-family:'DM Sans','Segoe UI',sans-serif;min-height:100vh}

/* ── HEADER ── */
.qa-header{background:var(--navy);border-bottom:3px solid var(--gold);padding:.7rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100}
.qa-header a{color:var(--gold);text-decoration:none;font-size:.8rem;letter-spacing:.05em}
.qa-title{color:#fff;font-size:1.05rem;font-weight:700}
.qa-badge{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);font-size:.7rem;padding:.15rem .55rem;border-radius:4px;letter-spacing:.05em}
.qa-header-right{margin-left:auto;display:flex;align-items:center;gap:.8rem}
.fb-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);display:inline-block;margin-right:.3rem;transition:background .3s}
.fb-dot.ok{background:var(--green)} .fb-dot.saving{background:var(--amber)}
#fb-label{font-size:.75rem;color:rgba(255,255,255,.5)}

/* ── BUTTONS ── */
.btn{border:none;border-radius:7px;padding:.55rem 1.2rem;font-size:.85rem;font-weight:700;cursor:pointer;transition:filter .15s;font-family:inherit;display:inline-flex;align-items:center;gap:.4rem}
.btn:hover{filter:brightness(1.08)}
.btn:disabled{opacity:.45;cursor:default;filter:none}
.btn-navy{background:var(--navy);color:#fff}
.btn-teal{background:var(--teal);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-amber{background:var(--amber);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--border);filter:none}
.btn-sm{padding:.3rem .75rem;font-size:.76rem}

/* ── SESSION START ── */
.start-screen{max-width:600px;margin:3rem auto;padding:0 1.5rem}
.start-screen h1{font-size:1.8rem;color:var(--navy);margin-bottom:.35rem}
.start-screen > p{color:var(--muted);margin-bottom:1.8rem;line-height:1.6;font-size:.9rem}
.session-list{display:flex;flex-direction:column;gap:.7rem;margin-bottom:1.5rem}
.session-item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1rem 1.2rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:box-shadow .15s,transform .1s}
.session-item:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.session-item.active{border-color:var(--teal);border-left:4px solid var(--teal)}
.si-left h3{font-size:.92rem;margin-bottom:.15rem}
.si-left p{font-size:.76rem;color:var(--muted)}
.si-right{text-align:right;font-size:.78rem;color:var(--muted)}
.si-right strong{display:block;font-size:1.05rem;color:var(--text)}
.start-new-btn{width:100%;padding:.75rem;font-size:.9rem}
.info-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:.9rem 1.1rem;margin-bottom:1rem;font-size:.82rem;color:var(--text);line-height:1.6}
.info-box strong{color:var(--navy)}

/* ── REVIEW LAYOUT ── */
.review-layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 52px)}

/* Sidebar */
.r-sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:1rem 0;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;display:flex;flex-direction:column}
.rsb-label{font-size:.67rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:.5rem 1rem;margin-top:.5rem}
.rsb-row{display:flex;justify-content:space-between;padding:.3rem 1rem;font-size:.8rem}
.rsb-row span:last-child{font-weight:700}
.rsb-prog{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin:.15rem 1rem .7rem}
.rsb-prog-fill{height:100%;background:var(--teal);border-radius:2px;transition:width .4s}
.rsb-mod-row{display:flex;align-items:center;gap:.4rem;padding:.25rem 1rem;font-size:.76rem;color:var(--muted)}
.rsb-mod-label{min-width:28px;font-weight:700;color:var(--text)}
.rsb-mod-bar{flex:1;height:3px;background:var(--border);border-radius:1px;overflow:hidden}
.rsb-mod-bar-fill{height:100%;background:var(--teal)}
.rsb-mod-count{min-width:36px;text-align:right}
.rsb-bottom{margin-top:auto;padding:.8rem;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:.4rem}
.rsb-session-name{font-size:.88rem;font-weight:700;color:var(--navy)}
.rsb-session-sub{font-size:.72rem;color:var(--muted)}

/* Main */
.r-main{padding:1.5rem 2rem;max-width:800px}

/* Progress bar */
.prog-wrap{margin-bottom:1.2rem}
.prog-row{display:flex;justify-content:space-between;font-size:.76rem;color:var(--muted);margin-bottom:.3rem}
.prog-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--teal);border-radius:3px;transition:width .4s}

/* Question card */
.q-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1rem;transition:border-color .2s}
.q-card.edited{border-color:var(--amber)}
.q-card.flagged-card{border-color:var(--amber)}
.q-card.approved-card{border-color:var(--green)}

.q-card-hdr{background:var(--bg3);border-bottom:1px solid var(--border);padding:.55rem 1rem;display:flex;align-items:center;gap:.6rem}
.q-idx{font-size:.7rem;font-weight:700;color:var(--muted);min-width:56px}
.q-mod-tag{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:.15rem .5rem;border-radius:4px;color:#fff}
.q-tier-hint{font-size:.67rem;color:var(--muted);margin-left:.2rem}
.q-status{margin-left:auto;font-size:.68rem;font-weight:700;padding:.15rem .55rem;border-radius:12px;border:1px solid}
.q-status.st-new      {background:var(--bg3);color:var(--muted);border-color:var(--border)}
.q-status.st-edited   {background:color-mix(in srgb,var(--amber) 12%,white);color:var(--amber);border-color:var(--amber)}
.q-status.st-flagged  {background:color-mix(in srgb,var(--amber) 12%,white);color:var(--amber);border-color:var(--amber)}
.q-status.st-approved {background:color-mix(in srgb,var(--green) 12%,white);color:var(--green);border-color:var(--green)}

.q-card-body{padding:1.1rem}
.field-label{font-size:.67rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;margin-bottom:.3rem}

.q-text-edit{width:100%;font-size:.93rem;color:var(--text);font-weight:600;line-height:1.55;background:var(--bg);border:1.5px solid var(--border);border-radius:7px;padding:.6rem .8rem;font-family:inherit;resize:vertical;min-height:58px;outline:none;transition:border-color .15s}
.q-text-edit:focus{border-color:var(--teal)}

.opts-wrap{display:flex;flex-direction:column;gap:.4rem;margin-top:.9rem}
.opt-row{display:flex;align-items:center;gap:.45rem}
.opt-letter{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;color:var(--muted);flex-shrink:0;cursor:pointer;transition:all .15s;user-select:none}
.opt-letter.is-correct{background:var(--green);border-color:var(--green);color:#fff}
.opt-row.correct-opt .opt-input{background:color-mix(in srgb,var(--green) 6%,white);border-color:color-mix(in srgb,var(--green) 40%,white)}
.opt-input{flex:1;font-size:.86rem;color:var(--text);background:var(--bg);border:1.5px solid var(--border);border-radius:6px;padding:.38rem .62rem;font-family:inherit;outline:none;transition:border-color .15s}
.opt-input:focus{border-color:var(--teal)}
.opt-hint{font-size:.68rem;color:var(--muted);margin-top:.4rem;font-style:italic}

/* Flag note */
.flag-note-wrap{padding:.7rem 1.1rem;border-top:1px solid var(--border);background:color-mix(in srgb,var(--amber) 6%,white);display:none}
.flag-note-wrap.visible{display:block}
.flag-note-input{width:100%;font-size:.82rem;color:var(--text);background:var(--bg2);border:1px solid var(--amber);border-radius:6px;padding:.45rem .65rem;font-family:inherit;resize:vertical;min-height:44px;outline:none}

/* Action bar */
.q-actions{display:flex;align-items:center;gap:.5rem;padding:.8rem 1.1rem;border-top:1px solid var(--border);background:var(--bg3);flex-wrap:wrap}
.qa-left{display:flex;gap:.4rem;flex:1;flex-wrap:wrap;align-items:center}
.qa-right{display:flex;gap:.4rem}
.edit-badge{font-size:.72rem;color:var(--amber);font-style:italic}

/* Toast */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--navy);color:#fff;padding:.55rem 1.1rem;border-radius:8px;font-size:.83rem;font-weight:600;box-shadow:var(--shadow-lg);transform:translateY(80px);opacity:0;transition:transform .25s,opacity .25s;z-index:9999}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:var(--green)} .toast.warn{background:var(--amber)} .toast.err{background:var(--red)}

/* Complete screen */
.complete-screen{max-width:600px;margin:0 auto;padding:2rem 1.5rem;text-align:center}
.complete-icon{font-size:3rem;margin-bottom:.8rem}
.complete-title{font-size:1.6rem;font-weight:800;color:var(--navy);margin-bottom:.4rem}
.complete-sub{color:var(--muted);margin-bottom:1.5rem;font-size:.9rem}
.complete-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem;margin-bottom:1.5rem}
.cs-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:.75rem}
.cs-num{font-size:1.5rem;font-weight:800}
.cs-lbl{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}

/* ── AUTH GATE ── */
.auth-overlay {
  position:fixed; inset:0; z-index:9999;
  background:var(--bg); display:flex; align-items:center; justify-content:center;
}
.auth-box {
  background:var(--bg2); border:1px solid var(--border); border-radius:14px;
  padding:2.5rem 2.8rem; max-width:420px; width:92%; text-align:center;
  box-shadow:var(--shadow-lg);
}
.auth-box h2 { font-size:1.3rem; color:var(--navy); margin-bottom:.3rem; font-family:'DM Sans',sans-serif; }
.auth-box p  { font-size:.83rem; color:var(--muted); margin-bottom:1.4rem; }
.auth-logo   { font-size:1.8rem; margin-bottom:.8rem; }
.auth-input  {
  width:100%; font-size:.9rem; color:var(--text); background:var(--bg);
  border:1.5px solid var(--border); border-radius:7px; padding:.6rem .85rem;
  font-family:inherit; outline:none; margin-bottom:.7rem;
  transition:border-color .15s;
}
.auth-input:focus { border-color:var(--teal); }
.auth-btn {
  width:100%; background:var(--navy); color:#fff; border:none; border-radius:8px;
  padding:.7rem; font-size:.9rem; font-weight:700; cursor:pointer;
  font-family:inherit; margin-top:.3rem; transition:filter .15s;
}
.auth-btn:hover { filter:brightness(1.2); }
.auth-btn:disabled { opacity:.5; cursor:default; filter:none; }
.auth-error { color:var(--red); font-size:.8rem; margin-top:.5rem; min-height:1.2em; }
.auth-note  { font-size:.72rem; color:var(--muted); margin-top:.8rem; font-style:italic; }

</style>
</head>
<body>

<header class="qa-header">
  <a href="https://aesopacademy.org">AesopAcademy.org</a>
  <div class="qa-title">Exam QA Review</div>
  <div class="qa-badge">ADMIN</div>
  <div class="qa-header-right">
    <span><span class="fb-dot" id="fb-dot"></span><span id="fb-label">Connecting…</span></span>
    <a href="/review/exam-qa.html" class="btn btn-ghost btn-sm">📋 QA Dashboard</a>
    <a href="/review/exam-qa-review.html" class="btn btn-ghost btn-sm">↺ Restart</a>
  </div>
</header>


<!-- ── AUTH GATE ── -->
<div class="auth-overlay" id="auth-overlay">
  <div class="auth-box">
    <div class="auth-logo">🔐</div>
    <h2>AESOP Admin Access</h2>
    <p>Sign in with your admin account to access the QA Review tool.</p>
    <input class="auth-input" id="auth-email" type="email" placeholder="Admin email address" autocomplete="email">
    <input class="auth-input" id="auth-pass"  type="password" placeholder="Password" autocomplete="current-password">
    <button class="auth-btn" id="auth-btn" onclick="doSignIn()">Sign In</button>
    <div class="auth-error" id="auth-error"></div>
    <div class="auth-note">Admin access only. Contact Scott if you need access.</div>
  </div>
</div>

<div id="app-root"></div>
<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import {
    getFirestore, doc, setDoc, getDoc, getDocs,
    collection, query, where, serverTimestamp, deleteDoc
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyA-placeholder-replace-with-real-key",
    authDomain:        "playagame-f733d.firebaseapp.com",
    projectId:         "playagame-f733d",
    storageBucket:     "playagame-f733d.appspot.com",
    messagingSenderId: "000000000000",
    appId:             "1:000000000000:web:placeholder"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  window._fb = { db, doc, setDoc, getDoc, getDocs, collection, query, where, serverTimestamp, deleteDoc };

  // Admin email whitelist — add authorised admin emails here
  const ADMIN_EMAILS = [
    // Add admin emails here, e.g.: 'scott@example.com'
    // Or leave empty to allow any signed-in Firebase user
  ];

  function isAdmin(user) {
    if (!user) return false;
    if (ADMIN_EMAILS.length === 0) return true; // any signed-in user = admin
    return ADMIN_EMAILS.includes(user.email);
  }

  onAuthStateChanged(auth, user => {
    window._fbUser = user || null;
    window._fbAuth = auth;
    window._signIn = async (email, pass) => {
      const { signInWithEmailAndPassword } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js");
      return signInWithEmailAndPassword(auth, email, pass);
    };
    const dot = document.getElementById('fb-dot');
    const lbl = document.getElementById('fb-label');
    const overlay = document.getElementById('auth-overlay');

    if (user && isAdmin(user)) {
      // Authorised — hide gate and load
      if (dot) { dot.className = 'fb-dot ok'; lbl.textContent = user.email || 'Signed in'; }
      if (overlay) overlay.style.display = 'none';
      document.dispatchEvent(new CustomEvent('fbReady'));
    } else if (user && !isAdmin(user)) {
      // Signed in but not admin
      if (overlay) overlay.style.display = 'flex';
      const err = document.getElementById('auth-error');
      if (err) err.textContent = 'This account does not have admin access.';
    } else {
      // Not signed in — show gate
      if (dot) { dot.className = 'fb-dot'; lbl.textContent = 'Not signed in'; }
      if (overlay) overlay.style.display = 'flex';
    }
  });
</script>

<script>
'use strict';

// ── SIGN IN ───────────────────────────────────────────────────────────────────
async function doSignIn() {
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-pass').value;
  const btn   = document.getElementById('auth-btn');
  const err   = document.getElementById('auth-error');
  if (!email || !pass) { err.textContent = 'Please enter email and password.'; return; }
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  err.textContent = '';
  try {
    await window._signIn(email, pass);
    // onAuthStateChanged will fire and hide the overlay if admin
  } catch(e) {
    err.textContent = e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password'
      ? 'Incorrect email or password.'
      : 'Sign-in failed: ' + e.message;
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

// Allow Enter key to submit
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const overlay = document.getElementById('auth-overlay');
    if (overlay && overlay.style.display !== 'none') doSignIn();
  }
});


// ── QUESTION BANK LOADER ─────────────────────────────────────────────────────
// Fetches the Advanced bank (250 Qs) from the live nav page

let QUESTIONS = [];   // [{bankIndex, module, text, options, correct}]
let reviewedSet = {}; // bankIndex → {status:'approved'|'flagged', sessionName}
let sessions    = []; // [{name, date, approvedCount, flaggedCount}]
let currentSession = null;
let currentIdx  = 0;  // index into unreviewed QUESTIONS
let unreviewed  = []; // subset of QUESTIONS not yet approved
let localEdits  = {}; // bankIndex → {text, options, correct, flagNote}
let correctMap  = {}; // bankIndex → current correct index (during editing)

const MOD_COLORS = {
  M1:'#2ba898', M2:'#9a5fb0', M3:'#c0384f', M4:'#e07b39',
  M5:'#2563eb', M6:'#7c3aed', M7:'#0891b2', M8:'#be185d'
};

// ── FETCH BANKS ───────────────────────────────────────────────────────────────
async function loadBanks() {
  showRoot('<div style="text-align:center;padding:3rem;color:var(--muted)">⏳ Loading question bank…</div>');
  try {
    // Use XHR (more reliable than fetch for same-origin HTML pages on this server)
    const html = await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('GET', '/ai-academy/');
      xhr.onload  = () => xhr.status === 200 ? resolve(xhr.responseText) : reject(new Error('Nav load failed: ' + xhr.status));
      xhr.onerror = () => reject(new Error('Nav XHR network error'));
      xhr.send();
    });
    // Extract EXAM_BANKS
    // Extract EXAM_BANKS block using the actual end marker in the live nav
    const banksStart = html.indexOf('const EXAM_BANKS =');
    const banksEnd   = html.indexOf('] // end advanced bank');
    if (banksStart < 0 || banksEnd < 0) throw new Error('EXAM_BANKS markers not found');
    // Get the full object: from { to the closing }; after the advanced bank
    const closeIdx = html.indexOf('};', banksEnd);
    const banksInner = html.slice(banksStart + 'const EXAM_BANKS ='.length, closeIdx + 1);
    let banks;
    try { banks = new Function('return ' + banksInner.trim())(); }
    catch(e) { throw new Error('EXAM_BANKS parse failed: ' + e.message); }
    // Use tier 3 (Advanced) as master set
    QUESTIONS = (banks[3] || []).map((q, i) => ({ bankIndex: i, ...q }));
    toast('✅ Loaded ' + QUESTIONS.length + ' questions', 'ok');
    await loadReviewedState();
  } catch(e) {
    console.error(e);
    showRoot('<div style="text-align:center;padding:3rem"><p style="color:var(--red);margin-bottom:1rem">⚠️ Could not load question bank from /ai-academy/</p><p style="color:var(--muted);font-size:.85rem">Open console and run: <code>window.loadManual(banks)</code></p></div>');
  }
}

window.loadManual = function(banks) {
  QUESTIONS = (banks[3] || []).map((q, i) => ({ bankIndex: i, ...q }));
  toast('✅ Loaded manually: ' + QUESTIONS.length + ' questions', 'ok');
  loadReviewedState();
};

// ── FIREBASE: LOAD STATE ──────────────────────────────────────────────────────
async function loadReviewedState() {
  if (!window._fb) { renderStartScreen(); return; }
  try {
    // Load all approved/flagged question records
    const snap = await window._fb.getDocs(
      window._fb.collection(window._fb.db, 'examQAReviews')
    );
    reviewedSet = {};
    snap.forEach(d => {
      const data = d.data();
      reviewedSet[data.bankIndex] = data;
    });

    // Load session list
    const sessSnap = await window._fb.getDocs(
      window._fb.collection(window._fb.db, 'examQASessions')
    );
    sessions = [];
    sessSnap.forEach(d => sessions.push(d.data()));
    sessions.sort((a, b) => a.num - b.num);

    renderStartScreen();
  } catch(e) {
    console.warn('Firebase load failed', e);
    renderStartScreen();
  }
}

// ── SESSIONS ──────────────────────────────────────────────────────────────────
function nextSessionName() {
  if (!sessions.length) return { name: 'Review 1', num: 1 };
  const lastNum = Math.max(...sessions.map(s => s.num || 1));
  return { name: 'Review ' + (lastNum + 1), num: lastNum + 1 };
}

async function startSession(sessionInfo) {
  currentSession = sessionInfo;
  buildUnreviewedList();
  currentIdx = 0;
  localEdits = {};
  correctMap = {};

  // Create session record in Firebase
  if (window._fb && window._fbUser) {
    try {
      const ref = window._fb.doc(window._fb.db, 'examQASessions', 'session_' + sessionInfo.num);
      await window._fb.setDoc(ref, {
        num:       sessionInfo.num,
        name:      sessionInfo.name,
        startedAt: window._fb.serverTimestamp(),
        startedBy: window._fbUser.email || 'unknown',
        totalQs:   QUESTIONS.length,
        remaining: unreviewed.length,
      });
    } catch(e) { console.warn('Session create failed', e); }
  }

  if (unreviewed.length === 0) {
    renderComplete();
  } else {
    renderReviewLayout();
    renderQuestion();
  }
}

function buildUnreviewedList() {
  // Questions not yet approved (flagged ones reappear — they need re-review after editing)
  unreviewed = QUESTIONS.filter(q => {
    const r = reviewedSet[q.bankIndex];
    return !r || r.status !== 'approved';
  });
}

// ── START SCREEN ──────────────────────────────────────────────────────────────
function renderStartScreen() {
  const approvedCount = Object.values(reviewedSet).filter(r => r.status === 'approved').length;
  const flaggedCount  = Object.values(reviewedSet).filter(r => r.status === 'flagged').length;
  const remaining     = QUESTIONS.length - approvedCount;
  const nextSess      = nextSessionName();

  const sessionItems = sessions.map(s => {
    const isLatest = s.num === (sessions.length ? sessions[sessions.length-1].num : 0);
    return '<div class="session-item' + (isLatest ? ' active' : '') + '" onclick="resumeSession(' + s.num + ')">'
      + '<div class="si-left"><h3>' + s.name + '</h3><p>' + (s.startedAt ? new Date(s.startedAt.seconds * 1000).toLocaleDateString() : 'In progress') + '</p></div>'
      + '<div class="si-right"><strong>' + (s.approvedInSession || 0) + ' approved</strong>' + (s.flaggedInSession || 0) + ' flagged</div>'
      + '</div>';
  }).join('') || '<p style="color:var(--muted);font-size:.85rem;padding:.5rem 0">No sessions yet.</p>';

  showRoot(
    '<div class="start-screen">'
    + '<h1>QA Review</h1>'
    + '<p>Sequential review of all 250 Advanced questions. Approved questions won\'t appear in future sessions. Flagged questions reappear until approved.</p>'
    + '<div class="info-box">'
    + '<strong>' + approvedCount + '/' + QUESTIONS.length + '</strong> approved &nbsp;·&nbsp; '
    + '<strong>' + flaggedCount + '</strong> flagged (pending edit) &nbsp;·&nbsp; '
    + '<strong>' + remaining + '</strong> remaining'
    + '</div>'
    + (sessions.length ? '<div class="rsb-label" style="padding:.3rem 0">Previous Sessions</div><div class="session-list">' + sessionItems + '</div>' : '')
    + '<button class="btn btn-navy start-new-btn" onclick="startSession(' + JSON.stringify(nextSess) + ')">'
    + '▶ Start ' + nextSess.name + ' (' + remaining + ' questions remaining)'
    + '</button>'
    + '</div>'
  );
}

function resumeSession(num) {
  const s = sessions.find(x => x.num === num);
  if (s) startSession({ name: s.name, num: s.num });
}

// ── REVIEW LAYOUT ─────────────────────────────────────────────────────────────
function renderReviewLayout() {
  showRoot(
    '<div class="review-layout">'
    + '<aside class="r-sidebar" id="r-sidebar"><!-- rendered --></aside>'
    + '<main class="r-main" id="r-main"><!-- rendered --></main>'
    + '</div>'
  );
  updateSidebar();
}

function updateSidebar() {
  const approvedCount = Object.values(reviewedSet).filter(r => r.status === 'approved').length;
  const flaggedCount  = Object.values(reviewedSet).filter(r => r.status === 'flagged').length;
  const doneThisSession = unreviewed.length > 0 ? currentIdx : unreviewed.length;
  const pct = QUESTIONS.length ? Math.round((approvedCount / QUESTIONS.length) * 100) : 0;

  // Per-module breakdown
  const mods = ['M1','M2','M3','M4','M5','M6','M7','M8'];
  const modRows = mods.map(m => {
    const total = QUESTIONS.filter(q => q.module === m).length;
    const done  = QUESTIONS.filter(q => q.module === m && reviewedSet[q.bankIndex]?.status === 'approved').length;
    const mpct  = total ? Math.round((done/total)*100) : 0;
    return '<div class="rsb-mod-row">'
      + '<span class="rsb-mod-label">' + m + '</span>'
      + '<div class="rsb-mod-bar"><div style="height:3px;background:var(--teal);width:' + mpct + '%;border-radius:1px"></div></div>'
      + '<span class="rsb-mod-count">' + done + '/' + total + '</span>'
      + '</div>';
  }).join('');

  const sb = document.getElementById('r-sidebar');
  if (!sb) return;
  sb.innerHTML =
    '<div class="rsb-label">Overall Progress</div>'
    + '<div class="rsb-row"><span>Approved</span><span style="color:var(--green)">' + approvedCount + '/' + QUESTIONS.length + '</span></div>'
    + '<div class="rsb-prog"><div class="rsb-prog-fill" style="width:' + pct + '%"></div></div>'
    + '<div class="rsb-row"><span>Flagged</span><span style="color:var(--amber)">' + flaggedCount + '</span></div>'
    + '<div class="rsb-row"><span>Remaining</span><span>' + unreviewed.length + '</span></div>'
    + '<div class="rsb-label" style="margin-top:.8rem">By Module</div>'
    + modRows
    + '<div class="rsb-bottom">'
    + '<div class="rsb-session-name">' + (currentSession ? currentSession.name : '') + '</div>'
    + '<div class="rsb-session-sub">' + doneThisSession + ' reviewed this session</div>'
    + '<button class="btn btn-ghost btn-sm" onclick="endSession()" style="width:100%;margin-top:.4rem">End Session</button>'
    + '</div>';
}

// ── RENDER QUESTION ───────────────────────────────────────────────────────────
function renderQuestion() {
  if (currentIdx >= unreviewed.length) { renderComplete(); return; }

  const q       = unreviewed[currentIdx];
  const edit    = localEdits[q.bankIndex];
  const reviewed = reviewedSet[q.bankIndex];
  const text    = edit ? edit.text    : q.text;
  const options = edit ? edit.options : q.options;
  const correct = correctMap[q.bankIndex] !== undefined ? correctMap[q.bankIndex] : (edit ? edit.correct : q.correct);
  const flagNote = edit?.flagNote || '';
  const hasEdit = !!edit;
  const isFlagged = reviewed?.status === 'flagged';
  const statusCls = isFlagged ? 'st-flagged' : hasEdit ? 'st-edited' : 'st-new';
  const statusTxt = isFlagged ? '⚠ Previously Flagged' : hasEdit ? '✏ Edited' : 'Unreviewed';
  const modColor  = MOD_COLORS[q.module] || '#718096';
  const pct = Math.round((currentIdx / unreviewed.length) * 100);

  const optRows = options.map((opt, i) => {
    const isCor = i === correct;
    return '<div class="opt-row' + (isCor ? ' correct-opt' : '') + '">'
      + '<div class="opt-letter' + (isCor ? ' is-correct' : '') + '" '
      + 'onclick="toggleCorrect(' + q.bankIndex + ',' + i + ')" title="Mark as correct answer">'
      + String.fromCharCode(65 + i)
      + '</div>'
      + '<input class="opt-input" type="text" value="' + escHtml(opt) + '" '
      + 'oninput="onOptEdit(' + q.bankIndex + ',' + i + ',this.value)" '
      + 'placeholder="Option ' + String.fromCharCode(65 + i) + '">'
      + '</div>';
  }).join('');

  const main = document.getElementById('r-main');
  if (!main) return;

  main.innerHTML =
    '<div class="prog-wrap">'
    + '<div class="prog-row"><span>Question ' + (currentIdx+1) + ' of ' + unreviewed.length + ' remaining</span><span>' + pct + '% done</span></div>'
    + '<div class="prog-bar"><div class="prog-fill" style="width:' + pct + '%"></div></div>'
    + '</div>'

    + '<div class="q-card' + (hasEdit ? ' edited' : '') + (isFlagged ? ' flagged-card' : '') + '" id="qcard">'

    + '<div class="q-card-hdr">'
    + '<span class="q-idx">Bank #' + (q.bankIndex+1) + '</span>'
    + '<span class="q-mod-tag" style="background:' + modColor + '">' + q.module + '</span>'
    + (isFlagged ? '<span style="font-size:.72rem;color:var(--amber);margin-left:.3rem">⚠ Was flagged — please re-review</span>' : '')
    + '<span class="q-status ' + statusCls + '" style="margin-left:auto">' + statusTxt + '</span>'
    + '</div>'

    + '<div class="q-card-body">'
    + '<div class="field-label">Question Text</div>'
    + '<textarea class="q-text-edit" id="q-text-' + q.bankIndex + '" oninput="onTextEdit(' + q.bankIndex + ',this.value)">' + escHtml(text) + '</textarea>'
    + '<div class="field-label" style="margin-top:.9rem">Answer Options <span style="font-size:.67rem;font-weight:400;color:var(--muted)">(click letter circle to set correct answer)</span></div>'
    + '<div class="opts-wrap">' + optRows + '</div>'
    + '<div class="opt-hint">✓ = correct answer &nbsp;|&nbsp; Click a letter to change which answer is correct</div>'
    + '</div>'

    + '<div class="flag-note-wrap' + (isFlagged ? ' visible' : '') + '" id="flag-note-wrap">'
    + '<div class="field-label" style="margin-bottom:.3rem">Flag Note (optional)</div>'
    + '<textarea class="flag-note-input" id="flag-note-input" placeholder="Describe the issue with this question…">' + escHtml(flagNote) + '</textarea>'
    + '</div>'

    + '<div class="q-actions">'
    + '<div class="qa-left">'
    + '<button class="btn btn-ghost btn-sm" onclick="skipQuestion()">⟩ Skip</button>'
    + '<button class="btn btn-amber btn-sm" onclick="flagQuestion(' + q.bankIndex + ')">🚩 Flag for Dashboard</button>'
    + (hasEdit ? '<span class="edit-badge">✏ Edited — edits will be saved with your action</span>' : '')
    + '</div>'
    + '<div class="qa-right">'
    + '<button class="btn btn-green" onclick="approveQuestion(' + q.bankIndex + ')">✅ Approve &amp; Next</button>'
    + '</div>'
    + '</div>'
    + '</div>'

    // Navigation hint
    + '<div style="margin-top:.7rem;font-size:.74rem;color:var(--muted);text-align:right">'
    + 'Keyboard: <strong>→</strong> skip &nbsp; <strong>A</strong> approve &nbsp; <strong>F</strong> flag'
    + '</div>';

  // Keyboard shortcuts
  document.onkeydown = (e) => {
    if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
    if (e.key === 'ArrowRight') skipQuestion();
    if (e.key === 'a' || e.key === 'A') approveQuestion(q.bankIndex);
    if (e.key === 'f' || e.key === 'F') flagQuestion(q.bankIndex);
  };

  updateSidebar();
}

// ── EDIT HANDLERS ─────────────────────────────────────────────────────────────
function initEdit(bankIndex) {
  if (!localEdits[bankIndex]) {
    const q = QUESTIONS.find(x => x.bankIndex === bankIndex);
    localEdits[bankIndex] = {
      text:    q.text,
      options: [...q.options],
      correct: correctMap[bankIndex] !== undefined ? correctMap[bankIndex] : q.correct,
      flagNote: '',
    };
  }
  return localEdits[bankIndex];
}

function onTextEdit(bankIndex, val) {
  initEdit(bankIndex).text = val;
  const card = document.getElementById('qcard');
  if (card) { card.classList.add('edited'); }
}

function onOptEdit(bankIndex, idx, val) {
  const edit = initEdit(bankIndex);
  edit.options[idx] = val;
}

function toggleCorrect(bankIndex, idx) {
  initEdit(bankIndex);
  correctMap[bankIndex] = idx;
  localEdits[bankIndex].correct = idx;
  // Re-render just the option rows
  renderQuestion();
  // Re-focus the text area if it was being edited
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
async function approveQuestion(bankIndex) {
  const q    = QUESTIONS.find(x => x.bankIndex === bankIndex);
  const edit = localEdits[bankIndex];

  // Build the record
  const record = {
    bankIndex,
    tier:     3,
    module:   q.module,
    status:   'approved',
    session:  currentSession.name,
    reviewedAt: window._fb ? window._fb.serverTimestamp() : new Date().toISOString(),
    reviewedBy: window._fbUser?.email || 'unknown',
    // Store final (possibly edited) versions
    text:    edit ? edit.text    : q.text,
    options: edit ? edit.options : q.options,
    correct: edit ? edit.correct : q.correct,
    hasEdit: !!edit,
    originalText:    q.text,
    originalOptions: q.options,
    originalCorrect: q.correct,
  };

  // Firebase write
  if (window._fb) {
    try {
      const dot = document.getElementById('fb-dot');
      if (dot) dot.className = 'fb-dot saving';
      await window._fb.setDoc(
        window._fb.doc(window._fb.db, 'examQAReviews', 'adv_' + bankIndex),
        record
      );
      // If it was also flagged for dashboard editing, push that too
      if (edit && edit.text !== q.text || (edit && JSON.stringify(edit.options) !== JSON.stringify(q.options)) || (edit && edit.correct !== q.correct)) {
        await window._fb.setDoc(
          window._fb.doc(window._fb.db, 'examQAEdits', '3_' + bankIndex),
          {
            tier: 3, bankIndex, module: q.module,
            text: edit.text, options: edit.options, correct: edit.correct,
            originalText: q.text, originalOptions: q.options, originalCorrect: q.correct,
            status: 'approved',
            editedAt: Date.now(),
            pushedAt: window._fb.serverTimestamp(),
            pushedBy: window._fbUser?.email || 'unknown',
          }
        );
      }
      if (dot) dot.className = 'fb-dot ok';
    } catch(e) {
      console.error('Firebase write failed', e);
      toast('⚠ Firebase save failed', 'warn');
    }
  }

  reviewedSet[bankIndex] = record;
  delete localEdits[bankIndex];
  delete correctMap[bankIndex];
  currentIdx++;
  toast('✅ Approved', 'ok');
  renderQuestion();
  updateSidebar();
}

async function flagQuestion(bankIndex) {
  const q    = QUESTIONS.find(x => x.bankIndex === bankIndex);
  const edit = initEdit(bankIndex);

  // Get flag note
  const noteEl = document.getElementById('flag-note-input');
  const note   = noteEl ? noteEl.value.trim() : '';
  edit.flagNote = note;

  // Show flag note area if not visible
  const noteWrap = document.getElementById('flag-note-wrap');
  if (noteWrap && !noteWrap.classList.contains('visible')) {
    noteWrap.classList.add('visible');
    noteEl && noteEl.focus();
    toast('Add a note and click Flag again to confirm', 'warn');
    return; // First click shows the note field; second click actually flags
  }

  const record = {
    bankIndex, tier: 3, module: q.module,
    status:    'flagged',
    session:   currentSession.name,
    flagNote:  note,
    reviewedAt: window._fb ? window._fb.serverTimestamp() : new Date().toISOString(),
    reviewedBy: window._fbUser?.email || 'unknown',
    text:    edit.text, options: edit.options, correct: edit.correct,
    originalText: q.text, originalOptions: q.options, originalCorrect: q.correct,
    hasEdit: true,
  };

  if (window._fb) {
    try {
      const dot = document.getElementById('fb-dot');
      if (dot) dot.className = 'fb-dot saving';
      // Write to reviews (as flagged)
      await window._fb.setDoc(window._fb.doc(window._fb.db, 'examQAReviews', 'adv_' + bankIndex), record);
      // Write to edits queue for dashboard
      await window._fb.setDoc(window._fb.doc(window._fb.db, 'examQAEdits', '3_' + bankIndex), {
        tier: 3, bankIndex, module: q.module,
        text: edit.text, options: edit.options, correct: edit.correct,
        originalText: q.text, originalOptions: q.options, originalCorrect: q.correct,
        status: 'pending', flagNote: note,
        editedAt: Date.now(),
        pushedAt: window._fb.serverTimestamp(),
        pushedBy: window._fbUser?.email || 'unknown',
      });
      if (dot) dot.className = 'fb-dot ok';
    } catch(e) {
      console.error('Firebase write failed', e);
      toast('⚠ Firebase save failed', 'warn');
    }
  }

  reviewedSet[bankIndex] = record;
  delete localEdits[bankIndex];
  delete correctMap[bankIndex];
  currentIdx++;
  toast('🚩 Flagged and sent to QA Dashboard', 'warn');
  renderQuestion();
  updateSidebar();
}

function skipQuestion() {
  // Move to end of unreviewed list (will reappear next time if not submitted)
  currentIdx++;
  if (currentIdx >= unreviewed.length) currentIdx = 0; // wrap
  renderQuestion();
}

// ── SESSION END ───────────────────────────────────────────────────────────────
function endSession() {
  renderComplete();
}

function renderComplete() {
  const approvedCount = Object.values(reviewedSet).filter(r => r.status === 'approved').length;
  const flaggedCount  = Object.values(reviewedSet).filter(r => r.status === 'flagged').length;
  const remaining     = QUESTIONS.length - approvedCount;
  const nextSess      = nextSessionName();

  showRoot(
    '<div class="complete-screen">'
    + '<div class="complete-icon">' + (remaining === 0 ? '🎉' : '✅') + '</div>'
    + '<div class="complete-title">' + (remaining === 0 ? 'All Questions Reviewed!' : currentSession.name + ' Complete') + '</div>'
    + '<div class="complete-sub">' + (remaining === 0
        ? 'All 250 Advanced questions have been approved.'
        : remaining + ' questions remaining to review.')
    + '</div>'
    + '<div class="complete-stats">'
    + '<div class="cs-card"><div class="cs-num" style="color:var(--green)">' + approvedCount + '</div><div class="cs-lbl">Approved</div></div>'
    + '<div class="cs-card"><div class="cs-num" style="color:var(--amber)">' + flaggedCount + '</div><div class="cs-lbl">Flagged</div></div>'
    + '<div class="cs-card"><div class="cs-num">' + remaining + '</div><div class="cs-lbl">Remaining</div></div>'
    + '<div class="cs-card"><div class="cs-num">' + Math.round((approvedCount/QUESTIONS.length)*100) + '%</div><div class="cs-lbl">Complete</div></div>'
    + '</div>'
    + (remaining > 0
        ? '<button class="btn btn-navy" style="width:100%;padding:.75rem;font-size:.9rem" onclick="startSession(' + JSON.stringify(nextSess) + ')">▶ Start ' + nextSess.name + '</button>'
        : '')
    + '<div style="margin-top:.8rem;display:flex;gap:.6rem;justify-content:center">'
    + '<a href="/review/exam-qa.html" class="btn btn-ghost">📋 QA Dashboard</a>'
    + '<button class="btn btn-ghost" onclick="renderStartScreen()">↺ Session Menu</button>'
    + '</div>'
    + '</div>'
  );
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function showRoot(html) {
  document.getElementById('app-root').innerHTML = html;
}

function escHtml(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

let toastTimer;
function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast ' + type + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener('fbReady', loadBanks);
// Fallback if Firebase loads slowly
setTimeout(() => { if (!QUESTIONS.length) loadBanks(); }, 3000);
</script>
