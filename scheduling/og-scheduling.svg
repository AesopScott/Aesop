<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#132236"/>
    </linearGradient>
    <!-- Gold glow behind calendar -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a05a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c9a05a" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle noise texture overlay -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines (blueprint feel) -->
  <g stroke="#c9a05a" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Gold accent bar top -->
  <rect x="0" y="0" width="1200" height="5" fill="#c9a05a"/>

  <!-- Left decorative vertical accent -->
  <rect x="72" y="80" width="3" height="470" fill="#c9a05a" fill-opacity="0.4" rx="2"/>

  <!-- Glow behind calendar icon -->
  <ellipse cx="870" cy="315" rx="220" ry="220" fill="url(#glow)"/>

  <!-- ─── CALENDAR ICON (right side) ─── -->
  <g transform="translate(680, 150)">
    <!-- Calendar body -->
    <rect x="0" y="40" width="320" height="290" rx="18" fill="#1a2d44" stroke="#c9a05a" stroke-width="2" stroke-opacity="0.6"/>
    <!-- Calendar header band -->
    <rect x="0" y="40" width="320" height="68" rx="18" fill="#c9a05a" fill-opacity="0.15"/>
    <rect x="0" y="88" width="320" height="20" fill="#1a2d44"/>
    <!-- Ring posts -->
    <rect x="88" y="20" width="16" height="52" rx="8" fill="#c9a05a"/>
    <rect x="216" y="20" width="16" height="52" rx="8" fill="#c9a05a"/>
    <!-- Month label -->
    <text x="160" y="82" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#c9a05a" text-anchor="middle" letter-spacing="3">APRIL</text>

    <!-- Day headers -->
    <g font-family="Arial, sans-serif" font-size="13" fill="#c9a05a" fill-opacity="0.5" text-anchor="middle">
      <text x="32"  y="140">S</text>
      <text x="78"  y="140">M</text>
      <text x="124" y="140">T</text>
      <text x="160" y="140">W</text>
      <text x="196" y="140">T</text>
      <text x="242" y="140">F</text>
      <text x="288" y="140">S</text>
    </g>
    <!-- Divider under headers -->
    <line x1="16" y1="148" x2="304" y2="148" stroke="#c9a05a" stroke-opacity="0.2" stroke-width="1"/>

    <!-- Calendar dates - Row 1 -->
    <g font-family="Arial, sans-serif" font-size="16" fill="#c0cfe0" text-anchor="middle">
      <text x="78"  y="178">1</text>
      <text x="124" y="178">2</text>
      <text x="160" y="178">3</text>
      <text x="196" y="178">4</text>
      <text x="242" y="178">5</text>
      <text x="288" y="178">6</text>
    </g>
    <!-- Row 2 -->
    <g font-family="Arial, sans-serif" font-size="16" fill="#c0cfe0" text-anchor="middle">
      <text x="32"  y="218">7</text>
      <text x="78"  y="218">8</text>
      <text x="124" y="218">9</text>
      <text x="160" y="218">10</text>
      <text x="196" y="218">11</text>
      <text x="242" y="218">12</text>
      <text x="288" y="218">13</text>
    </g>
    <!-- Row 3 - with highlighted date (22) -->
    <g font-family="Arial, sans-serif" font-size="16" fill="#c0cfe0" text-anchor="middle">
      <text x="32"  y="258">14</text>
      <text x="78"  y="258">15</text>
      <text x="124" y="258">16</text>
      <text x="160" y="258">17</text>
      <text x="196" y="258">18</text>
      <text x="242" y="258">19</text>
      <text x="288" y="258">20</text>
    </g>
    <!-- Row 4 -->
    <g font-family="Arial, sans-serif" font-size="16" text-anchor="middle">
      <text x="32"  y="298" fill="#c0cfe0">21</text>
      <!-- Highlighted selected date -->
      <circle cx="78" cy="290" r="18" fill="#c9a05a"/>
      <text x="78"  y="298" fill="#0d1b2a" font-weight="700">22</text>
      <text x="124" y="298" fill="#c0cfe0">23</text>
      <text x="160" y="298" fill="#c0cfe0">24</text>
      <text x="196" y="298" fill="#c0cfe0">25</text>
      <text x="242" y="298" fill="#c0cfe0">26</text>
      <text x="288" y="298" fill="#c0cfe0">27</text>
    </g>
    <!-- Row 5 -->
    <g font-family="Arial, sans-serif" font-size="16" fill="#c0cfe0" text-anchor="middle">
      <text x="32"  y="338">28</text>
      <text x="78"  y="338">29</text>
      <text x="124" y="338">30</text>
    </g>
  </g>

  <!-- ─── LEFT TEXT BLOCK ─── -->

  <!-- Eyebrow label -->
  <rect x="100" y="148" width="220" height="32" rx="16" fill="none" stroke="#c9a05a" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="210" y="169" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#c9a05a" text-anchor="middle" letter-spacing="2.5">AESOP AI ACADEMY</text>

  <!-- Main headline -->
  <text x="100" y="254" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="700" fill="#ffffff" letter-spacing="-1">Schedule</text>
  <text x="100" y="330" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="700" fill="#c9a05a" letter-spacing="-1">a Meeting</text>

  <!-- Subhead -->
  <text x="100" y="388" font-family="Arial, sans-serif" font-size="24" font-weight="300" fill="rgba(255,255,255,0.65)">with Scott Schindler</text>

  <!-- Divider line -->
  <line x1="100" y1="418" x2="400" y2="418" stroke="#c9a05a" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Description line -->
  <text x="100" y="450" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.45)">30-minute video call · Pick a time that works for you</text>

  <!-- URL badge at bottom -->
  <rect x="100" y="500" width="330" height="44" rx="22" fill="#c9a05a" fill-opacity="0.12" stroke="#c9a05a" stroke-width="1" stroke-opacity="0.35"/>
  <text x="265" y="527" font-family="Arial, sans-serif" font-size="16" font-weight="500" fill="#c9a05a" text-anchor="middle" letter-spacing="0.5">aesopacademy.org/scheduling</text>

  <!-- Gold accent bottom bar -->
  <rect x="0" y="625" width="1200" height="5" fill="#c9a05a"/>
</svg>
