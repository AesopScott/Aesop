name = "aesop-advisory-board"
main = "index.js"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]

# Secrets — set these via Cloudflare dashboard or:
#   npx wrangler secret put GITHUB_PAT
#   npx wrangler secret put ADMIN_PASSWORD
#   npx wrangler secret put BREVO_API_KEY
#
# GITHUB_PAT:     fine-grained PAT, Contents read+write on AesopScott/Aesop only
# ADMIN_PASSWORD: any password you choose for the admin delete page
# BREVO_API_KEY:  Brevo transactional API key — sends new-application alerts to admin

[observability]
enabled = true
